<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="920" height="560" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">RSC + SSR Architecture: React &amp; Node.js</text>
  <text x="460" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Server Components · Streaming · Hydration Flow</text>
  
  <!-- Client Box -->
  <rect x="30" y="80" width="200" height="390" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="700">🖥 Browser / Client</text>
  
  <rect x="50" y="120" width="160" height="40" rx="8" fill="#0c4a6e"/>
  <text x="130" y="145" text-anchor="middle" fill="#7dd3fc" font-size="11">Initial HTTP Request</text>
  
  <rect x="50" y="175" width="160" height="50" rx="8" fill="#0c4a6e"/>
  <text x="130" y="198" text-anchor="middle" fill="#7dd3fc" font-size="11">Receives HTML Shell</text>
  <text x="130" y="214" text-anchor="middle" fill="#64748b" font-size="10">(streamed chunks)</text>
  
  <rect x="50" y="240" width="160" height="50" rx="8" fill="#0c4a6e"/>
  <text x="130" y="263" text-anchor="middle" fill="#7dd3fc" font-size="11">JS Bundle Loads</text>
  <text x="130" y="279" text-anchor="middle" fill="#64748b" font-size="10">React hydrates</text>
  
  <rect x="50" y="305" width="160" height="50" rx="8" fill="#0c4a6e"/>
  <text x="130" y="328" text-anchor="middle" fill="#7dd3fc" font-size="11">Client Components</text>
  <text x="130" y="344" text-anchor="middle" fill="#64748b" font-size="10">'use client' — interactive</text>
  
  <rect x="50" y="370" width="160" height="50" rx="8" fill="none" stroke="#1e40af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="393" text-anchor="middle" fill="#60a5fa" font-size="11">RSC Payload (JSON)</text>
  <text x="130" y="409" text-anchor="middle" fill="#64748b" font-size="10">Re-fetch RSC updates</text>

  <!-- Arrows from client to node -->
  <line x1="230" y1="140" x2="340" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="336,135 346,140 336,145" fill="#64748b"/>
  
  <line x1="346" y1="395" x2="230" y2="395" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="234,390 224,395 234,400" fill="#64748b"/>
  
  <!-- Node.js Server Box -->
  <rect x="340" y="80" width="250" height="390" rx="12" fill="#1e293b" stroke="#16a34a" stroke-width="1.5"/>
  <text x="465" y="108" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">⚙ Node.js Server (Next.js)</text>
  
  <rect x="360" y="120" width="210" height="50" rx="8" fill="#14532d"/>
  <text x="465" y="143" text-anchor="middle" fill="#86efac" font-size="11">Server Components</text>
  <text x="465" y="159" text-anchor="middle" fill="#4ade80" font-size="10">No JS sent to browser</text>
  
  <rect x="360" y="185" width="210" height="50" rx="8" fill="#14532d"/>
  <text x="465" y="208" text-anchor="middle" fill="#86efac" font-size="11">React.renderToPipeableStream()</text>
  <text x="465" y="224" text-anchor="middle" fill="#4ade80" font-size="10">Streams HTML progressively</text>
  
  <rect x="360" y="250" width="210" height="50" rx="8" fill="#14532d"/>
  <text x="465" y="273" text-anchor="middle" fill="#86efac" font-size="11">Suspense Boundaries</text>
  <text x="465" y="289" text-anchor="middle" fill="#4ade80" font-size="10">Send shell → stream chunks</text>
  
  <rect x="360" y="315" width="210" height="50" rx="8" fill="#14532d"/>
  <text x="465" y="338" text-anchor="middle" fill="#86efac" font-size="11">Route Handlers / API</text>
  <text x="465" y="354" text-anchor="middle" fill="#4ade80" font-size="10">app/api/* → REST endpoints</text>
  
  <rect x="360" y="380" width="210" height="50" rx="8" fill="#14532d"/>
  <text x="465" y="403" text-anchor="middle" fill="#86efac" font-size="11">RSC Serialization</text>
  <text x="465" y="419" text-anchor="middle" fill="#4ade80" font-size="10">JSON component tree payload</text>
  
  <!-- Arrows from server to data sources -->
  <line x1="590" y1="200" x2="650" y2="200" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="646,195 656,200 646,205" fill="#64748b"/>
  
  <line x1="590" y1="290" x2="650" y2="290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="646,285 656,290 646,295" fill="#64748b"/>
  
  <line x1="590" y1="340" x2="650" y2="340" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="646,335 656,340 646,345" fill="#64748b"/>
  
  <!-- Data Sources Box -->
  <rect x="650" y="80" width="240" height="390" rx="12" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="770" y="108" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">🗄 Data Sources</text>
  
  <rect x="670" y="120" width="200" height="50" rx="8" fill="#2e1065"/>
  <text x="770" y="143" text-anchor="middle" fill="#c4b5fd" font-size="11">PostgreSQL / Prisma</text>
  <text x="770" y="159" text-anchor="middle" fill="#8b5cf6" font-size="10">Direct DB query from RSC</text>
  
  <rect x="670" y="185" width="200" height="50" rx="8" fill="#2e1065"/>
  <text x="770" y="208" text-anchor="middle" fill="#c4b5fd" font-size="11">Redis Cache</text>
  <text x="770" y="224" text-anchor="middle" fill="#8b5cf6" font-size="10">Cache-aside pattern</text>
  
  <rect x="670" y="250" width="200" height="50" rx="8" fill="#2e1065"/>
  <text x="770" y="273" text-anchor="middle" fill="#c4b5fd" font-size="11">External APIs</text>
  <text x="770" y="289" text-anchor="middle" fill="#8b5cf6" font-size="10">fetch() — server-side only</text>
  
  <rect x="670" y="315" width="200" height="50" rx="8" fill="#2e1065"/>
  <text x="770" y="338" text-anchor="middle" fill="#c4b5fd" font-size="11">File System / S3</text>
  <text x="770" y="354" text-anchor="middle" fill="#8b5cf6" font-size="10">fs / @aws-sdk/client-s3</text>
  
  <rect x="670" y="380" width="200" height="50" rx="8" fill="#2e1065"/>
  <text x="770" y="403" text-anchor="middle" fill="#c4b5fd" font-size="11">Auth Provider</text>
  <text x="770" y="419" text-anchor="middle" fill="#8b5cf6" font-size="10">NextAuth / Clerk</text>
  
  <!-- Bottom key -->
  <rect x="30" y="490" width="860" height="50" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="460" y="512" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">RSC KEY INSIGHT</text>
  <text x="460" y="530" text-anchor="middle" fill="#64748b" font-size="11">Server Components fetch data directly — no client-side useEffect or loading states required. Zero JS sent to browser for server components.</text>
</svg>
