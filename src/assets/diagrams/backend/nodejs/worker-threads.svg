<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="sharedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ca8a04" stop-opacity="0.05" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
    .arrow-lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; fill: #eab308; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">Worker Threads Architecture</text>
  <text x="30" y="65" class="subtitle">Visualizing completely isolated V8 engine heaps and raw shared memory communication channels</text>

  <!-- MAIN THREAD CARD -->
  <g filter="url(#boxShadow)" transform="translate(30, 110)">
    <rect width="250" height="280" rx="12" fill="url(#mainGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="250" height="6" rx="3" fill="#3b82f6" />
    <text x="20" y="30" class="header" fill="#3b82f6">Main Thread</text>
    <text x="20" y="48" class="desc">Host Node.js process</text>

    <!-- Main V8 Engine box -->
    <rect x="20" y="70" width="210" height="180" rx="8" fill="#09132e" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.2" />
    <text x="125" y="95" class="lbl" fill="#60a5fa" font-weight="bold" text-anchor="middle">V8 Isolation Instance</text>
    <text x="125" y="115" class="desc" fill="#93c5fd" text-anchor="middle">Main Event Loop</text>
    
    <rect x="35" y="140" width="140" height="40" rx="4" fill="#1e2538" />
    <text x="105" y="164" class="lbl" font-size="11" text-anchor="middle">Main V8 Heap (JS)</text>
  </g>

  <!-- WORKER THREAD 1 CARD -->
  <g filter="url(#boxShadow)" transform="translate(520, 110)">
    <rect width="250" height="280" rx="12" fill="url(#workerGrad)" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="250" height="6" rx="3" fill="#a855f7" />
    <text x="20" y="30" class="header" fill="#a855f7">Worker Thread</text>
    <text x="20" y="48" class="desc">CPU-Bound Operations Thread</text>

    <!-- Worker V8 Engine box -->
    <rect x="20" y="70" width="210" height="180" rx="8" fill="#120c1a" stroke="#a855f7" stroke-width="1" stroke-opacity="0.2" />
    <text x="125" y="95" class="lbl" fill="#c084fc" font-weight="bold" text-anchor="middle">V8 Isolation Instance 2</text>
    <text x="125" y="115" class="desc" fill="#e9d5ff" text-anchor="middle">Separate Event Loop</text>
    
    <rect x="35" y="140" width="140" height="40" rx="4" fill="#1c0a24" />
    <text x="105" y="164" class="lbl" font-size="11" text-anchor="middle">Worker Heap (Isolated)</text>
  </g>

  <!-- SHARED DATA LAYER (MIDDLE) -->
  <g filter="url(#boxShadow)" transform="translate(300, 180)">
    <rect width="200" height="120" rx="10" fill="url(#sharedGrad)" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.4" />
    <text x="100" y="30" font-family="Outfit" font-size="13px" font-weight="700" fill="#eab308" text-anchor="middle">SHARED RAM</text>
    <rect x="20" y="50" width="160" height="40" rx="4" fill="#2d2105" />
    <text x="100" y="74" class="lbl" font-size="11" fill="#fef08a" text-anchor="middle">SharedArrayBuffer</text>
    <text x="100" y="105" class="desc" fill="#fef08a" text-anchor="middle">// Direct zero-copy access</text>
  </g>

  <!-- CONNECTIONS -->
  <path d="M 280 200 H 300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <path d="M 520 200 H 500" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)" fill="none" />
</svg>
