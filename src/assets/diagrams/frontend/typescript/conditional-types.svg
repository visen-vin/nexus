<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0b1528" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Glassmorphic Gradients -->
    <linearGradient id="glassBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="glassGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="glassRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0.03" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .card-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; }
    .keyword { fill: #f472b6; font-weight: bold; }
    .type-param { fill: #38bdf8; }
    .infer-kw { fill: #a855f7; font-weight: bold; }
    .arrow-text { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; fill: #cbd5e1; }
    .comment { fill: #64748b; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">Conditional Types &amp; Type Inference</text>
  <text x="30" y="65" class="subtitle">Creating dynamic type pipelines with T extends U ? X : Y branching</text>

  <!-- ==================== CENTRAL CHECK BOX (T extends U) ==================== -->
  <g filter="url(#boxShadow)" transform="translate(240, 110)">
    <rect width="320" height="90" rx="12" fill="url(#glassBlue)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4" />
    <rect width="320" height="6" rx="3" fill="#38bdf8" />
    <text x="160" y="32" class="card-title" fill="#38bdf8" text-anchor="middle">Conditional Extends Check</text>
    
    <rect x="20" y="45" width="280" height="30" rx="6" fill="#090d16" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.1" />
    <text x="160" y="65" class="code-text" fill="#e2e8f0" text-anchor="middle">
      <tspan class="keyword">type</tspan> Result = <tspan class="type-param">T</tspan> <tspan class="keyword">extends</tspan> <tspan fill="#f59e0b">U</tspan> ? <tspan fill="#34d399">X</tspan> : <tspan fill="#f43f5e">Y</tspan>;
    </text>
  </g>

  <!-- ==================== TRUE BRANCH ==================== -->
  <!-- Arrow True -->
  <g transform="translate(240, 155)">
    <path d="M0 0 L-100 0 L-100 80" fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="3 3" />
    <polygon points="-105,75 -100,88 -95,75" fill="#34d399" />
    <rect x="-135" y="15" width="70" height="20" rx="4" fill="#064e3b" stroke="#34d399" stroke-width="1" />
    <text x="-100" y="29" class="arrow-text" fill="#34d399" text-anchor="middle">? True</text>
  </g>

  <!-- True Box -->
  <g filter="url(#boxShadow)" transform="translate(40, 250)">
    <rect width="320" height="150" rx="12" fill="url(#glassGreen)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#34d399" />
    <text x="20" y="30" class="card-title" fill="#34d399">Extends Match (True Branch)</text>
    
    <rect x="15" y="45" width="290" height="90" rx="8" fill="#02120b" stroke="#34d399" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="68" class="code-text" fill="#a7f3d0">
      <tspan class="keyword">type</tspan> IsString&lt;T&gt; = T extends string
    </text>
    <text x="55" y="90" class="code-text" fill="#34d399">
      ? true : false;
    </text>
    <text x="25" y="118" class="code-text comment">// IsString&lt;"hello"&gt; evaluates to: true</text>
  </g>

  <!-- ==================== FALSE BRANCH ==================== -->
  <!-- Arrow False -->
  <g transform="translate(560, 155)">
    <path d="M0 0 L100 0 L100 80" fill="none" stroke="#f43f5e" stroke-width="2.5" stroke-dasharray="3 3" />
    <polygon points="95,75 100,88 105,75" fill="#f43f5e" />
    <rect x="65" y="15" width="70" height="20" rx="4" fill="#4c0519" stroke="#f43f5e" stroke-width="1" />
    <text x="100" y="29" class="arrow-text" fill="#f43f5e" text-anchor="middle">: False</text>
  </g>

  <!-- False Box -->
  <g filter="url(#boxShadow)" transform="translate(440, 250)">
    <rect width="320" height="150" rx="12" fill="url(#glassRose)" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#f43f5e" />
    <text x="20" y="30" class="card-title" fill="#f43f5e">Fallback Branch (False)</text>
    
    <rect x="15" y="45" width="290" height="90" rx="8" fill="#180209" stroke="#f43f5e" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="68" class="code-text" fill="#fecdd3">
      <tspan class="keyword">type</tspan> IsString&lt;T&gt; = T extends string
    </text>
    <text x="55" y="90" class="code-text" fill="#f43f5e">
      ? true : false;
    </text>
    <text x="25" y="118" class="code-text comment">// IsString&lt;123&gt; evaluates to: false</text>
  </g>

  <!-- ==================== INFER DECORATIVE HEADER ==================== -->
  <g transform="translate(240, 15)" opacity="0.85">
    <rect x="10" y="5" width="300" height="30" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
    <text x="160" y="24" class="code-text" fill="#c7d2fe" font-size="11px" text-anchor="middle">
      Type Extraction: <tspan class="keyword">T</tspan> <tspan class="keyword">extends</tspan> Promise&lt;<tspan class="infer-kw">infer</tspan> U&gt; ? U : T
    </text>
  </g>
</svg>
