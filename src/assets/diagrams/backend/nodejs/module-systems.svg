<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="cjsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#be123c" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="esmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .code { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; fill: #f472b6; }
    .desc { font-family: 'Inter', sans-serif; font-size: 11px; fill: #64748b; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">CommonJS vs. ES Modules (ESM)</text>
  <text x="30" y="65" class="subtitle">Comparing loading cycles, evaluation mechanics, caching, and tree-shaking support</text>

  <!-- COMMONJS CARD (LEFT) -->
  <g filter="url(#boxShadow)" transform="translate(40, 110)">
    <rect width="330" height="280" rx="12" fill="url(#cjsGrad)" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="330" height="6" rx="3" fill="#f43f5e" />
    <text x="20" y="30" class="header" fill="#f43f5e">CommonJS (CJS)</text>
    <text x="20" y="48" class="desc">Traditional Node.js module standard</text>

    <g transform="translate(15, 70)">
      <rect width="300" height="190" rx="8" fill="#1c0a0f" stroke="#f43f5e" stroke-width="1" stroke-opacity="0.1" />
      
      <!-- CJS core characteristics -->
      <text x="15" y="30" class="lbl">• Execution: <tspan fill="#f43f5e" font-weight="bold">Synchronous</tspan></text>
      <text x="15" y="55" class="lbl">• Resolution: <tspan fill="#f43f5e" font-weight="bold">At Runtime</tspan> (dynamic loading)</text>
      <text x="15" y="80" class="lbl">• Exports: <tspan fill="#cbd5e1" font-weight="bold">Values copied</tspan> (by value snapshot)</text>
      <text x="15" y="105" class="lbl">• Syntax:</text>
      
      <rect x="15" y="115" width="270" height="60" rx="4" fill="#0f0205" />
      <text x="25" y="132" class="code" fill="#f472b6">const <tspan fill="#e2e8f0">mod</tspan> = require(<tspan fill="#60a5fa">"./lib"</tspan>);</text>
      <text x="25" y="152" class="code" fill="#f472b6">module.exports = <tspan fill="#e2e8f0">{ data }</tspan>;</text>
    </g>
  </g>

  <!-- ES MODULES CARD (RIGHT) -->
  <g filter="url(#boxShadow)" transform="translate(430, 110)">
    <rect width="330" height="280" rx="12" fill="url(#esmGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="330" height="6" rx="3" fill="#3b82f6" />
    <text x="20" y="30" class="header" fill="#3b82f6">ES Modules (ESM)</text>
    <text x="20" y="48" class="desc">Modern standardized JavaScript module system</text>

    <g transform="translate(15, 70)">
      <rect width="300" height="190" rx="8" fill="#0c122c" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.1" />
      
      <!-- ESM core characteristics -->
      <text x="15" y="30" class="lbl">• Execution: <tspan fill="#60a5fa" font-weight="bold">Asynchronous</tspan></text>
      <text x="15" y="55" class="lbl">• Resolution: <tspan fill="#60a5fa" font-weight="bold">Static Analysis</tspan> (before execution)</text>
      <text x="15" y="80" class="lbl">• Exports: <tspan fill="#cbd5e1" font-weight="bold">Live Bindings</tspan> (by reference)</text>
      <text x="15" y="105" class="lbl">• Syntax:</text>
      
      <rect x="15" y="115" width="270" height="60" rx="4" fill="#040717" />
      <text x="25" y="132" class="code" fill="#60a5fa">import <tspan fill="#e2e8f0">{ mod }</tspan> from <tspan fill="#f472b6">"./lib.js"</tspan>;</text>
      <text x="25" y="152" class="code" fill="#60a5fa">export const <tspan fill="#e2e8f0">data</tspan> = value;</text>
    </g>
  </g>
</svg>
