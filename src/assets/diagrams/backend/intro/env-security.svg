<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="900" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Environment Variables &amp; Security</text>

  <!-- BAD PRACTICE side -->
  <rect x="20" y="55" width="410" height="420" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2.5"/>
  <rect x="20" y="55" width="410" height="38" rx="12" fill="#ef4444"/>
  <rect x="20" y="80" width="410" height="13" fill="#ef4444"/>
  <text x="225" y="81" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">❌ BAD PRACTICE — Hardcoded Secrets</text>

  <rect x="35" y="105" width="380" height="130" rx="8" fill="#0f172a"/>
  <text x="55" y="125" fill="#94a3b8" font-size="11">// server.js — committed to GitHub!</text>
  <text x="55" y="145" fill="#c7d2fe" font-size="11">const pool = new Pool({</text>
  <text x="55" y="162" fill="#f87171" font-size="11">  password: <tspan fill="#fbbf24">"myS3cr3tP@ss"</tspan>,</text>
  <text x="55" y="179" fill="#f87171" font-size="11">  database: <tspan fill="#fbbf24">"mydb"</tspan>,</text>
  <text x="55" y="196" fill="#f87171" font-size="11">  host: <tspan fill="#fbbf24">"prod-db.amazonaws.com"</tspan></text>
  <text x="55" y="213" fill="#c7d2fe" font-size="11">});</text>

  <!-- Skull/danger indicator -->
  <text x="225" y="268" text-anchor="middle" fill="#ef4444" font-size="28">☠️</text>
  <text x="225" y="295" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="600">Secret is now PUBLIC on GitHub!</text>
  <text x="225" y="315" text-anchor="middle" fill="#fca5a5" font-size="11">Bots scan GitHub for passwords</text>
  <text x="225" y="333" text-anchor="middle" fill="#fca5a5" font-size="11">within seconds of a push</text>

  <!-- github icon bad -->
  <rect x="80" y="350" width="290" height="60" rx="8" fill="#450a0a"/>
  <text x="90" y="371" fill="#f87171" font-size="12">📦 GitHub Repo (PUBLIC)</text>
  <text x="90" y="391" fill="#fca5a5" font-size="11">server.js contains: password="myS3cr3tP@ss"</text>
  <text x="90" y="407" fill="#ef4444" font-size="10">⚠️  Anyone can see your database password!</text>

  <!-- GOOD PRACTICE side -->
  <rect x="470" y="55" width="410" height="420" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
  <rect x="470" y="55" width="410" height="38" rx="12" fill="#10b981"/>
  <rect x="470" y="80" width="410" height="13" fill="#10b981"/>
  <text x="675" y="81" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">✅ GOOD PRACTICE — Environment Variables</text>

  <!-- .env file box -->
  <rect x="485" y="105" width="170" height="110" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="570" y="123" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">.env file (local only)</text>
  <text x="500" y="143" fill="#6ee7b7" font-size="11">DB_PASSWORD=myS3cr3tP@ss</text>
  <text x="500" y="160" fill="#6ee7b7" font-size="11">DB_HOST=prod-db...</text>
  <text x="500" y="177" fill="#6ee7b7" font-size="11">DB_NAME=mydb</text>
  <text x="500" y="200" fill="#94a3b8" font-size="10">Never committed to git</text>

  <!-- dotenv box -->
  <rect x="670" y="105" width="190" height="110" rx="8" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
  <text x="765" y="123" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="600">server.js (safe to commit)</text>
  <text x="685" y="143" fill="#c7d2fe" font-size="10">require('dotenv').config()</text>
  <text x="685" y="160" fill="#c7d2fe" font-size="10">const pool = new Pool({</text>
  <text x="685" y="177" fill="#a5f3fc" font-size="10">  password:</text>
  <text x="685" y="194" fill="#a5f3fc" font-size="10">  process.env.DB_PASSWORD</text>
  <text x="685" y="208" fill="#c7d2fe" font-size="10">})</text>

  <!-- Arrow .env -> server.js -->
  <defs>
    <marker id="ga1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="ga2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  <line x1="655" y1="155" x2="668" y2="155" stroke="#10b981" stroke-width="2" marker-end="url(#ga1)"/>
  <text x="661" y="148" text-anchor="middle" fill="#6ee7b7" font-size="9">dotenv</text>
  <text x="661" y="167" text-anchor="middle" fill="#6ee7b7" font-size="9">loads</text>

  <!-- .gitignore blocking .env -->
  <rect x="485" y="235" width="380" height="80" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="675" y="257" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">📋 .gitignore — blocks .env from git</text>
  <text x="675" y="278" text-anchor="middle" fill="#6ee7b7" font-size="11"># .gitignore</text>
  <text x="675" y="296" text-anchor="middle" fill="#a5f3fc" font-size="11">.env</text>
  <text x="675" y="312" text-anchor="middle" fill="#94a3b8" font-size="10">node_modules/</text>

  <!-- blocked arrow -->
  <line x1="570" y1="215" x2="570" y2="233" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="610" y="228" fill="#fbbf24" font-size="10">🚫 blocked by .gitignore</text>

  <!-- GitHub good -->
  <rect x="485" y="330" width="380" height="60" rx="8" fill="#0d2618"/>
  <text x="505" y="351" fill="#10b981" font-size="12">📦 GitHub Repo — server.js pushed</text>
  <text x="505" y="371" fill="#6ee7b7" font-size="11">password: process.env.DB_PASSWORD</text>
  <text x="505" y="387" fill="#6ee7b7" font-size="10">✅ No real secrets — completely safe!</text>

  <!-- Cloud dashboard -->
  <rect x="485" y="400" width="380" height="55" rx="8" fill="#0f172a" stroke="#818cf8" stroke-width="1"/>
  <text x="675" y="420" text-anchor="middle" fill="#818cf8" font-size="11" font-weight="600">☁️ Cloud Dashboard (Railway/Render)</text>
  <text x="675" y="438" text-anchor="middle" fill="#c7d2fe" font-size="10">Set DB_PASSWORD=myS3cr3tP@ss here</text>
  <text x="675" y="452" text-anchor="middle" fill="#94a3b8" font-size="10">Injected securely at runtime — never in code</text>
</svg>
