<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node colors -->
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="raceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>
    <linearGradient id="effectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="cleanupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EC4899" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .flow-label { font-family: 'Fira Code', monospace; font-size: 8.5px; fill: #E2E8F0; font-weight: 600; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">EFFECT CLEANUPS &amp; RACE CONDITIONS</text>
    <text class="subtitle" x="0" y="18">SOLVING ASYNCHRONOUS MUTATIONS, DOUBLE INVOCATIONS IN STRICT MODE, AND IGNORING STALE NETWORK PROMISES</text>
  </g>

  <!-- Render #1 (Blue) -->
  <g transform="translate(60, 160)">
    <rect width="160" height="85" rx="8" fill="#111827" stroke="#0EA5E9" stroke-width="2" />
    <rect width="160" height="4" fill="url(#renderGrad)" />
    <text class="node-title" x="12" y="22">1. Render #1 (userId: A)</text>
    <text class="node-sub" x="12" y="42">Triggers Fetch(A)</text>
    <text class="node-sub" x="12" y="56">Active flag: true</text>
    <text class="node-sub" x="12" y="70" fill="#38BDF8">Network Request A started</text>
  </g>

  <!-- State Transition to Render #2 -->
  <path d="M220,202 L332,202" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowBlue)" />
  <text class="flow-label" x="230" y="190" fill="#94A3B8">Prop change (A -> B)</text>

  <!-- Render #2 (Pink) -->
  <g transform="translate(340, 160)">
    <rect width="160" height="85" rx="8" fill="#111827" stroke="#EC4899" stroke-width="2" />
    <rect width="160" height="4" fill="url(#raceGrad)" />
    <text class="node-title" x="12" y="22">2. Render #2 (userId: B)</text>
    <text class="node-sub" x="12" y="42">Triggers Fetch(B)</text>
    <text class="node-sub" x="12" y="56">Active flag: true</text>
    <text class="node-sub" x="12" y="70" fill="#F472B6">Network Request B started</text>
  </g>

  <!-- Cleanup #1 Execution (Red) -->
  <g transform="translate(60, 310)">
    <rect width="160" height="85" rx="8" fill="#111827" stroke="#EF4444" stroke-width="2" />
    <rect width="160" height="4" fill="url(#cleanupGrad)" />
    <text class="node-title" x="12" y="22">3. Cleanup (Render #1)</text>
    <text class="node-sub" x="12" y="42">Runs before Render #2's effect</text>
    <text class="node-sub" x="12" y="58" fill="#F87171">Sets Render #1 active = false</text>
  </g>

  <!-- Connect Render #2 entry to cleanup run -->
  <path d="M340,225 L230,312" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
  <text class="flow-label" x="240" y="260" fill="#EF4444">1. Run Cleanup</text>

  <!-- Connect Cleanup to Network A resolving -->
  <path d="M140,395 L140,430 L530,430 L530,345" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowRed)" />
  <text class="flow-label" x="250" y="420" fill="#F87171">Fetch A completes LATE, active = false -> IGNORED (Prevents race condition!)</text>

  <!-- Network Promises resolving -->
  <g transform="translate(560, 230)">
    <rect width="280" height="130" rx="8" fill="#111827" stroke="#F59E0B" stroke-width="2" />
    <rect width="280" height="4" fill="url(#effectGrad)" />
    <text class="node-title" x="12" y="22">Network Resolution Engine</text>
    <text class="node-sub" x="12" y="45" fill="#F87171">1. [A] resolves in 5s (late)</text>
    <text class="node-sub" x="32" y="58" fill="#94A3B8">Since active === false, state write is SKIPPED.</text>
    
    <text class="node-sub" x="12" y="80" fill="#4ADE80">2. [B] resolves in 1s (fast)</text>
    <text class="node-sub" x="32" y="93" fill="#94A3B8">Since active === true, state is set with B!</text>
  </g>

  <!-- Connect Render #2 to Network Resolving B -->
  <path d="M500,202 L560,245" fill="none" stroke="#4ADE80" stroke-width="1.5" marker-end="url(#arrowBlue)" />

  <!-- Footnote -->
  <text x="40" y="475" font-family="'Inter', system-ui, sans-serif" font-size="10.5px" fill="#475569">Double Invocation in Strict Mode serves to immediately catch missing cleanups by executing: Mount -> Unmount (Cleanup) -> Mount.</text>
</svg>
