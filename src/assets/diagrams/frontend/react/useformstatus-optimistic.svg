<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a12" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0c0e1a" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #38bdf8; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #2dd4bf; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">React 19: Form Status &amp; Optimistic UI Flow</text>
  <text x="30" y="63" class="subtitle">Contextual parent form tracking (useFormStatus) combined with preemptive user feedback rendering (useOptimistic).</text>

  <!-- LEFT PANEL: useFormStatus Context Flow -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="95" width="340" height="320" rx="12" fill="url(#glassState)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="125" class="header-text" fill="#38bdf8">useFormStatus (Context-driven)</text>
    <text x="50" y="145" class="desc">Reads active parent &lt;form&gt; state implicitly.</text>

    <!-- Parent Form Box -->
    <rect x="50" y="170" width="300" height="70" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
    <text x="65" y="195" class="state-title" fill="#e2e8f0">&lt;form action={submitAction}&gt;</text>
    <text x="65" y="215" class="meta">Executes async submission Action...</text>

    <!-- Implicit Context Arrow -->
    <path d="M 200 240 L 200 280" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="3 3" />
    <polygon points="200,280 196,272 204,272" fill="#0ea5e9" />
    <text x="210" y="265" class="meta" fill="#0ea5e9">Context Boundary</text>

    <!-- Child Button Box -->
    <rect x="50" y="295" width="300" height="95" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1" />
    <text x="65" y="320" class="state-title">Nested Button / Input Component</text>
    <text x="65" y="342" class="desc" font-family="monospace" font-size="10" fill="#38bdf8">const { pending, data, method } = useFormStatus();</text>
    <text x="65" y="365" class="meta">Disables itself or shows loaders without prop-drilling!</text>
  </g>

  <!-- RIGHT PANEL: useOptimistic Lifecycle Flow -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="95" width="360" height="320" rx="12" fill="url(#glassState)" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="430" y="125" class="header-text">useOptimistic (Preemptive State)</text>
    <text x="430" y="145" class="desc">Updates UI instantly, validating when async completes.</text>

    <!-- Step 1: Add Item -->
    <rect x="430" y="175" width="320" height="48" rx="6" fill="#115e59" stroke="#2dd4bf" stroke-width="1" />
    <text x="445" y="195" class="desc" font-weight="700" fill="#2dd4bf">1. Action Triggered</text>
    <text x="445" y="210" class="meta" fill="#ccfbf1">Optimistic item added instantly to the list at 60 FPS.</text>

    <!-- Step 2: Server Verification -->
    <rect x="430" y="235" width="320" height="48" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="1" />
    <text x="445" y="255" class="desc" font-weight="700" fill="#fbbf24">2. Server Async Processing</text>
    <text x="445" y="270" class="meta" fill="#fef3c7">Awaiting database validation / network request...</text>

    <!-- Step 3: Success or Rollback -->
    <g filter="url(#boxShadow)">
      <rect x="430" y="295" width="150" height="95" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1" />
      <text x="440" y="320" class="desc" font-weight="700" fill="#34d399">3A. Success Commit</text>
      <text x="440" y="340" class="meta" fill="#a7f3d0">Real DB state</text>
      <text x="440" y="355" class="meta" fill="#a7f3d0">overwrites optimistic</text>
      <text x="440" y="370" class="meta" fill="#a7f3d0">value permanently.</text>
    </g>

    <g filter="url(#boxShadow)">
      <rect x="600" y="295" width="150" height="95" rx="6" fill="#4c0519" stroke="#fb7185" stroke-width="1" />
      <text x="610" y="320" class="desc" font-weight="700" fill="#fda4af">3B. Rejection Rollback</text>
      <text x="610" y="340" class="meta" fill="#fecdd3">Action fails. React</text>
      <text x="610" y="355" class="meta" fill="#fecdd3">automatically rolls</text>
      <text x="610" y="370" class="meta" fill="#fecdd3">back to original state.</text>
    </g>
  </g>
</svg>
