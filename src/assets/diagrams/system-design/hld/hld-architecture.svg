<svg viewBox="0 0 800 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b72cb" />
      <stop offset="100%" stop-color="#d96570" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24bdff" />
      <stop offset="100%" stop-color="#4285f4" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34a853" />
      <stop offset="100%" stop-color="#00d084" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d0d0f" rx="16" />
  <rect width="100%" height="100%" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" rx="16" />

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.015)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
  </g>

  <!-- DNS / Client -->
  <g filter="url(#shadow)">
    <circle cx="90" cy="200" r="40" fill="url(#blueGrad)" opacity="0.9" />
    <circle cx="90" cy="200" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="90" y="204" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Users / Client</text>
  </g>

  <!-- Load Balancer -->
  <g filter="url(#shadow)">
    <rect x="230" y="100" width="100" height="200" rx="12" fill="url(#purpleGrad)" opacity="0.9" />
    <rect x="230" y="100" width="100" height="200" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="280" y="190" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Nginx</text>
    <text x="280" y="210" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Load</text>
    <text x="280" y="230" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Balancer</text>
  </g>

  <!-- Web Servers (Scalability) -->
  <g filter="url(#shadow)">
    <!-- Server 1 -->
    <rect x="420" y="60" width="150" height="70" rx="8" fill="#1e1e24" stroke="rgba(255,255,255,0.08)" />
    <text x="495" y="95" fill="#f1f1f1" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">App Server #1</text>
    <text x="495" y="112" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Stateless (NodeJS)</text>

    <!-- Server 2 -->
    <rect x="420" y="165" width="150" height="70" rx="8" fill="#1e1e24" stroke="rgba(255,255,255,0.08)" />
    <text x="495" y="200" fill="#f1f1f1" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">App Server #2</text>
    <text x="495" y="217" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Stateless (NodeJS)</text>

    <!-- Server 3 -->
    <rect x="420" y="270" width="150" height="70" rx="8" fill="#1e1e24" stroke="rgba(255,255,255,0.08)" />
    <text x="495" y="305" fill="#f1f1f1" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">App Server #3</text>
    <text x="495" y="322" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">Stateless (NodeJS)</text>
  </g>

  <!-- Database Cluster -->
  <g filter="url(#shadow)">
    <rect x="650" y="120" width="120" height="160" rx="12" fill="url(#greenGrad)" opacity="0.9" />
    <rect x="650" y="120" width="120" height="160" rx="12" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <text x="710" y="170" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Postgres</text>
    <text x="710" y="195" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Primary</text>
    <rect x="665" y="215" width="90" height="20" rx="4" fill="rgba(0,0,0,0.25)" />
    <text x="710" y="228" fill="#fff" font-family="monospace" font-size="9" text-anchor="middle">Read / Write</text>
  </g>

  <!-- Connection paths -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none">
    <path d="M 130 200 L 230 200" />
    <polygon points="230,200 220,195 220,205" fill="rgba(255,255,255,0.6)" stroke="none" />

    <!-- LB to App Servers -->
    <path d="M 330 200 L 375 200 L 375 95 L 420 95" />
    <polygon points="420,95 410,90 410,100" fill="rgba(255,255,255,0.6)" stroke="none" />

    <path d="M 330 200 L 420 200" />
    <polygon points="420,200 410,195 410,205" fill="rgba(255,255,255,0.6)" stroke="none" />

    <path d="M 330 200 L 375 200 L 375 305 L 420 305" />
    <polygon points="420,305 410,300 410,310" fill="rgba(255,255,255,0.6)" stroke="none" />

    <!-- App Servers to DB -->
    <path d="M 570 95 L 610 95 L 610 200 L 650 200" />
    <polygon points="650,200 640,195 640,205" fill="rgba(255,255,255,0.6)" stroke="none" />

    <path d="M 570 200 L 650 200" />
    <polygon points="650,200 640,195 640,205" fill="rgba(255,255,255,0.6)" stroke="none" />

    <path d="M 570 305 L 610 305 L 610 200 L 650 200" />
    <polygon points="650,200 640,195 640,205" fill="rgba(255,255,255,0.6)" stroke="none" />
  </g>

  <!-- Labels -->
  <text x="180" y="185" fill="#24bdff" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">HTTPS REQ</text>
  <text x="375" y="50" fill="#9b72cb" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">ROUND ROBIN</text>

</svg>
