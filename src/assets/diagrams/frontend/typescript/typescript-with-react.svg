<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Glassmorphic Card Gradients -->
    <linearGradient id="glassBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="glassOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.03" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .card-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; }
    .keyword { fill: #f472b6; font-weight: bold; }
    .type-name { fill: #fbbf24; }
    .react-kw { fill: #38bdf8; font-weight: bold; }
    .comment { fill: #64748b; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">TypeScript with React</text>
  <text x="30" y="65" class="subtitle">Enforcing compile-time safety across component props, state hooks, events, and DOM elements</text>

  <!-- ==================== LEFT CARD: PROPS & STATE ==================== -->
  <g filter="url(#boxShadow)" transform="translate(30, 95)">
    <rect width="350" height="290" rx="12" fill="url(#glassBlue)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="350" height="6" rx="3" fill="#38bdf8" />
    <text x="20" y="30" class="card-title" fill="#38bdf8">1. Strict Component &amp; State Contracts</text>

    <!-- Code Block -->
    <rect x="15" y="55" width="320" height="215" rx="8" fill="#050a14" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.1" />

    <text x="25" y="80" class="code-text" fill="#cbd5e1">
      <tspan class="keyword">interface</tspan> InputProps {
    </text>
    <text x="35" y="100" class="code-text" fill="#94a3b8">
      label: <tspan fill="#fbbf24">string</tspan>;
    </text>
    <text x="35" y="120" class="code-text" fill="#94a3b8">
      value: <tspan fill="#fbbf24">string</tspan>;
    </text>
    <text x="35" y="140" class="code-text" fill="#94a3b8">
      onChange: (v: <tspan fill="#fbbf24">string</tspan>) =&gt; void;
    </text>
    <text x="25" y="160" class="code-text" fill="#cbd5e1">
      }
    </text>
    
    <text x="25" y="190" class="code-text" fill="#cbd5e1">
      <tspan class="keyword">const</tspan> [data, setData] =
    </text>
    <text x="35" y="210" class="code-text" fill="#cbd5e1">
      useState&lt;<tspan class="type-name">User | null</tspan>&gt;(<tspan fill="#f43f5e">null</tspan>);
    </text>
    
    <text x="25" y="240" class="code-text comment">// Enforces precise generic data bounds</text>
  </g>

  <!-- ==================== RIGHT CARD: EVENT & DOM REF ==================== -->
  <g filter="url(#boxShadow)" transform="translate(420, 95)">
    <rect width="350" height="290" rx="12" fill="url(#glassOrange)" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="350" height="6" rx="3" fill="#fb923c" />
    <text x="20" y="30" class="card-title" fill="#fb923c">2. Strict Event &amp; DOM Ref Generics</text>

    <!-- Code Block -->
    <rect x="15" y="55" width="320" height="215" rx="8" fill="#090502" stroke="#fb923c" stroke-width="1" stroke-opacity="0.1" />

    <text x="25" y="80" class="code-text" fill="#cbd5e1">
      <tspan class="keyword">const</tspan> inputRef =
    </text>
    <text x="35" y="100" class="code-text" fill="#cbd5e1">
      useRef&lt;<tspan class="react-kw">HTMLInputElement</tspan>&gt;(<tspan fill="#f43f5e">null</tspan>);
    </text>
    
    <text x="25" y="135" class="code-text" fill="#cbd5e1">
      <tspan class="keyword">const</tspan> handleChange = (
    </text>
    <text x="35" y="155" class="code-text" fill="#cbd5e1">
      e: React.<tspan class="react-kw">ChangeEvent</tspan>&lt;<tspan class="react-kw">HTMLInputElement</tspan>&gt;
    </text>
    <text x="25" y="175" class="code-text" fill="#cbd5e1">
      ) =&gt; {
    </text>
    <text x="35" y="195" class="code-text" fill="#cbd5e1">
      console.log(e.target.value);
    </text>
    <text x="25" y="215" class="code-text" fill="#cbd5e1">
      };
    </text>

    <text x="25" y="242" class="code-text comment">// Perfect browser element typing!</text>
  </g>
</svg>
