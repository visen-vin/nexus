<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="pendingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="fulfilledGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="rejectedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <linearGradient id="constructorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glowPending" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowFulfilled" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRejected" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowPending" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7C3AED" />
    </marker>
    <marker id="arrowFulfilled" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981" />
    </marker>
    <marker id="arrowRejected" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 15px; fill: #FFFFFF; }
    .node-desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #E2E8F0; opacity: 0.85; }
    .node-state { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #94A3B8; font-weight: 600; }
    .label-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; font-weight: 600; }
    .label-bg { rx: 4px; }
    .method-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; font-weight: bold; fill: #FFFFFF; }
  </style>

  <!-- Outer container with rounded corners -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="900" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="900" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">PROMISE RUNTIME STATE MACHINE</text>
    <text class="subtitle" x="0" y="18">INTERACTIVE LIFECYCLE &amp; CONSUMER CHAINING</text>
  </g>

  <!-- Node 1: Constructor -->
  <g transform="translate(50, 210)">
    <!-- Box Shadow / Glow -->
    <rect width="180" height="80" rx="10" fill="#0D1527" stroke="#334155" stroke-width="2" />
    <rect width="180" height="8" rx="0" fill="url(#constructorGrad)" clip-path="inset(0 0 72 0)" />
    <text class="node-text" x="20" y="38">new Promise()</text>
    <text class="node-state" x="20" y="58">Executor Function</text>
  </g>

  <!-- Arrow: Constructor to Pending -->
  <path d="M230,250 L275,250" stroke="#475569" stroke-width="2" marker-end="url(#arrowMuted)" stroke-dasharray="4,4" />

  <!-- Node 2: Pending State -->
  <g transform="translate(290, 200)" filter="url(#glowPending)">
    <rect width="160" height="100" rx="12" fill="#1E1E38" stroke="#6366F1" stroke-width="2.5" />
    <!-- Dynamic dots decoration -->
    <circle cx="20" cy="20" r="4" fill="#6366F1" />
    <circle cx="32" cy="20" r="4" fill="#818CF8" opacity="0.6" />
    <circle cx="44" cy="20" r="4" fill="#A5B4FC" opacity="0.3" />
    
    <text class="node-text" x="20" y="50">PENDING</text>
    <text class="node-state" x="20" y="70">state: "pending"</text>
    <text class="node-desc" x="20" y="85">Result: undefined</text>
  </g>

  <!-- Transition Arrow: Pending to Fulfilled -->
  <path d="M450,230 C490,200 520,165 570,165" fill="none" stroke="#10B981" stroke-width="3" marker-end="url(#arrowFulfilled)" />
  <!-- Transition Label: resolve(value) -->
  <g transform="translate(465, 155)">
    <rect class="label-bg" x="0" y="0" width="105" height="22" fill="#064E3B" stroke="#059669" stroke-width="1" />
    <text class="label-text" x="8" y="15" fill="#34D399">resolve(value)</text>
  </g>

  <!-- Transition Arrow: Pending to Rejected -->
  <path d="M450,270 C490,300 520,335 570,335" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrowRejected)" />
  <!-- Transition Label: reject(error) -->
  <g transform="translate(465, 320)">
    <rect class="label-bg" x="0" y="0" width="105" height="22" fill="#7F1D1D" stroke="#DC2626" stroke-width="1" />
    <text class="label-text" x="8" y="15" fill="#FCA5A5">reject(error)</text>
  </g>

  <!-- Node 3: Fulfilled State -->
  <g transform="translate(585, 110)" filter="url(#glowFulfilled)">
    <rect width="180" height="95" rx="12" fill="#0A2F25" stroke="#10B981" stroke-width="2.5" />
    <!-- Checkmark SVG Decor -->
    <circle cx="155" cy="25" r="9" fill="#10B981" />
    <path d="M151,25 L154,28 L160,22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
    
    <text class="node-text" x="20" y="45">FULFILLED</text>
    <text class="node-state" x="20" y="65">state: "fulfilled"</text>
    <text class="node-desc" x="20" y="80">Result: locked value</text>
  </g>

  <!-- Node 4: Rejected State -->
  <g transform="translate(585, 290)" filter="url(#glowRejected)">
    <rect width="180" height="95" rx="12" fill="#450A0A" stroke="#EF4444" stroke-width="2.5" />
    <!-- Cross SVG Decor -->
    <circle cx="155" cy="25" r="9" fill="#EF4444" />
    <path d="M151,21 L159,29 M159,21 L151,29" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />

    <text class="node-text" x="20" y="45">REJECTED</text>
    <text class="node-state" x="20" y="65">state: "rejected"</text>
    <text class="node-desc" x="20" y="80">Result: locked error</text>
  </g>

  <!-- Handlers and Chaining -->
  <!-- Line from Fulfilled to then -->
  <path d="M765,157 L810,157" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowFulfilled)" />
  <g transform="translate(795, 120)">
    <rect x="-10" y="22" width="70" height="30" rx="6" fill="#1E293B" stroke="#059669" stroke-width="1.5" />
    <text class="method-text" x="2" y="42">.then()</text>
  </g>

  <!-- Line from Rejected to catch -->
  <path d="M765,337 L810,337" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowRejected)" />
  <g transform="translate(795, 300)">
    <rect x="-10" y="22" width="75" height="30" rx="6" fill="#1E293B" stroke="#DC2626" stroke-width="1.5" />
    <text class="method-text" x="-1" y="42">.catch()</text>
  </g>

  <!-- Finally link at the end -->
  <path d="M825,177 L825,290" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="2,2" />
  <g transform="translate(780, 222)">
    <rect width="90" height="35" rx="6" fill="#0F172A" stroke="#475569" stroke-width="1.5" />
    <text class="method-text" x="10" y="22" font-size="12">.finally()</text>
  </g>

  <!-- Footnote -->
  <text x="40" y="465" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: Once settled (fulfilled or rejected), a Promise is locked and its state cannot be transitioned again.</text>
</svg>
