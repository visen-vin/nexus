<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="syncCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="cbCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#78350f" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="promiseCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .code { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #f472b6; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">File System (FS) API Flavors</text>
  <text x="30" y="65" class="subtitle">Comparing blocking synchronous methods, asynchronous callback routing, and modern Promise-based wrappers</text>

  <!-- 1. SYNCHRONOUS FS CARD (LEFT) -->
  <g filter="url(#boxShadow)" transform="translate(30, 120)">
    <rect width="230" height="260" rx="12" fill="url(#syncCard)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#ef4444" />
    <text x="20" y="30" class="header" fill="#ef4444">1. Synchronous API</text>
    <text x="20" y="48" class="desc">Blocks the Main Thread Completely</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#1f0a0d" stroke="#ef4444" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#fca5a5">Mechanics:</text>
    <text x="25" y="115" class="desc" fill="#fca5a5">Exposes fs.readFileSync()</text>
    <text x="25" y="130" class="desc" fill="#fca5a5">Stops V8 compilation stack</text>
    <text x="25" y="145" class="desc" fill="#fca5a5">No Thread Pool used</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#0f0204" />
    <text x="35" y="188" class="code">fs.readFileSync(</text>
    <text x="35" y="204" class="code">  "path.txt"</text>
    <text x="100" y="204" class="code">);</text>
  </g>

  <!-- 2. CALLBACK FS CARD (MIDDLE) -->
  <g filter="url(#boxShadow)" transform="translate(285, 120)">
    <rect width="230" height="260" rx="12" fill="url(#cbCard)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#f59e0b" />
    <text x="20" y="30" class="header" fill="#f59e0b">2. Callback API</text>
    <text x="20" y="48" class="desc">Asynchronous Thread Pool Routing</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#291505" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#fde68a">Mechanics:</text>
    <text x="25" y="115" class="desc" fill="#fde68a">Exposes fs.readFile()</text>
    <text x="25" y="130" class="desc" fill="#fde68a">Dispatches to libuv Thread</text>
    <text x="25" y="145" class="desc" fill="#fde68a">Error-first callback structure</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#0f0500" />
    <text x="35" y="188" class="code">fs.readFile("path",</text>
    <text x="35" y="204" class="code">  (err, data) => {}</text>
    <text x="135" y="204" class="code">);</text>
  </g>

  <!-- 3. PROMISES FS CARD (RIGHT) -->
  <g filter="url(#boxShadow)" transform="translate(540, 120)">
    <rect width="230" height="260" rx="12" fill="url(#promiseCard)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#10b981" />
    <text x="20" y="30" class="header" fill="#10b981">3. Promises API</text>
    <text x="20" y="48" class="desc">Modern Async/Await Pattern</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#022c22" stroke="#10b981" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#a7f3d0">Mechanics:</text>
    <text x="25" y="115" class="desc" fill="#a7f3d0">Exposes fs/promises module</text>
    <text x="25" y="130" class="desc" fill="#a7f3d0">Wraps libuv tasks in Promises</text>
    <text x="25" y="145" class="desc" fill="#a7f3d0">Clean async/await control flow</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#02120a" stroke="#059669" stroke-width="1" />
    <text x="35" y="188" class="code" fill="#34d399">await fs.readFile(</text>
    <text x="35" y="204" class="code" fill="#34d399">  "path.txt"</text>
    <text x="110" y="204" class="code" fill="#34d399">);</text>
  </g>
</svg>
