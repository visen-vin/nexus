<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Block Gradients -->
    <linearGradient id="fiberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="batchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowRoot" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .header-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #F8FAFC; }
    .node-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .node-code { font-family: 'Fira Code', monospace; font-size: 8.5px; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">USESTATE HOOK UNDER THE HOOD MECHANICS</text>
    <text class="subtitle" x="0" y="18">MEMOIZED HOOKS LINKED LIST &amp; AUTOMATIC STATE BATCHING QUEUES</text>
  </g>

  <!-- LEFT: Hooks Linked List (Fiber Internals) -->
  <g transform="translate(40, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#EC4899">1. Fiber Hooks Linked List</text>
    
    <!-- Fiber Node -->
    <g transform="translate(20, 60)">
      <rect width="100" height="50" rx="6" fill="#1E293B" stroke="#EC4899" stroke-width="1.5" />
      <text class="node-label" x="12" y="22">Fiber Node</text>
      <text class="node-sub" x="12" y="38">memoizedState</text>
    </g>

    <!-- Hook 1 -->
    <g transform="translate(180, 60)" filter="url(#glowRoot)">
      <rect width="170" height="70" rx="6" fill="#1E293B" stroke="#0EA5E9" stroke-width="2" />
      <rect width="170" height="4" fill="url(#hookGrad)" />
      <text class="node-label" x="12" y="22">Hook #1: useState</text>
      <text class="node-sub" x="12" y="42">memoizedState: 0 (count)</text>
      <text class="node-sub" x="12" y="58">next: Hook #2 --&gt;</text>
    </g>

    <!-- Hook 2 -->
    <g transform="translate(180, 160)">
      <rect width="170" height="70" rx="6" fill="#1E293B" stroke="#0EA5E9" stroke-width="1.5" />
      <text class="node-label" x="12" y="22">Hook #2: useState</text>
      <text class="node-sub" x="12" y="42">memoizedState: false (flag)</text>
      <text class="node-sub" x="12" y="58">next: null</text>
    </g>

    <!-- Connectors -->
    <path d="M120,85 L172,85" fill="none" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowBlue)" />
    <path d="M265,130 L265,152" fill="none" stroke="#0EA5E9" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  </g>

  <!-- RIGHT: Automatic Batching Queue -->
  <g transform="translate(480, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#A855F7">2. Automatic State Batching (React 18)</text>
    
    <!-- State Setters inside Click handler -->
    <g transform="translate(20, 60)">
      <rect width="160" height="170" rx="6" fill="#1E293B" stroke="#4B5563" stroke-width="1.5" />
      <text class="node-label" x="12" y="22">Event Handler</text>
      <text class="node-sub" x="12" y="42">handleClick() {</text>
      <text class="node-code" x="12" y="65">  setCount(c =&gt; c + 1)</text>
      <text class="node-code" x="12" y="85">  setFlag(f =&gt; !f)</text>
      <text class="node-code" x="12" y="105">  // Promises/setTimeout</text>
      <text class="node-code" x="12" y="125">  // also batched!</text>
      <text class="node-sub" x="12" y="150">}</text>
    </g>

    <!-- Batched Updates queue -->
    <g transform="translate(230, 95)" filter="url(#glowRoot)">
      <rect width="130" height="100" rx="6" fill="#1E293B" stroke="#A855F7" stroke-width="2" />
      <rect width="130" height="4" fill="url(#batchGrad)" />
      <text class="node-label" x="12" y="22">Reconciler</text>
      <text class="node-sub" x="12" y="45">Aggregated in</text>
      <text class="node-sub" x="12" y="62">Microtask Queue</text>
      <text class="node-sub" x="12" y="85" fill="#A855F7">Trigger: 1 Render</text>
    </g>

    <!-- Connection Arrow -->
    <path d="M180,145 L222,145" fill="none" stroke="#A855F7" stroke-width="2.5" marker-end="url(#arrowPurple)" />
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: All hooks are called in the exact same index order on every render. Changing hook execution conditional sequences breaks this index-linked list mapping, causing fatal React runtime crashes.</text>
</svg>
