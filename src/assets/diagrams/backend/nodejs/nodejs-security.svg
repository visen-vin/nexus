<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="540" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Node.js Security Defense Layers</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">OWASP Top-10 Mitigations in Express.js</text>
  
  <!-- Layer 1: Network Layer -->
  <rect x="30" y="75" width="840" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="100" fill="#94a3b8" font-size="11" font-weight="600">LAYER 1 · NETWORK</text>
  <rect x="50" y="108" width="160" height="28" rx="6" fill="url(#blueGrad)"/>
  <text x="130" y="127" text-anchor="middle" fill="white" font-size="11">HTTPS / TLS 1.3</text>
  <rect x="225" y="108" width="160" height="28" rx="6" fill="url(#blueGrad)"/>
  <text x="305" y="127" text-anchor="middle" fill="white" font-size="11">HSTS Headers</text>
  <rect x="400" y="108" width="160" height="28" rx="6" fill="url(#blueGrad)"/>
  <text x="480" y="127" text-anchor="middle" fill="white" font-size="11">Rate Limiting</text>
  <rect x="575" y="108" width="160" height="28" rx="6" fill="url(#blueGrad)"/>
  <text x="655" y="127" text-anchor="middle" fill="white" font-size="11">CORS Policy</text>
  
  <!-- Layer 2: Auth Layer -->
  <rect x="30" y="160" width="840" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="185" fill="#94a3b8" font-size="11" font-weight="600">LAYER 2 · AUTH &amp; IDENTITY</text>
  <rect x="50" y="193" width="200" height="28" rx="6" fill="url(#greenGrad)"/>
  <text x="150" y="212" text-anchor="middle" fill="white" font-size="11">JWT + Refresh Tokens</text>
  <rect x="265" y="193" width="200" height="28" rx="6" fill="url(#greenGrad)"/>
  <text x="365" y="212" text-anchor="middle" fill="white" font-size="11">bcrypt Password Hashing</text>
  <rect x="480" y="193" width="200" height="28" rx="6" fill="url(#greenGrad)"/>
  <text x="580" y="212" text-anchor="middle" fill="white" font-size="11">RBAC / OAuth2</text>
  <rect x="695" y="193" width="155" height="28" rx="6" fill="url(#greenGrad)"/>
  <text x="772" y="212" text-anchor="middle" fill="white" font-size="11">MFA Support</text>
  
  <!-- Layer 3: Input Validation -->
  <rect x="30" y="245" width="840" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="270" fill="#94a3b8" font-size="11" font-weight="600">LAYER 3 · INPUT VALIDATION &amp; SANITIZATION</text>
  <rect x="50" y="278" width="210" height="28" rx="6" fill="url(#orangeGrad)"/>
  <text x="155" y="297" text-anchor="middle" fill="white" font-size="11">Zod / Joi Schema Validation</text>
  <rect x="275" y="278" width="210" height="28" rx="6" fill="url(#orangeGrad)"/>
  <text x="380" y="297" text-anchor="middle" fill="white" font-size="11">DOMPurify (XSS Sanitize)</text>
  <rect x="500" y="278" width="200" height="28" rx="6" fill="url(#orangeGrad)"/>
  <text x="600" y="297" text-anchor="middle" fill="white" font-size="11">Parameterized Queries</text>
  <rect x="715" y="278" width="135" height="28" rx="6" fill="url(#orangeGrad)"/>
  <text x="782" y="297" text-anchor="middle" fill="white" font-size="11">No eval()</text>
  
  <!-- Layer 4: Headers -->
  <rect x="30" y="330" width="840" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="355" fill="#94a3b8" font-size="11" font-weight="600">LAYER 4 · SECURITY HEADERS (Helmet.js)</text>
  <rect x="50" y="363" width="190" height="28" rx="6" fill="#5b21b6"/>
  <text x="145" y="382" text-anchor="middle" fill="white" font-size="11">Content-Security-Policy</text>
  <rect x="255" y="363" width="180" height="28" rx="6" fill="#5b21b6"/>
  <text x="345" y="382" text-anchor="middle" fill="white" font-size="11">X-Frame-Options</text>
  <rect x="450" y="363" width="190" height="28" rx="6" fill="#5b21b6"/>
  <text x="545" y="382" text-anchor="middle" fill="white" font-size="11">X-XSS-Protection</text>
  <rect x="655" y="363" width="195" height="28" rx="6" fill="#5b21b6"/>
  <text x="752" y="382" text-anchor="middle" fill="white" font-size="11">Referrer-Policy</text>
  
  <!-- Layer 5: Monitoring -->
  <rect x="30" y="415" width="840" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="50" y="440" fill="#94a3b8" font-size="11" font-weight="600">LAYER 5 · SECRETS &amp; MONITORING</text>
  <rect x="50" y="448" width="200" height="28" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="150" y="467" text-anchor="middle" fill="#e5e7eb" font-size="11">dotenv + Vault (Secrets)</text>
  <rect x="265" y="448" width="200" height="28" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="365" y="467" text-anchor="middle" fill="#e5e7eb" font-size="11">npm audit + Snyk</text>
  <rect x="480" y="448" width="190" height="28" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="575" y="467" text-anchor="middle" fill="#e5e7eb" font-size="11">Sentry Alerting</text>
  <rect x="685" y="448" width="165" height="28" rx="6" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <text x="767" y="467" text-anchor="middle" fill="#e5e7eb" font-size="11">SIEM / WAF</text>
  
  <!-- Bottom label -->
  <text x="450" y="510" text-anchor="middle" fill="#475569" font-size="11">Defense-in-depth: Every layer independently blocks attack vectors</text>
</svg>
