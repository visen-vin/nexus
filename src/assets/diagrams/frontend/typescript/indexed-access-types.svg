<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>

    <!-- Glassmorphic Gradients -->
    <linearGradient id="glassPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="glassSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#065f46" stop-opacity="0.03" />
    </linearGradient>

    <!-- Arrow Gradients -->
    <linearGradient id="arrowOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="arrowTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <!-- Shadows -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .card-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px; }
    .keyword { fill: #f472b6; font-weight: bold; }
    .type-name { fill: #fbbf24; }
    .prop-name { fill: #38bdf8; }
    .indexer { fill: #f43f5e; font-weight: bold; }
    .comment { fill: #64748b; font-style: italic; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid lines -->
  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">Indexed Access Types</text>
  <text x="30" y="65" class="subtitle">Extracting deep nested types using bracket indexing notation</text>

  <!-- ==================== LEFT CARD: SOURCE TYPE ==================== -->
  <g filter="url(#boxShadow)" transform="translate(30, 95)">
    <rect width="280" height="290" rx="12" fill="url(#glassPrimary)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="280" height="6" rx="3" fill="#38bdf8" />
    <text x="20" y="30" class="card-title" fill="#38bdf8">Source Object Type</text>
    
    <!-- Code box -->
    <rect x="15" y="55" width="250" height="215" rx="8" fill="#090d16" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.1" />

    <text x="25" y="75" class="code-text" fill="#cbd5e1">
      <tspan class="keyword">interface</tspan> UserPayload {
    </text>
    <text x="35" y="95" class="code-text" fill="#94a3b8">
      id: <tspan fill="#fbbf24">number</tspan>;
    </text>
    <text x="35" y="115" class="code-text" fill="#94a3b8">
      <tspan class="prop-name">profile</tspan>: {
    </text>
    <text x="45" y="135" class="code-text" fill="#94a3b8">
      name: <tspan fill="#fbbf24">string</tspan>;
    </text>
    <text x="45" y="155" class="code-text" fill="#94a3b8">
      avatar: <tspan fill="#fbbf24">string</tspan>;
    </text>
    <text x="35" y="175" class="code-text" fill="#cbd5e1">
      };
    </text>
    <text x="35" y="195" class="code-text" fill="#94a3b8">
      <tspan class="prop-name">roles</tspan>: <tspan fill="#fbbf24">string</tspan>[];
    </text>
    <text x="35" y="215" class="code-text" fill="#94a3b8">
      status: <tspan fill="#fbbf24">"active" | "away"</tspan>;
    </text>
    <text x="25" y="235" class="code-text" fill="#cbd5e1">
      }
    </text>
  </g>

  <!-- ==================== MIDDLE SECTION: Type["profile"] ==================== -->
  <!-- Upper Arrow for Profile extraction -->
  <g transform="translate(320, 160)">
    <path d="M0 0 L100 0" fill="none" stroke="url(#arrowOrange)" stroke-width="3" stroke-dasharray="3 3" />
    <polygon points="100,-6 112,0 100,6" fill="#fb923c" />
    
    <rect x="5" y="-32" width="90" height="20" rx="4" fill="#2c1a0c" stroke="#fb923c" stroke-width="1" />
    <text x="50" y="-18" class="code-text" fill="#fdba74" font-weight="bold" text-anchor="middle">["profile"]</text>
  </g>

  <!-- ==================== MIDDLE BOX: EXTRACTED PROFILE ==================== -->
  <g filter="url(#boxShadow)" transform="translate(450, 95)">
    <rect width="320" height="120" rx="12" fill="url(#glassSuccess)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#34d399" />
    <text x="20" y="30" class="card-title" fill="#34d399">Extracted Nested Shape</text>
    
    <rect x="15" y="45" width="290" height="60" rx="8" fill="#02120b" stroke="#34d399" stroke-width="1" stroke-opacity="0.1" />
    
    <text x="25" y="65" class="code-text" fill="#34d399">
      type Profile = UserPayload[<tspan class="indexer">"profile"</tspan>];
    </text>
    <text x="25" y="85" class="code-text" fill="#94a3b8">
      // Evaluates to: { name: string; avatar: string; }
    </text>
  </g>

  <!-- ==================== LOWER SECTION: Type["roles"][number] ==================== -->
  <!-- Lower Arrow for array index extraction -->
  <g transform="translate(320, 300)">
    <path d="M0 0 L100 0" fill="none" stroke="url(#arrowTeal)" stroke-width="3" stroke-dasharray="3 3" />
    <polygon points="100,-6 112,0 100,6" fill="#2dd4bf" />
    
    <rect x="5" y="-32" width="90" height="20" rx="4" fill="#062d29" stroke="#2dd4bf" stroke-width="1" />
    <text x="50" y="-18" class="code-text" fill="#99f6e4" font-weight="bold" text-anchor="middle">["roles"][number]</text>
  </g>

  <!-- ==================== LOWER BOX: EXTRACTED ARRAY ITEM ==================== -->
  <g filter="url(#boxShadow)" transform="translate(450, 245)">
    <rect width="320" height="140" rx="12" fill="url(#glassSuccess)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#34d399" />
    <text x="20" y="30" class="card-title" fill="#34d399">Array Element Extraction</text>
    
    <rect x="15" y="45" width="290" height="80" rx="8" fill="#02120b" stroke="#34d399" stroke-width="1" stroke-opacity="0.1" />

    <text x="25" y="65" class="code-text" fill="#34d399">
      type RoleItem = UserPayload[<tspan class="indexer">"roles"</tspan>][<tspan class="indexer">number</tspan>];
    </text>
    <text x="25" y="90" class="code-text" fill="#94a3b8">
      // 1. UserPayload["roles"] => string[]
    </text>
    <text x="25" y="105" class="code-text" fill="#94a3b8">
      // 2. [number] => string
    </text>
  </g>
</svg>
