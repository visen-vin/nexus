<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="900" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Complete CRUD API Flow</text>

  <!-- REACT FRONTEND -->
  <rect x="20" y="55" width="150" height="380" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <rect x="20" y="55" width="150" height="36" rx="12" fill="#6366f1"/>
  <rect x="20" y="78" width="150" height="13" fill="#6366f1"/>
  <text x="95" y="79" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">React Frontend</text>
  <text x="95" y="112" text-anchor="middle" fill="#c7d2fe" font-size="11">fetch('/api/users')</text>
  <text x="95" y="212" text-anchor="middle" fill="#c7d2fe" font-size="11">POST + body</text>
  <text x="95" y="312" text-anchor="middle" fill="#c7d2fe" font-size="11">PUT + body</text>
  <text x="95" y="387" text-anchor="middle" fill="#c7d2fe" font-size="11">DELETE /users/1</text>

  <!-- API ROUTES BOX -->
  <rect x="215" y="55" width="470" height="380" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">Express API Routes</text>

  <!-- GET route -->
  <rect x="230" y="88" width="440" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="230" y="88" width="80" height="64" rx="8" fill="#10b981" opacity="0.9"/>
  <text x="270" y="124" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">GET</text>
  <text x="500" y="110" text-anchor="middle" fill="#a5f3fc" font-size="12">/api/users</text>
  <text x="500" y="130" text-anchor="middle" fill="#6ee7b7" font-size="11">SELECT * FROM users</text>
  <text x="500" y="146" text-anchor="middle" fill="#94a3b8" font-size="10">Returns all users as JSON array</text>

  <!-- POST route -->
  <rect x="230" y="165" width="440" height="64" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="230" y="165" width="80" height="64" rx="8" fill="#3b82f6" opacity="0.9"/>
  <text x="270" y="201" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">POST</text>
  <text x="500" y="187" text-anchor="middle" fill="#a5f3fc" font-size="12">/api/users</text>
  <text x="500" y="207" text-anchor="middle" fill="#93c5fd" font-size="11">INSERT INTO users (name, email) VALUES ($1, $2)</text>
  <text x="500" y="223" text-anchor="middle" fill="#94a3b8" font-size="10">Creates new user, returns created row</text>

  <!-- PUT route -->
  <rect x="230" y="242" width="440" height="64" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="230" y="242" width="80" height="64" rx="8" fill="#f59e0b" opacity="0.9"/>
  <text x="270" y="278" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">PUT</text>
  <text x="500" y="264" text-anchor="middle" fill="#a5f3fc" font-size="12">/api/users/:id</text>
  <text x="500" y="284" text-anchor="middle" fill="#fcd34d" font-size="11">UPDATE users SET name=$1 WHERE id=$2</text>
  <text x="500" y="300" text-anchor="middle" fill="#94a3b8" font-size="10">Updates existing user by ID</text>

  <!-- DELETE route -->
  <rect x="230" y="319" width="440" height="64" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="230" y="319" width="80" height="64" rx="8" fill="#ef4444" opacity="0.9"/>
  <text x="270" y="355" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">DELETE</text>
  <text x="500" y="341" text-anchor="middle" fill="#a5f3fc" font-size="12">/api/users/:id</text>
  <text x="500" y="361" text-anchor="middle" fill="#fca5a5" font-size="11">DELETE FROM users WHERE id=$1</text>
  <text x="500" y="377" text-anchor="middle" fill="#94a3b8" font-size="10">Removes user, returns 204 No Content</text>

  <!-- GET row 2 (by id) -->
  <rect x="230" y="396" width="440" height="30" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <rect x="230" y="396" width="80" height="30" rx="8" fill="#10b981" opacity="0.6"/>
  <text x="270" y="415" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">GET</text>
  <text x="500" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">/api/users/:id — SELECT * FROM users WHERE id=$1</text>

  <!-- POSTGRESQL -->
  <rect x="730" y="55" width="150" height="380" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="730" y="55" width="150" height="36" rx="12" fill="#0ea5e9"/>
  <rect x="730" y="78" width="150" height="13" fill="#0ea5e9"/>
  <text x="805" y="79" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">PostgreSQL</text>
  <text x="805" y="118" text-anchor="middle" fill="#7dd3fc" font-size="22">🐘</text>
  <text x="805" y="150" text-anchor="middle" fill="#7dd3fc" font-size="11">users table</text>
  <rect x="745" y="160" width="120" height="18" rx="4" fill="#0f172a"/>
  <text x="805" y="173" text-anchor="middle" fill="#94a3b8" font-size="10">id | name | email</text>
  <rect x="745" y="182" width="120" height="14" rx="2" fill="#1e3a5f"/>
  <text x="805" y="193" text-anchor="middle" fill="#e2e8f0" font-size="9">1 | Alice | alice@x</text>
  <rect x="745" y="199" width="120" height="14" rx="2" fill="#172033"/>
  <text x="805" y="210" text-anchor="middle" fill="#e2e8f0" font-size="9">2 | Bob | bob@x</text>

  <!-- Arrows: Frontend -> API -->
  <defs>
    <marker id="ca1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="ca2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="ca3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>

  <line x1="170" y1="119" x2="228" y2="119" stroke="#10b981" stroke-width="2" marker-end="url(#ca2)"/>
  <line x1="170" y1="196" x2="228" y2="196" stroke="#3b82f6" stroke-width="2" marker-end="url(#ca2)"/>
  <line x1="170" y1="273" x2="228" y2="273" stroke="#f59e0b" stroke-width="2" marker-end="url(#ca2)"/>
  <line x1="170" y1="350" x2="228" y2="350" stroke="#ef4444" stroke-width="2" marker-end="url(#ca2)"/>

  <!-- Arrows: API -> PostgreSQL -->
  <line x1="671" y1="119" x2="728" y2="119" stroke="#10b981" stroke-width="2" marker-end="url(#ca3)"/>
  <line x1="671" y1="196" x2="728" y2="196" stroke="#3b82f6" stroke-width="2" marker-end="url(#ca3)"/>
  <line x1="671" y1="273" x2="728" y2="273" stroke="#f59e0b" stroke-width="2" marker-end="url(#ca3)"/>
  <line x1="671" y1="350" x2="728" y2="350" stroke="#ef4444" stroke-width="2" marker-end="url(#ca3)"/>

  <!-- Legend -->
  <rect x="215" y="462" width="470" height="30" rx="8" fill="#1e293b"/>
  <text x="290" y="481" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">GET = Read</text>
  <text x="380" y="481" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">POST = Create</text>
  <text x="480" y="481" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">PUT = Update</text>
  <text x="580" y="481" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">DELETE = Delete</text>
</svg>
