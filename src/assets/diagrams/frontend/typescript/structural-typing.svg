<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040d21" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#030818" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #22d3ee; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #22d3ee; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript Structural Typing Model</text>
  <text x="30" y="63" class="subtitle">Comparing Nominal (name-bound) vs. Structural (shape-bound) type checking and excess property validation.</text>

  <!-- LEFT BOX: Nominal Typing (C++ / Java style) -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="95" width="340" height="320" rx="12" fill="url(#glassState)" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.2" />
    <text x="50" y="125" class="header-text" fill="#fda4af">1. Nominal Typing (Strict Name)</text>
    <text x="50" y="145" class="desc">Types are compatible ONLY if explicitly declared so by name.</text>

    <!-- Nominal Type structures -->
    <rect x="50" y="175" width="300" height="85" rx="8" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
    <text x="65" y="198" class="state-title" fill="#a5b4fc">class User { name: string; }</text>
    <text x="65" y="218" class="state-title" fill="#a5b4fc">class Customer { name: string; }</text>
    <text x="65" y="242" class="meta" fill="#c7d2fe">Identical structures, but distinct, unique names.</text>

    <!-- Nominal Compatibility check -->
    <rect x="50" y="290" width="300" height="100" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="1.5" />
    <text x="65" y="318" class="state-title" fill="#fda4af">User u = new Customer();</text>
    <text x="65" y="342" class="desc" font-weight="700" fill="#f43f5e">❌ COMPILE ERROR</text>
    <text x="65" y="368" class="meta" fill="#fda4af">Forbidden because "User" is NOT "Customer" by name.</text>
  </g>

  <!-- RIGHT BOX: Structural Typing (TypeScript style) -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="95" width="360" height="320" rx="12" fill="url(#glassState)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="430" y="125" class="header-text">2. Structural Typing (Shape-Bound)</text>
    <text x="430" y="145" class="desc">Types are compatible if their members have the same shape.</text>

    <!-- TS Interface structures -->
    <rect x="430" y="175" width="320" height="85" rx="8" fill="#0c4a6e" stroke="#0369a1" stroke-width="1" />
    <text x="445" y="198" class="state-title" fill="#7dd3fc">interface Point { x: number; y: number; }</text>
    <text x="445" y="218" class="state-title" fill="#38bdf8">const obj = { x: 1, y: 2, z: 3 };</text>
    <text x="445" y="242" class="meta" fill="#e0f2fe">"obj" matches shape of "Point" (and has excess "z").</text>

    <!-- Structural Compatibility check -->
    <rect x="430" y="290" width="320" height="100" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
    <text x="445" y="318" class="state-title" fill="#34d399">const p: Point = obj;</text>
    <text x="445" y="342" class="desc" font-weight="700" fill="#10b981">✓ COMPILES PERFECTLY</text>
    <text x="445" y="368" class="meta" fill="#34d399">Compatible shape. TypeScript satisfies structural subtyping.</text>
  </g>
</svg>
