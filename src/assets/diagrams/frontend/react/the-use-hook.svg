<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b12" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#060914" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#be185d" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="pinkAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <linearGradient id="emeraldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #f472b6; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #f472b6; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">React 19: The 'use' Hook Paradigm</text>
  <text x="30" y="63" class="subtitle">Resolving Promises inline and consuming Context conditionally or inside loops without breaking Hook Rules.</text>

  <!-- LEFT COLUMN: Promises Resolution -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="95" width="340" height="320" rx="12" fill="url(#glassState)" stroke="#f472b6" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="125" class="header-text">1. Promise Integration</text>
    <text x="50" y="145" class="desc">Resolves promise inline during component render.</text>

    <!-- Step 1: Promise Active -->
    <rect x="50" y="175" width="300" height="60" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
    <text x="65" y="198" class="state-title" fill="#a5b4fc">Awaiting Promise...</text>
    <text x="65" y="218" class="meta" fill="#c7d2fe">Triggers Suspense Fallback automatically</text>

    <!-- Flow Arrow -->
    <path d="M 200 235 L 200 270" fill="none" stroke="#f472b6" stroke-width="2" />
    <polygon points="200,270 196,262 204,262" fill="#f472b6" />

    <!-- Step 2: Promise Resolved -->
    <rect x="50" y="280" width="300" height="95" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1" />
    <text x="65" y="305" class="state-title" fill="#34d399">Promise Resolved!</text>
    <text x="65" y="328" class="desc" font-family="monospace" font-size="10" fill="#34d399">const data = use(promise);</text>
    <text x="65" y="352" class="meta" fill="#a7f3d0">Data immediately loaded into virtual DOM</text>
  </g>

  <!-- RIGHT COLUMN: Conditional Context Consumption -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="95" width="360" height="320" rx="12" fill="url(#glassState)" stroke="#f472b6" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="430" y="125" class="header-text">2. Conditional Context</text>
    <text x="430" y="145" class="desc">Only hook allowed inside IF blocks or Loops.</text>

    <!-- Code Block representation -->
    <rect x="430" y="175" width="320" height="130" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" />
    <text x="445" y="200" font-family="monospace" font-size="11" fill="#f472b6">if (isFeatureEnabled) {</text>
    <text x="465" y="225" font-family="monospace" font-size="11" fill="#38bdf8">  const theme = use(ThemeContext);</text>
    <text x="465" y="250" font-family="monospace" font-size="11" fill="#e2e8f0">  return &lt;div style={{theme}} /&gt;;</text>
    <text x="445" y="275" font-family="monospace" font-size="11" fill="#f472b6">}</text>

    <!-- Callout on rules of hooks -->
    <rect x="430" y="320" width="320" height="70" rx="6" fill="#4c0519" stroke="#fb7185" stroke-width="1" />
    <text x="445" y="342" class="desc" font-weight="700" fill="#fda4af">Bypasses Standard Hook Constraints!</text>
    <text x="445" y="360" class="meta" fill="#fecdd3">Traditional useContext would fail inside loops or branches;</text>
    <text x="445" y="375" class="meta" fill="#fecdd3">'use' works flawlessly here.</text>
  </g>
</svg>
