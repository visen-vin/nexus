<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020815" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#040713" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #22d3ee; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #22d3ee; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #e0f2fe; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript: interface vs. type Alias</text>
  <text x="30" y="63" class="subtitle">An architectural comparison of structural boundaries, declaration merging capabilities, and compilation performance.</text>

  <!-- LEFT BOX: Interfaces -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="100" width="340" height="310" rx="12" fill="url(#glassState)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="130" class="header-text">1. interface Boundary</text>
    <text x="50" y="150" class="desc">Defines structural contracts for objects and classes.</text>

    <!-- Declaration Merging -->
    <rect x="50" y="175" width="300" height="110" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="65" y="198" class="state-title" fill="#34d399">Declaration Merging (Extensible)</text>
    <text x="65" y="218" class="code-text">interface User { name: string; }</text>
    <text x="65" y="235" class="code-text">interface User { age: number; }</text>
    <text x="65" y="255" class="meta" fill="#34d399">TypeScript automatically merges fields into one structure!</text>
    <text x="65" y="270" class="meta" fill="#34d399">Perfect for third-party libraries and global window extensions.</text>

    <!-- Perf note -->
    <rect x="50" y="295" width="300" height="95" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1" />
    <text x="65" y="320" class="state-title" fill="#93c5fd">Extends Performance</text>
    <text x="65" y="342" class="meta">Interfaces optimize type relations in a flat cache tree.</text>
    <text x="65" y="357" class="meta">Extending interfaces performs faster inside large codebases</text>
    <text x="65" y="372" class="meta">compared to massive type intersections.</text>
  </g>

  <!-- RIGHT BOX: Type Aliases -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="100" width="360" height="310" rx="12" fill="url(#glassState)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="430" y="130" class="header-text">2. type Alias Boundary</text>
    <text x="430" y="150" class="desc">Creates custom aliases for *any* valid JS type structure.</text>

    <!-- Union / Intersection -->
    <rect x="430" y="175" width="320" height="110" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="445" y="198" class="state-title" fill="#fbbf24">Union &amp; Intersection Capabilities</text>
    <text x="445" y="220" class="code-text">type ID = string | number;</text>
    <text x="445" y="238" class="code-text">type ColoredShape = Shape &amp; Colored;</text>
    <text x="445" y="258" class="meta" fill="#fcd34d">Supports literal shapes, unions, and tuples.</text>
    <text x="445" y="272" class="meta" fill="#fcd34d">Cannot be replicated using interfaces.</text>

    <!-- No Merging warning -->
    <rect x="430" y="295" width="320" height="95" rx="8" fill="#4c0519" stroke="#fb7185" stroke-width="1" />
    <text x="445" y="320" class="state-title" fill="#fda4af">Locked Boundary (No Merging)</text>
    <text x="445" y="342" class="meta" fill="#fda4af">Redeclaring a type name causes a compile-time crash.</text>
    <text x="445" y="357" class="meta" fill="#fda4af">Provides solid, non-extensible definitions that prevent</text>
    <text x="445" y="372" class="meta" fill="#fda4af">third-party pollution of your internal types.</text>
  </g>
</svg>
