<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>

    <!-- Flame warm gradients -->
    <linearGradient id="flameHot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="flameWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="flameMild" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="flameCool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .flame-txt { font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">CPU Profiling &amp; Flame Graphs</text>
  <text x="30" y="65" class="subtitle">Understand V8 tick profiling and flame graphs where box width represents CPU execution execution duration</text>

  <!-- FLAME GRAPH CHART AREA -->
  <g filter="url(#boxShadow)" transform="translate(40, 110)">
    <!-- Boundary container -->
    <rect width="720" height="280" rx="10" fill="#030712" stroke="#1f2937" stroke-width="1.5" />
    
    <!-- LEVEL 1: (Root V8 loop) -->
    <rect x="20" y="230" width="680" height="35" fill="url(#flameCool)" rx="4" />
    <text x="360" y="252" class="flame-txt" fill="#000" text-anchor="middle">(root) [100% CPU]</text>

    <!-- LEVEL 2: Express / http routing wrapper -->
    <rect x="20" y="185" width="480" height="35" fill="url(#flameMild)" rx="4" />
    <text x="260" y="207" class="flame-txt" fill="#000" text-anchor="middle">http.Server.requestListener [70%]</text>

    <rect x="520" y="185" width="180" height="35" fill="url(#flameCool)" rx="4" />
    <text x="610" y="207" class="flame-txt" fill="#000" text-anchor="middle">zlib.gzip [26%]</text>

    <!-- LEVEL 3: Middleware execution vs DB fetching -->
    <rect x="20" y="140" width="220" height="35" fill="url(#flameWarm)" rx="4" />
    <text x="130" y="162" class="flame-txt" text-anchor="middle">router.handle [32%]</text>

    <rect x="260" y="140" width="240" height="35" fill="url(#flameHot)" rx="4" stroke="#ffffff" stroke-width="1.5" />
    <text x="380" y="162" class="flame-txt" text-anchor="middle">crypto.pbkdf2Sync [35% - BLOCKING!]</text>

    <!-- LEVEL 4: Inside router -->
    <rect x="30" y="95" width="180" height="35" fill="url(#flameWarm)" rx="4" />
    <text x="120" y="117" class="flame-txt" text-anchor="middle">authMiddleware [26%]</text>
  </g>
</svg>
