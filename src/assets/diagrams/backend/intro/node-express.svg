<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d7c0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="expressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#f1f5f9">Node.js + Express Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">How incoming HTTP requests are handled and routed</text>

  <!-- INCOMING REQUEST -->
  <rect x="30" y="200" width="130" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="95" y="225" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">HTTP Request</text>
  <text x="95" y="242" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">GET /users</text>
  <text x="95" y="256" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">from Browser</text>

  <!-- Arrow: Request -> Node -->
  <line x1="162" y1="230" x2="220" y2="230" stroke="#fb923c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- NODE.JS RUNTIME BOX -->
  <rect x="222" y="90" width="220" height="290" rx="12" fill="#1a2e05" stroke="#84cc16" stroke-width="2"/>
  <rect x="222" y="90" width="220" height="36" rx="12" fill="url(#nodeGrad)"/>
  <rect x="222" y="114" width="220" height="12" fill="url(#nodeGrad)"/>
  <text x="332" y="113" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="white">Node.js Runtime</text>

  <!-- Node.js description -->
  <text x="332" y="145" text-anchor="middle" font-family="monospace" font-size="11" fill="#bef264">JavaScript Engine (V8)</text>
  <rect x="234" y="152" width="196" height="60" rx="6" fill="#0f172a" stroke="#4d7c0f" stroke-width="1"/>
  <text x="332" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3e635">Runs JS on the server</text>
  <text x="332" y="184" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3e635">No browser needed</text>
  <text x="332" y="198" text-anchor="middle" font-family="monospace" font-size="10" fill="#a3e635">Handles files, network, OS</text>

  <!-- EXPRESS LAYER inside Node -->
  <rect x="234" y="222" width="196" height="140" rx="8" fill="#431407" stroke="#f97316" stroke-width="1.5"/>
  <rect x="234" y="222" width="196" height="26" rx="8" fill="url(#expressGrad)"/>
  <rect x="234" y="238" width="196" height="10" fill="url(#expressGrad)"/>
  <text x="332" y="239" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">Express Framework</text>
  <text x="332" y="262" text-anchor="middle" font-family="monospace" font-size="10" fill="#fdba74">Middleware Pipeline</text>
  <text x="244" y="278" font-family="monospace" font-size="9" fill="#fb923c">→ logger middleware</text>
  <text x="244" y="292" font-family="monospace" font-size="9" fill="#fb923c">→ auth middleware</text>
  <text x="244" y="306" font-family="monospace" font-size="9" fill="#fb923c">→ json parser</text>
  <text x="332" y="325" text-anchor="middle" font-family="monospace" font-size="10" fill="#fdba74">Router (Receptionist)</text>
  <text x="332" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">Matches URL + Method</text>
  <text x="332" y="352" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">→ calls correct handler</text>

  <!-- Arrow: Node -> Routes -->
  <line x1="444" y1="200" x2="510" y2="200" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="444" y1="270" x2="510" y2="270" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="444" y1="340" x2="510" y2="340" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Route Handlers -->
  <!-- Route 1 -->
  <rect x="512" y="175" width="200" height="50" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="512" y="175" width="60" height="50" rx="8" fill="#1e40af"/>
  <rect x="552" y="175" width="20" height="50" fill="#1e40af"/>
  <text x="542" y="205" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">GET</text>
  <text x="622" y="198" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">/users</text>
  <text x="622" y="214" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">fetch all users</text>

  <!-- Route 2 -->
  <rect x="512" y="245" width="200" height="50" rx="8" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="512" y="245" width="60" height="50" rx="8" fill="#166534"/>
  <rect x="552" y="245" width="20" height="50" fill="#166534"/>
  <text x="542" y="275" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">POST</text>
  <text x="622" y="268" text-anchor="middle" font-family="monospace" font-size="11" fill="#86efac">/users</text>
  <text x="622" y="284" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">create new user</text>

  <!-- Route 3 -->
  <rect x="512" y="315" width="200" height="50" rx="8" fill="#0f172a" stroke="#f87171" stroke-width="1.5"/>
  <rect x="512" y="315" width="72" height="50" rx="8" fill="#991b1b"/>
  <rect x="564" y="315" width="20" height="50" fill="#991b1b"/>
  <text x="548" y="345" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="white">DELETE</text>
  <text x="622" y="338" text-anchor="middle" font-family="monospace" font-size="11" fill="#fca5a5">/users/:id</text>
  <text x="622" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">remove a user</text>

  <!-- Responses arrows back -->
  <line x1="714" y1="200" x2="750" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="714" y1="270" x2="750" y2="270" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="714" y1="340" x2="750" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Response Box -->
  <rect x="752" y="155" width="120" height="220" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="812" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Responses</text>
  <text x="812" y="205" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">200 []users</text>
  <text x="812" y="222" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">JSON array</text>
  <line x1="762" y1="233" x2="862" y2="233" stroke="#334155" stroke-width="1"/>
  <text x="812" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">201 created</text>
  <text x="812" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">new user obj</text>
  <line x1="762" y1="276" x2="862" y2="276" stroke="#334155" stroke-width="1"/>
  <text x="812" y="292" text-anchor="middle" font-family="monospace" font-size="10" fill="#f87171">404 not found</text>
  <text x="812" y="308" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">or 200 deleted</text>

  <!-- npm packages note -->
  <rect x="30" y="380" width="840" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="400" font-family="monospace" font-size="11" font-weight="bold" fill="#bef264">npm</text>
  <text x="90" y="400" font-family="monospace" font-size="11" fill="#94a3b8">= Node Package Manager — install libraries like Express with:</text>
  <text x="50" y="420" font-family="monospace" font-size="11" fill="#fb923c">npm install express</text>
  <text x="280" y="420" font-family="monospace" font-size="11" fill="#64748b">→ downloads to</text>
  <text x="400" y="420" font-family="monospace" font-size="11" fill="#60a5fa">node_modules/</text>
  <text x="510" y="420" font-family="monospace" font-size="11" fill="#64748b">→ tracked in</text>
  <text x="610" y="420" font-family="monospace" font-size="11" fill="#a3e635">package.json</text>

  <!-- Label bottom -->
  <text x="450" y="468" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Express acts like a receptionist — it receives every call and routes it to the right department</text>
</svg>
