<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Block Gradients -->
    <linearGradient id="imperativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    <linearGradient id="declarativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="domGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowImp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowDec" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Arrow Markers -->
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .section-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; fill: #F8FAFC; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-desc { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .label-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 10px; fill: #94A3B8; font-weight: 600; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="8,8" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">IMPERATIVE VS DECLARATIVE UI PROTOCOL</text>
    <text class="subtitle" x="0" y="18">COMPARING MANUAL DOM MUTATION WITH THE UI = F(STATE) MENTAL MODEL</text>
  </g>

  <!-- LEFT: Imperative Path (Red Theme) -->
  <g transform="translate(40, 110)">
    <rect width="360" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="section-title" x="20" y="30" fill="#EF4444">1. Imperative (How to update)</text>
    
    <!-- State Change Node -->
    <g transform="translate(20, 60)">
      <rect width="130" height="50" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" />
      <text class="node-title" x="12" y="22">User Interaction</text>
      <text class="node-desc" x="12" y="38">Click Event Trigger</text>
    </g>

    <!-- Manual Mutation Steps -->
    <g transform="translate(190, 60)">
      <rect width="150" height="150" rx="6" fill="#1E293B" stroke="#4B5563" stroke-width="1.5" />
      <text class="node-title" x="12" y="25">DOM Manipulation</text>
      <text class="node-desc" x="12" y="50">document.getElementById()</text>
      <text class="node-desc" x="12" y="70">element.classList.add()</text>
      <text class="node-desc" x="12" y="90">element.innerText = '...'</text>
      <text class="node-desc" x="12" y="110">button.disabled = false</text>
      <text class="node-desc" x="12" y="130">element.style.color = ...</text>
    </g>

    <!-- Step connections -->
    <path d="M150,85 L182,85" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)" />
    <text class="label-text" x="154" y="78">find &amp; mutate</text>
  </g>

  <!-- RIGHT: Declarative Path (Blue Theme) -->
  <g transform="translate(500, 110)">
    <rect width="360" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="section-title" x="20" y="30" fill="#0EA5E9">2. Declarative (What to render)</text>
    
    <!-- State Node (Purple) -->
    <g transform="translate(20, 100)" filter="url(#glowImp)">
      <rect width="100" height="60" rx="8" fill="#1E293B" stroke="#A855F7" stroke-width="2" />
      <rect width="100" height="5" fill="url(#stateGrad)" />
      <text class="node-title" x="12" y="25">State (s)</text>
      <text class="node-desc" x="12" y="45">{ loading: true }</text>
    </g>

    <!-- Function Node (Blue) -->
    <g transform="translate(150, 100)" filter="url(#glowDec)">
      <rect width="80" height="60" rx="8" fill="#1E293B" stroke="#0EA5E9" stroke-width="2" />
      <rect width="80" height="5" fill="url(#declarativeGrad)" />
      <text class="node-title" x="16" y="25">Tutor (f)</text>
      <text class="node-desc" x="16" y="45">Component</text>
    </g>

    <!-- UI DOM Node (Green) -->
    <g transform="translate(260, 100)">
      <rect width="80" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2" />
      <rect width="80" height="5" fill="url(#domGrad)" />
      <text class="node-title" x="16" y="25">UI DOM</text>
      <text class="node-desc" x="16" y="45">Rendered</text>
    </g>

    <!-- Formula Connection Arrow -->
    <path d="M120,130 L142,130" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)" />
    <path d="M230,130 L252,130" fill="none" stroke="#0EA5E9" stroke-width="2" marker-end="url(#arrowBlue)" />

    <!-- Mathematical Formula Box -->
    <g transform="translate(80, 195)">
      <rect width="200" height="40" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1" />
      <text x="100" y="25" text-anchor="middle" font-family="'Fira Code', monospace" font-weight="900" font-size="14" fill="#0EA5E9">UI = f(state)</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Insight: In Declarative programming, you specify the end target UI state, and React handles the intermediate DOM mutation steps for you.</text>
</svg>
