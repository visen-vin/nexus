<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="refGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowEffect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981" />
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9.5px; fill: #94A3B8; }
    .node-bold { font-family: 'Fira Code', monospace; font-size: 10px; fill: #F1F5F9; font-weight: 700; }
    .flow-label { font-family: 'Fira Code', monospace; font-size: 9px; fill: #E2E8F0; font-weight: 600; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="225" y1="0" x2="225" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="675" y1="0" x2="675" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">USEREF: PERSISTENT DECOUPLED STORAGE</text>
    <text class="subtitle" x="0" y="18">MUTABLE REFERENCE CONTAINER BYPASSING THE REACT STATE RECONCILIATION &amp; PAINT SCHEDULE</text>
  </g>

  <!-- State Rendering Loop (Left Side) -->
  <!-- 1. Component State Change Trigger -->
  <g transform="translate(60, 140)">
    <rect width="180" height="75" rx="8" fill="#111827" stroke="#A855F7" stroke-width="2" />
    <rect width="180" height="4" fill="url(#purpleGrad)" />
    <text class="node-title" x="12" y="24">Component Render Loop</text>
    <text class="node-sub" x="12" y="44">Triggered by useState / Reducer</text>
    <text class="node-sub" x="12" y="58">Schedules Fiber update</text>
  </g>

  <!-- 2. VDOM & Reconciliation -->
  <g transform="translate(60, 270)">
    <rect width="180" height="85" rx="8" fill="#111827" stroke="#38BDF8" stroke-width="2" />
    <rect width="180" height="4" fill="url(#renderGrad)" />
    <text class="node-title" x="12" y="24">Reconciliation &amp; Paint</text>
    <text class="node-sub" x="12" y="44">1. Computes VDOM Diff</text>
    <text class="node-sub" x="12" y="58">2. Synchronizes DOM node</text>
    <text class="node-sub" x="12" y="72">3. Browser Paints screen</text>
  </g>

  <!-- Arrows in Render Loop -->
  <path d="M150,215 L150,258" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)" />
  <text class="flow-label" x="156" y="240" fill="#A855F7">triggers</text>

  <!-- Persistent useRef Container (Right/Center Side) -->
  <!-- 3. useRef Persistent Memory Hook Box -->
  <g transform="translate(360, 190)" filter="url(#glowEffect)">
    <rect width="250" height="130" rx="8" fill="#111827" stroke="#10B981" stroke-width="2.5" />
    <rect width="250" height="4" fill="url(#refGrad)" />
    <text class="node-title" x="15" y="26">useRef() Container (Heap Memory)</text>
    <text class="node-bold" x="15" y="52" fill="#10B981">{ current: Value }</text>
    
    <!-- Object.is stability indicator -->
    <rect x="15" y="70" width="220" height="45" rx="4" fill="#061F17" stroke="#047857" stroke-width="1" />
    <text class="node-sub" x="22" y="86" fill="#A7F3D0">Reference Stability Guarantee:</text>
    <text class="node-sub" x="22" y="100" fill="#34D399">Object.is(ref_renderA, ref_renderB) === true</text>
  </g>

  <!-- 4. Actual DOM Element Node (Right Side) -->
  <g transform="translate(680, 215)">
    <rect width="160" height="80" rx="8" fill="#111827" stroke="#64748B" stroke-width="2" />
    <rect width="160" height="4" fill="#64748B" />
    <text class="node-title" x="12" y="24">Actual DOM Element</text>
    <text class="node-sub" x="12" y="44">ref={refContainer}</text>
    <text class="node-sub" x="12" y="58" fill="#94A3B8">&lt;div id="anchor" /&gt;</text>
  </g>

  <!-- Connections and Flows -->
  <!-- Flow A: Decoupled Mutation (Top Amber bypass curve) -->
  <path d="M240,165 C330,130 400,140 440,178" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arrowAmber)" />
  <text class="flow-label" x="280" y="135" fill="#F59E0B">Mutate current (Sync, no render!)</text>

  <!-- Flow B: Reading Ref during Render (Blue/Green arrow) -->
  <path d="M360,250 L252,290" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowBlue)" />
  <text class="flow-label" x="270" y="260" fill="#38BDF8">read current</text>

  <!-- Flow C: DOM Node Binding during Commit phase -->
  <path d="M610,255 L668,255" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text class="flow-label" x="618" y="245" fill="#10B981">binds to</text>

  <!-- Loop back render path (Gray dashed) -->
  <path d="M120,355 C60,430 40,360 80,210" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowPurple)" />
  <text class="flow-label" x="40" y="390" fill="#94A3B8">State Loop</text>

  <!-- Legend and highlights -->
  <g transform="translate(360, 360)">
    <rect width="480" height="70" rx="6" fill="#0B132B" stroke="#1E293B" stroke-width="1" />
    <circle cx="20" cy="20" r="5" fill="#F59E0B" />
    <text class="node-sub" x="32" y="23" fill="#E2E8F0">State Updates force reconciliation/paint cycle, rebuilding DOM paths.</text>
    
    <circle cx="20" cy="45" r="5" fill="#10B981" />
    <text class="node-sub" x="32" y="48" fill="#E2E8F0">useRef writes bypass re-renders entirely, synchronously mutating heap references.</text>
  </g>

  <!-- Footnote -->
  <text x="40" y="465" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Memory Architecture: The ref object container persists across component lifecycle mounts in heap memory, decoupled from the functional call stack.</text>
</svg>
