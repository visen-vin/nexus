<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Column Headers / Type Gradients -->
    <linearGradient id="intersectionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="mutationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <linearGradient id="resizeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Node/Element Gradients -->
    <linearGradient id="viewportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="elementGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glow filters for high-tech premium aesthetics -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#60A5FA" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#34D399" />
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,1 L8,4 L0,7 Z" fill="#F472B6" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 14px; fill: #FFFFFF; }
    .card-subtitle { font-family: 'Fira Code', monospace; font-weight: 600; font-size: 10px; fill: #94A3B8; }
    .normal-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #E2E8F0; }
    .code-text { font-family: 'Fira Code', monospace; font-size: 10px; fill: #38BDF8; }
    .badge-text { font-family: 'Fira Code', monospace; font-size: 9px; font-weight: bold; }
    .label-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 10px; fill: #64748B; letter-spacing: 0.5px; }
  </style>

  <!-- Outer container with rounded corners -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.02">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="900" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="900" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">BROWSER OBSERVERS ARCHITECTURE</text>
    <text class="subtitle" x="0" y="18">PERFORMANT, EVENT-DRIVEN DOM AND LAYOUT MONITORS</text>
  </g>

  <!-- ==================== COLUMN 1: IntersectionObserver ==================== -->
  <g transform="translate(40, 95)">
    <!-- Card Frame -->
    <rect width="250" height="345" rx="12" fill="#0A0E17" stroke="#1E293B" stroke-width="1.5" />
    <rect width="250" height="8" rx="0" fill="url(#intersectionGrad)" clip-path="inset(0 0 337 0)" />
    
    <!-- Title block -->
    <text class="card-title" x="16" y="32">IntersectionObserver</text>
    <text class="card-subtitle" x="16" y="48">Visibility &amp; Scroll Intersection</text>

    <!-- Visual Area Container -->
    <g transform="translate(16, 68)">
      <!-- Viewport Frame -->
      <rect width="218" height="150" rx="8" fill="url(#viewportGrad)" stroke="#334155" stroke-width="1" />
      <text class="label-title" x="10" y="20">BROWSER VIEWPORT</text>
      
      <!-- rootMargin indicator (dashed inner line) -->
      <rect x="15" y="30" width="188" height="100" rx="4" fill="none" stroke="#2563EB" stroke-width="1" stroke-dasharray="4,3" opacity="0.6" />
      <text class="code-text" x="22" y="42" font-size="8px" fill="#60A5FA">rootMargin: "0px"</text>

      <!-- Target Element crossing the threshold -->
      <!-- Placed partially inside the viewport -->
      <g transform="translate(45, 90)" filter="url(#glowGreen)">
        <rect width="128" height="75" rx="6" fill="#065F46" stroke="#10B981" stroke-width="1.5" />
        <!-- Intersection shading -->
        <rect width="128" height="40" rx="0" fill="#047857" opacity="0.6" />
        <text class="normal-text" x="12" y="24" font-weight="bold" fill="#FFFFFF">Target Element</text>
        <text class="code-text" x="12" y="55" fill="#A7F3D0" font-size="9px">isIntersecting: true</text>
        <text class="code-text" x="12" y="66" fill="#A7F3D0" font-size="9px">ratio: 0.53</text>
      </g>
    </g>

    <!-- Details/Metrics list -->
    <g transform="translate(16, 235)">
      <!-- Use Cases -->
      <text class="label-title" x="0" y="12">PRIMARY USE CASES</text>
      <text class="normal-text" x="0" y="28">• Lazy loading images &amp; media</text>
      <text class="normal-text" x="0" y="42">• Infinite scroll feeds</text>
      <text class="normal-text" x="0" y="56">• Scroll-triggered animations</text>

      <!-- Async Performance Badge -->
      <g transform="translate(0, 75)">
        <rect width="218" height="24" rx="4" fill="#1E1B4B" stroke="#312E81" stroke-width="1" />
        <text class="badge-text" x="10" y="15" fill="#818CF8">TASK QUEUE: Asynchronous (Off-Thread)</text>
      </g>
    </g>
  </g>

  <!-- ==================== COLUMN 2: MutationObserver ==================== -->
  <g transform="translate(325, 95)">
    <!-- Card Frame -->
    <rect width="250" height="345" rx="12" fill="#0A0E17" stroke="#1E293B" stroke-width="1.5" />
    <rect width="250" height="8" rx="0" fill="url(#mutationGrad)" clip-path="inset(0 0 337 0)" />
    
    <!-- Title block -->
    <text class="card-title" x="16" y="32">MutationObserver</text>
    <text class="card-subtitle" x="16" y="48">DOM Subtree &amp; Attribute Changes</text>

    <!-- Visual Area Container -->
    <g transform="translate(16, 68)">
      <!-- DOM Workspace -->
      <rect width="218" height="150" rx="8" fill="url(#viewportGrad)" stroke="#334155" stroke-width="1" />
      <text class="label-title" x="10" y="20">DOM TREE SUBTREE</text>

      <!-- Tree Nodes Visual -->
      <!-- Root Node -->
      <rect x="94" y="28" width="30" height="20" rx="4" fill="#334155" stroke="#475569" />
      <text class="code-text" x="101" y="41" fill="#94A3B8" font-size="9px">&lt;ul&gt;</text>
      
      <!-- Connectors -->
      <line x1="109" y1="48" x2="65" y2="78" stroke="#475569" stroke-width="1.5" />
      <line x1="109" y1="48" x2="153" y2="78" stroke="#475569" stroke-width="1.5" stroke-dasharray="3,2" />

      <!-- Left Child (Modified Attribute) -->
      <g transform="translate(25, 78)">
        <rect width="78" height="30" rx="4" fill="#581C87" stroke="#7C3AED" stroke-width="1" />
        <text class="code-text" x="6" y="18" fill="#F3E8FF" font-size="9px">li.item [attr]</text>
        <circle cx="70" cy="8" r="4" fill="#F43F5E" filter="url(#glowBlue)" />
      </g>
      
      <!-- Right Child (Added Node) -->
      <g transform="translate(115, 78)">
        <rect width="78" height="30" rx="4" fill="#064E3B" stroke="#059669" stroke-width="1" stroke-dasharray="3,2" />
        <text class="code-text" x="6" y="18" fill="#D1FAE5" font-size="9px">+ &lt;li&gt; added</text>
        <circle cx="70" cy="8" r="4" fill="#10B981" filter="url(#glowGreen)" />
      </g>

      <!-- Mutation Records List -->
      <g transform="translate(10, 120)">
        <rect width="198" height="22" rx="4" fill="#18181B" opacity="0.9" />
        <text class="code-text" x="8" y="14" font-size="8px" fill="#F472B6">Mutations: [childList, attributes]</text>
      </g>
    </g>

    <!-- Details/Metrics list -->
    <g transform="translate(16, 235)">
      <!-- Use Cases -->
      <text class="label-title" x="0" y="12">PRIMARY USE CASES</text>
      <text class="normal-text" x="0" y="28">• Extension DOM modification reactions</text>
      <text class="normal-text" x="0" y="42">• Form or editor auto-saving</text>
      <text class="normal-text" x="0" y="56">• Rich Text Editors &amp; component state</text>

      <!-- Async Performance Badge -->
      <g transform="translate(0, 75)">
        <rect width="218" height="24" rx="4" fill="#581C87" stroke="#701A75" stroke-width="1" />
        <text class="badge-text" x="10" y="15" fill="#F5D0FE">MICROTASK: Batched before next paint</text>
      </g>
    </g>
  </g>

  <!-- ==================== COLUMN 3: ResizeObserver ==================== -->
  <g transform="translate(610, 95)">
    <!-- Card Frame -->
    <rect width="250" height="345" rx="12" fill="#0A0E17" stroke="#1E293B" stroke-width="1.5" />
    <rect width="250" height="8" rx="0" fill="url(#resizeGrad)" clip-path="inset(0 0 337 0)" />
    
    <!-- Title block -->
    <text class="card-title" x="16" y="32">ResizeObserver</text>
    <text class="card-subtitle" x="16" y="48">Dimension &amp; Container Queries</text>

    <!-- Visual Area Container -->
    <g transform="translate(16, 68)">
      <!-- Layout Workspace -->
      <rect width="218" height="150" rx="8" fill="url(#viewportGrad)" stroke="#334155" stroke-width="1" />
      <text class="label-title" x="10" y="20">ELEMENT DIMENSIONS</text>

      <!-- Main Box Model visual -->
      <g transform="translate(25, 35)">
        <!-- Outer border box -->
        <rect width="160" height="90" rx="6" fill="#1E293B" stroke="#475569" stroke-width="2" />
        <text class="code-text" x="8" y="20" fill="#94A3B8" font-size="8px">border-box</text>

        <!-- Inner Content Box -->
        <rect x="15" y="28" width="130" height="50" rx="4" fill="#7C2D12" stroke="#EA580C" stroke-width="1.5" />
        <text class="code-text" x="22" y="45" fill="#FFEDD5" font-weight="bold" font-size="9px">content-box</text>
        <text class="code-text" x="22" y="58" fill="#FDBA74" font-size="8px">w: 240px | h: 120px</text>

        <!-- Resize Handle Indicator / Drag Arrows -->
        <line x1="172" y1="45" x2="190" y2="45" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowPink)" filter="url(#glowAmber)" />
        <line x1="105" y1="100" x2="105" y2="115" stroke="#EA580C" stroke-width="2" marker-end="url(#arrowPink)" filter="url(#glowAmber)" />
      </g>
    </g>

    <!-- Details/Metrics list -->
    <g transform="translate(16, 235)">
      <!-- Use Cases -->
      <text class="label-title" x="0" y="12">PRIMARY USE CASES</text>
      <text class="normal-text" x="0" y="28">• Container Queries in JS</text>
      <text class="normal-text" x="0" y="42">• Responsive canvas/chart redrawing</text>
      <text class="normal-text" x="0" y="56">• Dynamic widget &amp; split-pane layouts</text>

      <!-- Async Performance Badge -->
      <g transform="translate(0, 75)">
        <rect width="218" height="24" rx="4" fill="#7C2D12" stroke="#9A3412" stroke-width="1" />
        <text class="badge-text" x="10" y="15" fill="#FFEDD5">RENDER LOOP: Post-layout callback</text>
      </g>
    </g>
  </g>

  <!-- Footnote -->
  <text x="40" y="468" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: All observer callbacks execute asynchronously, avoiding main-thread synchronous event listener overhead.</text>
</svg>
