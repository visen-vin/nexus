<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A13" />
      <stop offset="50%" stop-color="#0D1525" />
      <stop offset="100%" stop-color="#04060C" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="splitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="100%" stop-color="#BE123C" />
    </linearGradient>
    <linearGradient id="chunkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Drop Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F43F5E" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 18px; fill: #F8FAFC; letter-spacing: 1.5px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 0.8px; }
    .section-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #94A3B8; letter-spacing: 1.5px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .code-text { font-family: 'Fira Code', monospace; font-size: 9.5px; fill: #38BDF8; font-weight: 600; }
    .flow-label { font-family: 'Fira Code', monospace; font-size: 9px; fill: #E2E8F0; font-weight: 600; }
    .status-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 600; }
    .grid-lines { stroke: #1E293B; stroke-width: 0.5; stroke-dasharray: 4 6; }
  </style>

  <!-- Container -->
  <rect width="920" height="540" rx="16" fill="url(#bgGrad)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid lines for engineering layout blueprint -->
  <line x1="80" y1="0" x2="80" y2="540" class="grid-lines" />
  <line x1="460" y1="0" x2="460" y2="540" class="grid-lines" />
  <line x1="840" y1="0" x2="840" y2="540" class="grid-lines" />
  <line x1="0" y1="270" x2="920" y2="270" class="grid-lines" />

  <!-- Header -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">REACT 18 CODE-SPLITTING ARCHITECTURE</text>
    <text class="subtitle" x="0" y="18">DYNAMIC IMPORTS, LAZY EVALUATION, PREFETCHING, AND SUSPENSE LIFECYCLE</text>
  </g>

  <!-- ==================== PART 1: BUNDLER SPLITTING (TOP HALF) ==================== -->
  <text class="section-title" x="40" y="100">1. BUILDTIME &amp; BUNDLE SEGREGATION</text>

  <!-- Main Entry Bundle -->
  <g transform="translate(40, 120)">
    <rect width="200" height="110" rx="8" fill="#0B132B" stroke="#0EA5E9" stroke-width="1.5" />
    <rect width="200" height="4" fill="url(#mainGrad)" />
    <text class="node-title" x="12" y="24">main.bundle.js (Initial Load)</text>
    <text class="node-sub" x="12" y="46">Contains: core libraries, hooks,</text>
    <text class="node-sub" x="12" y="60">layout components, and routing.</text>
    <text class="code-text" x="12" y="85">Size: 45KB (Gzipped)</text>
    <circle cx="185" cy="22" r="6" fill="#0EA5E9" filter="url(#glowCyan)" />
  </g>

  <!-- Dynamic Import Cut Point -->
  <g transform="translate(290, 150)">
    <circle cx="25" cy="25" r="25" fill="#1E1E2E" stroke="#F43F5E" stroke-width="2" filter="url(#glowRed)" />
    <text class="node-title" x="15" y="29" fill="#F43F5E" font-size="14" font-weight="900">✂</text>
    <text class="node-sub" x="-45" y="-12" fill="#F43F5E" font-weight="700">Dynamic Import Point</text>
    <text class="code-text" x="-55" y="68" fill="#F43F5E">import("./HeavyComp")</text>
  </g>

  <!-- Arrows from main bundle through split point -->
  <path d="M240,175 L280,175" fill="none" stroke="#0EA5E9" stroke-width="2" marker-end="url(#arrowCyan)" />
  <path d="M340,175 L415,175" fill="none" stroke="#F43F5E" stroke-width="2" marker-end="url(#arrowRed)" />

  <!-- Split-out Asynchronous Chunk -->
  <g transform="translate(430, 120)">
    <rect width="210" height="110" rx="8" fill="#0B132B" stroke="#A855F7" stroke-width="1.5" />
    <rect width="210" height="4" fill="url(#chunkGrad)" />
    <text class="node-title" x="12" y="24">heavy-component.chunk.js</text>
    <text class="node-sub" x="12" y="46">Contains: Heavy visual library,</text>
    <text class="node-sub" x="12" y="60">complex charts or large tables.</text>
    <text class="code-text" x="12" y="85" fill="#C084FC">Size: 220KB (On-Demand)</text>
    <circle cx="195" cy="22" r="6" fill="#A855F7" filter="url(#glowPurple)" />
  </g>

  <!-- User Action triggers loading -->
  <g transform="translate(680, 125)">
    <rect width="200" height="100" rx="8" fill="#131B2E" stroke="#1E293B" stroke-width="1" />
    <text class="node-title" x="12" y="22" fill="#E2E8F0">Prefetching Strategy</text>
    <text class="node-sub" x="12" y="42" fill="#94A3B8">&lt;link rel="prefetch" href="..." /&gt;</text>
    <text class="node-sub" x="12" y="58">Downloads chunk idle-time,</text>
    <text class="node-sub" x="12" y="72">removing dynamic latency</text>
    <text class="node-sub" x="12" y="86">when user finally clicks!</text>
  </g>

  <path d="M640,175 L672,175" fill="none" stroke="#A855F7" stroke-dasharray="3 3" stroke-width="1.5" />

  <!-- ==================== PART 2: SUSPENSE LIFECYCLE (BOTTOM HALF) ==================== -->
  <text class="section-title" x="40" y="305">2. RUNTIME LIFECYCLE &amp; SUSPENSE BOUNDARY STATES</text>

  <!-- Left: Lazy Loading Boundary Hook-up -->
  <g transform="translate(40, 325)">
    <rect width="360" height="165" rx="8" fill="#0B132B" stroke="#F59E0B" stroke-width="1.5" />
    <rect width="360" height="4" fill="url(#warningGrad)" />
    
    <text class="node-title" x="15" y="24">React.lazy() Suspense Boundary Setup</text>
    
    <rect x="15" y="38" width="330" height="110" rx="4" fill="#050811" stroke="#334155" />
    <text class="code-text" x="25" y="56" fill="#A7F3D0">const LazyComponent = React.lazy(() =&gt; </text>
    <text class="code-text" x="45" y="74" fill="#F472B6">  import('./heavy-component.chunk')</text>
    <text class="code-text" x="25" y="92" fill="#A7F3D0">);</text>
    <text class="code-text" x="25" y="115" fill="#38BDF8">&lt;Suspense fallback=&lt;Spinner /&gt;&gt;</text>
    <text class="code-text" x="45" y="133" fill="#E2E8F0">  &lt;LazyComponent /&gt;</text>
    <text class="code-text" x="25" y="143" fill="#38BDF8">&lt;/Suspense&gt;</text>
  </g>

  <!-- Arrow from setup to Suspended and Resolved -->
  <path d="M400,405 L475,370" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowCyan)" />
  <path d="M400,405 L475,445" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowCyan)" />
  <text class="flow-label" x="410" y="368" fill="#38BDF8">Not Loaded</text>
  <text class="flow-label" x="410" y="450" fill="#10B981">Loaded</text>

  <!-- State 1: Suspended (Spinner) -->
  <g transform="translate(490, 325)">
    <rect width="390" height="75" rx="8" fill="#18130B" stroke="#F59E0B" stroke-width="1.5" />
    <circle cx="35" cy="38" r="14" fill="none" stroke="#F59E0B" stroke-width="3" stroke-dasharray="25 15" />
    <text class="node-title" x="65" y="28" fill="#F59E0B">STATE A: SUSPENDED (ASYNC LOADING)</text>
    <text class="node-sub" x="65" y="46">React catches the Dynamic Import Promise, unwinds stack,</text>
    <text class="node-sub" x="65" y="60" fill="#FCD34D">and renders the specified fallback Spinner UI instead.</text>
  </g>

  <!-- State 2: Resolved (Component Renders) -->
  <g transform="translate(490, 415)">
    <rect width="390" height="75" rx="8" fill="#0B1C16" stroke="#10B981" stroke-width="1.5" />
    <rect x="20" y="20" width="30" height="35" rx="4" fill="#047857" />
    <path d="M26,38 L32,44 L44,28" fill="none" stroke="#FFFFFF" stroke-width="3" />
    <text class="node-title" x="65" y="28" fill="#10B981">STATE B: RESOLVED (RENDER ACTIVE)</text>
    <text class="node-sub" x="65" y="46">Promise resolves. React stores chunk in internal cache,</text>
    <text class="node-sub" x="65" y="60" fill="#6EE7B7">switches UI from loader to resolved dynamic component.</text>
  </g>

  <!-- Footnote warning or best practice -->
  <text x="40" y="520" font-family="'Inter', system-ui, sans-serif" font-size="10px" fill="#475569">Note: To avoid component hydration cascading failures, always wrap Suspense chunks in adjacent Error Boundaries.</text>
</svg>
