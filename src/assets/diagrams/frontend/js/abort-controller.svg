<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Gradients -->
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="abortGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#DC2626" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Markers -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#06B6D4" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 14px; fill: #FFFFFF; }
    .node-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 12px; fill: #E2E8F0; }
    .node-state { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #94A3B8; font-weight: 600; }
    .btn-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; font-weight: bold; fill: #FFFFFF; }
    .desc-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #94A3B8; }
  </style>

  <!-- Outer container with rounded corners -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="900" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="900" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">ABORTCONTROLLER RUNTIME ARCHITECTURE</text>
    <text class="subtitle" x="0" y="18">UNIFIED CANCELLATION PROPAGATION FOR FETCH &amp; EVENT LISTENERS</text>
  </g>

  <!-- Control Plane / AbortController Node -->
  <g transform="translate(50, 130)">
    <rect width="240" height="230" rx="12" fill="#0D1527" stroke="#334155" stroke-width="2" />
    <rect width="240" height="8" rx="0" fill="url(#controllerGrad)" clip-path="inset(0 0 222 0)" />
    
    <text class="node-title" x="20" y="32">AbortController</text>
    <text class="node-state" x="20" y="48">Instance (Control Plane)</text>
    
    <!-- Properties -->
    <rect x="15" y="70" width="210" height="40" rx="6" fill="#1E293B" opacity="0.6" stroke="#475569" stroke-width="0.8"/>
    <text class="node-text" x="25" y="94">.signal </text>
    <text class="node-state" x="85" y="94">→ AbortSignal ref</text>
    
    <!-- Action: abort() trigger -->
    <g transform="translate(15, 130)" filter="url(#glowRed)">
      <rect width="210" height="70" rx="8" fill="url(#abortGrad)" stroke="#EF4444" stroke-width="1.5" />
      <text class="btn-text" x="50" y="35">.abort(reason)</text>
      <text class="node-state" x="40" y="52" fill="#FCA5A5">Triggers cancellation</text>
      <path d="M22,25 L32,25 L26,37 L34,37 L24,49 L28,33 L20,33 Z" fill="#FFFFFF" />
    </g>
  </g>

  <!-- Connector: Controller to Signal (binding setup) -->
  <path d="M 290, 215 C 320, 215 320, 215 342, 215" fill="none" stroke="#06B6D4" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowCyan)" />
  <text class="node-state" x="296" y="205" fill="#06B6D4">binds</text>

  <!-- AbortSignal Channel Node (The Bridge) -->
  <g transform="translate(350, 150)">
    <rect width="200" height="190" rx="12" fill="#0D1E2D" stroke="#06B6D4" stroke-width="2" filter="url(#glowCyan)"/>
    <rect width="200" height="8" rx="0" fill="url(#signalGrad)" clip-path="inset(0 0 182 0)" />
    
    <text class="node-title" x="20" y="32">AbortSignal</text>
    <text class="node-state" x="20" y="48">Communication Bridge</text>
    
    <!-- Status fields -->
    <g transform="translate(15, 65)">
      <rect width="170" height="35" rx="6" fill="#112A3D" stroke="#0891B2" stroke-width="1"/>
      <text class="node-text" x="12" y="22">.aborted : <tspan fill="#EF4444" font-weight="bold">true</tspan></text>
    </g>
    
    <g transform="translate(15, 112)">
      <rect width="170" height="40" rx="6" fill="#112A3D" stroke="#0891B2" stroke-width="1"/>
      <text class="node-text" x="12" y="20">.reason :</text>
      <text class="node-state" x="12" y="33" fill="#38BDF8">AbortError (DOMException)</text>
    </g>
    
    <text class="node-state" x="20" y="174" fill="#64748B">Event: "abort"</text>
  </g>

  <!-- Connector: abort() propagation line -->
  <path d="M 275, 295 L 342, 295" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrowRed)" />
  <text class="node-state" x="282" y="287" fill="#EF4444">invokes</text>

  <!-- Connectors from Signal to Consumers (Binding/Registration Phase) -->
  <path d="M 550, 210 C 580, 210 590, 160 622, 160" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowCyan)" />
  <path d="M 550, 270 C 580, 270 590, 320 622, 320" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowCyan)" />

  <!-- Connectors: Crimson Abort Event Propagation Waves -->
  <path d="M 550, 245 C 585, 245 585, 185 622, 185" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrowRed)" />
  <path d="M 550, 245 C 585, 245 585, 305 622, 305" fill="none" stroke="#EF4444" stroke-width="3" marker-end="url(#arrowRed)" />
  
  <text class="node-state" x="555" y="235" fill="#EF4444">propagate</text>

  <!-- Consumer 1: Fetch API -->
  <g transform="translate(630, 110)">
    <rect width="230" height="120" rx="12" fill="#1E293B" stroke="#475569" stroke-width="2" />
    <rect width="230" height="6" rx="0" fill="#64748B" clip-path="inset(0 0 114 0)" />
    <text class="node-title" x="15" y="28">fetch(..., { signal })</text>
    <text class="node-state" x="15" y="44">Asynchronous Operation</text>

    <!-- Cancelled State Panel -->
    <g transform="translate(15, 60)">
      <rect width="200" height="45" rx="6" fill="#450A0A" stroke="#EF4444" stroke-width="1"/>
      <text class="node-text" x="10" y="18" fill="#FCA5A5" font-size="11">Promise REJECTS</text>
      <text class="node-state" x="10" y="32" fill="#EF4444">Throws AbortError</text>
    </g>
  </g>

  <!-- Consumer 2: Event Listener -->
  <g transform="translate(630, 270)">
    <rect width="230" height="120" rx="12" fill="#1E293B" stroke="#475569" stroke-width="2" />
    <rect width="230" height="6" rx="0" fill="#64748B" clip-path="inset(0 0 114 0)" />
    <text class="node-title" x="15" y="28">addEventListener(..., { signal })</text>
    <text class="node-state" x="15" y="44">DOM Event Cleanup</text>

    <!-- Cleaned State Panel -->
    <g transform="translate(15, 60)">
      <rect width="200" height="45" rx="6" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
      <text class="node-text" x="10" y="18" fill="#A7F3D0" font-size="11">Auto-Removed</text>
      <text class="node-state" x="10" y="32" fill="#34D399">Unbound from event loop</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="40" y="465" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: Once aborted, the AbortSignal stays in the aborted state forever. A new AbortController must be instantiated for new operations.</text>
</svg>
