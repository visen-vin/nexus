<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="hostRootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="componentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="domGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glowRoot" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowComp" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowDom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowChild" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00D8FF" />
    </marker>
    <marker id="arrowSibling" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowReturn" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EC4899" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #FFFFFF; }
    .node-meta { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .legend-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="900" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="900" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">REACT FIBER TREE LINKED LIST STRUCTURE</text>
    <text class="subtitle" x="0" y="18">CHILD, SIBLING AND RETURN POINTERS DURING RECONCILIATION</text>
  </g>

  <!-- Nodes -->
  
  <!-- Root Node (FiberRoot) -->
  <g transform="translate(375, 100)" filter="url(#glowRoot)">
    <rect width="150" height="60" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2" />
    <rect width="150" height="5" fill="url(#hostRootGrad)" />
    <text class="node-title" x="12" y="25">FiberRootNode</text>
    <text class="node-meta" x="12" y="45">tag: HostRoot (3)</text>
  </g>

  <!-- App Node (Component) -->
  <g transform="translate(375, 220)" filter="url(#glowComp)">
    <rect width="150" height="60" rx="8" fill="#1E293B" stroke="#8B5CF6" stroke-width="2" />
    <rect width="150" height="5" fill="url(#componentGrad)" />
    <text class="node-title" x="12" y="25">&lt;App /&gt;</text>
    <text class="node-meta" x="12" y="45">tag: FunctionComp (0)</text>
  </g>

  <!-- Sidebar Node -->
  <g transform="translate(200, 340)" filter="url(#glowDom)">
    <rect width="150" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2" />
    <rect width="150" height="5" fill="url(#domGrad)" />
    <text class="node-title" x="12" y="25">&lt;Sidebar /&gt;</text>
    <text class="node-meta" x="12" y="45">tag: FunctionComp (0)</text>
  </g>

  <!-- Content Node -->
  <g transform="translate(550, 340)" filter="url(#glowDom)">
    <rect width="150" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2" />
    <rect width="150" height="5" fill="url(#domGrad)" />
    <text class="node-title" x="12" y="25">&lt;MainContent /&gt;</text>
    <text class="node-meta" x="12" y="45">tag: FunctionComp (0)</text>
  </g>

  <!-- Arrows & Relationships -->
  
  <!-- Root -> App: child pointer -->
  <path d="M440,160 L440,212" fill="none" stroke="#00D8FF" stroke-width="2" marker-end="url(#arrowChild)" />
  <text x="445" y="190" font-family="'Fira Code', monospace" font-size="9" fill="#00D8FF">child</text>

  <!-- App -> Root: return pointer -->
  <path d="M460,220 L460,168" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowReturn)" />
  <text x="465" y="190" font-family="'Fira Code', monospace" font-size="9" fill="#EC4899">return</text>

  <!-- App -> Sidebar: child pointer -->
  <path d="M375,250 C300,250 265,300 265,332" fill="none" stroke="#00D8FF" stroke-width="2" marker-end="url(#arrowChild)" />
  <text x="290" y="280" font-family="'Fira Code', monospace" font-size="9" fill="#00D8FF">child</text>

  <!-- Sidebar -> App: return pointer -->
  <path d="M285,340 C285,310 320,270 375,270" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowReturn)" />
  <text x="320" y="305" font-family="'Fira Code', monospace" font-size="9" fill="#EC4899">return</text>

  <!-- Sidebar -> Content: sibling pointer -->
  <path d="M350,370 L542,370" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowSibling)" />
  <text x="425" y="362" font-family="'Fira Code', monospace" font-size="9" fill="#F59E0B">sibling</text>

  <!-- Content -> App: return pointer -->
  <path d="M625,340 C625,290 560,250 525,250" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowReturn)" />
  <text x="580" y="280" font-family="'Fira Code', monospace" font-size="9" fill="#EC4899">return</text>

  <!-- Legend -->
  <g transform="translate(40, 440)">
    <rect width="820" height="40" rx="6" fill="#111827" stroke="#1E293B" stroke-width="1" />
    <g transform="translate(20, 12)">
      <!-- Child Indicator -->
      <circle cx="10" cy="8" r="4" fill="#00D8FF" />
      <text class="legend-text" x="20" y="12">Child Pointer</text>

      <!-- Sibling Indicator -->
      <circle cx="200" cy="8" r="4" fill="#F59E0B" />
      <text class="legend-text" x="210" y="12">Sibling Pointer</text>

      <!-- Return Indicator -->
      <circle cx="420" cy="8" r="4" fill="#EC4899" />
      <text class="legend-text" x="430" y="12">Return Pointer (Parent)</text>
    </g>
  </g>
</svg>
