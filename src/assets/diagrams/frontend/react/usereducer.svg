<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node colors -->
    <linearGradient id="idleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B7280" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
    <linearGradient id="loadingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowFSM" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4B5563" />
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981" />
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .action-text { font-family: 'Fira Code', monospace; font-size: 9px; fill: #E2E8F0; font-weight: 600; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">FINITE STATE MACHINE WITH USEREDUCER</text>
    <text class="subtitle" x="0" y="18">PREVENTING IMPOSSIBLE STATES VIA STRUCTURAL STATE TRANSITIONS</text>
  </g>

  <!-- 1. State: IDLE (Muted Grey) -->
  <g transform="translate(80, 200)">
    <rect width="130" height="70" rx="8" fill="#111827" stroke="#6B7280" stroke-width="2" />
    <rect width="130" height="4" fill="url(#idleGrad)" />
    <text class="node-title" x="15" y="25">IDLE</text>
    <text class="node-sub" x="15" y="45">data: null</text>
    <text class="node-sub" x="15" y="58">error: null</text>
  </g>

  <!-- Connection: IDLE -> LOADING -->
  <path d="M210,235 L282,235" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)" />
  <text class="action-text" x="220" y="222" fill="#F59E0B">FETCH</text>

  <!-- 2. State: LOADING (Orange) -->
  <g transform="translate(290, 190)" filter="url(#glowFSM)">
    <rect width="150" height="90" rx="8" fill="#111827" stroke="#F59E0B" stroke-width="2.5" />
    <rect width="150" height="4" fill="url(#loadingGrad)" />
    <text class="node-title" x="15" y="25">LOADING</text>
    <text class="node-sub" x="15" y="45">loading: true</text>
    <text class="node-sub" x="15" y="58">data: null</text>
    <text class="node-sub" x="15" y="72">error: null</text>
  </g>

  <!-- Connection: LOADING -> SUCCESS (Top curved path) -->
  <path d="M440,210 C500,160 540,160 592,205" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text class="action-text" x="480" y="155" fill="#10B981">FETCH_SUCCESS</text>

  <!-- Connection: LOADING -> ERROR (Bottom curved path) -->
  <path d="M440,260 C500,310 540,310 592,265" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)" />
  <text class="action-text" x="480" y="315" fill="#EF4444">FETCH_ERROR</text>

  <!-- 3. State: SUCCESS (Green) -->
  <g transform="translate(600, 150)">
    <rect width="150" height="70" rx="8" fill="#111827" stroke="#10B981" stroke-width="2" />
    <rect width="150" height="4" fill="url(#successGrad)" />
    <text class="node-title" x="15" y="25">SUCCESS</text>
    <text class="node-sub" x="15" y="45">data: [...]</text>
    <text class="node-sub" x="15" y="58">error: null</text>
  </g>

  <!-- 4. State: ERROR (Red) -->
  <g transform="translate(600, 260)">
    <rect width="150" height="70" rx="8" fill="#111827" stroke="#EF4444" stroke-width="2" />
    <rect width="150" height="4" fill="url(#errorGrad)" />
    <text class="node-title" x="15" y="25">ERROR</text>
    <text class="node-sub" x="15" y="45">data: null</text>
    <text class="node-sub" x="15" y="58">error: Error</text>
  </g>

  <!-- Back connections: Reset Success/Error back to Idle/Loading -->
  <path d="M675,150 C675,90 145,90 145,192" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowMuted)" />
  <text class="action-text" x="390" y="105" fill="#94A3B8">RESET</text>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Insight: A state reducer enforces valid states, making it mathematically impossible to have loading = true, data = [...] and error = Error active simultaneously.</text>
</svg>
