<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="uvCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="osGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; fill: #cbd5e1; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
    .arrow-txt { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">libuv Architecture: Thread Pool &amp; Async I/O</text>
  <text x="30" y="65" class="subtitle">Decoupling how libuv handles system I/O using Kernel loops or worker threads</text>

  <!-- INPUT CALL (LEFT) -->
  <g transform="translate(30, 160)">
    <rect width="180" height="120" rx="10" fill="#0b0f19" stroke="#64748b" stroke-width="1" />
    <text x="90" y="30" class="header" fill="#f8fafc" text-anchor="middle">JavaScript Application</text>
    <text x="90" y="55" class="desc" text-anchor="middle">fs.readFile() | fetch()</text>
    
    <rect x="20" y="75" width="140" height="30" rx="4" fill="#1e293b" />
    <text x="90" y="94" class="lbl" fill="#38bdf8" text-anchor="middle">V8 / Node C++ APIs</text>
  </g>

  <!-- LIBUV CORE CARD (MIDDLE) -->
  <g filter="url(#boxShadow)" transform="translate(260, 100)">
    <rect width="250" height="260" rx="12" fill="url(#uvCardGrad)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="250" height="6" rx="3" fill="#10b981" />
    <text x="125" y="30" class="header" fill="#10b981" text-anchor="middle">libuv Core (C Library)</text>
    <text x="125" y="48" class="desc" text-anchor="middle">Handles Platform Neutral I/O</text>

    <!-- Sub components inside libuv -->
    <rect x="25" y="70" width="200" height="60" rx="6" fill="#022c22" stroke="#10b981" stroke-width="1" stroke-opacity="0.2" />
    <text x="125" y="95" class="lbl" fill="#34d399" text-anchor="middle">libuv Event Loop</text>
    <text x="125" y="115" class="desc" text-anchor="middle">Orchestrates task execution cycles</text>

    <!-- Dispatch Router -->
    <rect x="25" y="150" width="200" height="80" rx="6" fill="#022c22" stroke="#10b981" stroke-width="1" stroke-opacity="0.2" />
    <text x="125" y="175" class="lbl" fill="#34d399" text-anchor="middle">Task Router / Dispatcher</text>
    <text x="125" y="195" class="desc" fill="#a7f3d0" text-anchor="middle">Determines if OS Kernel handles</text>
    <text x="125" y="212" class="desc" fill="#a7f3d0" text-anchor="middle">task or Thread Pool is needed</text>
  </g>

  <!-- THREAD POOL (RIGHT TOP) -->
  <g filter="url(#boxShadow)" transform="translate(560, 90)">
    <rect width="210" height="130" rx="12" fill="url(#poolGrad)" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="210" height="6" rx="3" fill="#f59e0b" />
    <text x="105" y="30" class="header" fill="#f59e0b" text-anchor="middle">Worker Thread Pool</text>
    <text x="105" y="48" class="desc" text-anchor="middle">Synchronous Heavy Blocking Tasks</text>

    <g transform="translate(15, 65)">
      <circle cx="20" cy="25" r="14" fill="#78350f" stroke="#f59e0b" stroke-width="1" />
      <text x="20" y="29" class="desc" fill="#f8fafc" font-weight="bold" text-anchor="middle">T1</text>
      
      <circle cx="65" cy="25" r="14" fill="#78350f" stroke="#f59e0b" stroke-width="1" />
      <text x="65" y="29" class="desc" fill="#f8fafc" font-weight="bold" text-anchor="middle">T2</text>
      
      <circle cx="110" cy="25" r="14" fill="#78350f" stroke="#f59e0b" stroke-width="1" />
      <text x="110" y="29" class="desc" fill="#f8fafc" font-weight="bold" text-anchor="middle">T3</text>
      
      <circle cx="155" cy="25" r="14" fill="#78350f" stroke="#f59e0b" stroke-width="1" />
      <text x="155" y="29" class="desc" fill="#f8fafc" font-weight="bold" text-anchor="middle">T4</text>
    </g>
    <text x="105" y="115" class="desc" fill="#cbd5e1" text-anchor="middle">Default: 4 threads (UV_THREADPOOL_SIZE)</text>
  </g>

  <!-- OS KERNEL ASYNC (RIGHT BOTTOM) -->
  <g filter="url(#boxShadow)" transform="translate(560, 240)">
    <rect width="210" height="130" rx="12" fill="url(#osGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="210" height="6" rx="3" fill="#3b82f6" />
    <text x="105" y="30" class="header" fill="#3b82f6" text-anchor="middle">OS Kernel (Epoll / Kqueue)</text>
    <text x="105" y="48" class="desc" text-anchor="middle">Asynchronous Non-Blocking APIs</text>
    
    <rect x="20" y="65" width="170" height="45" rx="4" fill="#172554" />
    <text x="105" y="82" class="lbl" fill="#60a5fa" font-size="10" text-anchor="middle">Handles Epoll / Kqueue / IOCP</text>
    <text x="105" y="98" class="desc" fill="#93c5fd" text-anchor="middle">Network TCP/UDP, DNS, Timers</text>
  </g>

  <!-- ROUTING ARROWS -->
  <!-- App to libuv -->
  <path d="M210 220 H250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none" />

  <!-- Dispatch to Threadpool -->
  <path d="M475 220 C 510 220, 510 160, 550 160" stroke="#f59e0b" stroke-width="2" fill="none" />
  
  <!-- Dispatch to OS Kernel -->
  <path d="M475 240 C 510 240, 510 300, 550 300" stroke="#3b82f6" stroke-width="2" fill="none" />
</svg>
