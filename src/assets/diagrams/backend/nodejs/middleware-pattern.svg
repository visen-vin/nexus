<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="mwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
    .arrow-lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; fill: #ef4444; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">The Middleware Pattern Pipeline</text>
  <text x="30" y="65" class="subtitle">Understand the sequential request-response pipeline and error boundaries propagation</text>

  <!-- MIDDLEWARE 1 -->
  <g filter="url(#boxShadow)" transform="translate(30, 150)">
    <rect width="190" height="150" rx="10" fill="url(#mwGrad)" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="190" height="6" rx="3" fill="#a855f7" />
    <text x="95" y="30" class="header" fill="#a855f7" text-anchor="middle">Middleware 1</text>
    <text x="95" y="55" class="desc" text-anchor="middle">Logger / Request ID</text>
    
    <rect x="15" y="80" width="160" height="45" rx="4" fill="#1c0524" />
    <text x="95" y="106" class="lbl" font-family="monospace" fill="#c084fc" text-anchor="middle">next() // continues</text>
  </g>

  <!-- MIDDLEWARE 2 -->
  <g filter="url(#boxShadow)" transform="translate(280, 150)">
    <rect width="190" height="150" rx="10" fill="url(#mwGrad)" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="190" height="6" rx="3" fill="#a855f7" />
    <text x="95" y="30" class="header" fill="#a855f7" text-anchor="middle">Middleware 2</text>
    <text x="95" y="55" class="desc" text-anchor="middle">Auth Checker</text>
    
    <rect x="15" y="80" width="160" height="45" rx="4" fill="#1c0524" />
    <text x="95" y="106" class="lbl" font-family="monospace" fill="#c084fc" text-anchor="middle">next() // authenticated</text>
  </g>

  <!-- ROUTE HANDLER (RIGHT) -->
  <g filter="url(#boxShadow)" transform="translate(530, 80)">
    <rect width="240" height="120" rx="10" fill="url(#routeGrad)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="240" height="6" rx="3" fill="#10b981" />
    <text x="120" y="30" class="header" fill="#10b981" text-anchor="middle">Route Controller</text>
    <text x="120" y="55" class="desc" text-anchor="middle">Gets Data &amp; Responds</text>
    
    <rect x="15" y="75" width="210" height="30" rx="4" fill="#022c22" stroke="#059669" stroke-width="1" />
    <text x="120" y="94" class="lbl" font-family="monospace" text-anchor="middle">res.send(data)</text>
  </g>

  <!-- ERROR MIDDLEWARE (RIGHT BOTTOM) -->
  <g filter="url(#boxShadow)" transform="translate(530, 240)">
    <rect width="240" height="120" rx="10" fill="url(#errGrad)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="240" height="6" rx="3" fill="#ef4444" />
    <text x="120" y="30" class="header" fill="#ef4444" text-anchor="middle">Error Middleware</text>
    <text x="120" y="55" class="desc" text-anchor="middle">Catches Pipeline Failures</text>
    
    <rect x="15" y="75" width="210" height="30" rx="4" fill="#2d060b" />
    <text x="120" y="94" class="lbl" font-family="monospace" fill="#fca5a5" text-anchor="middle">(err, req, res, next)</text>
  </g>

  <!-- ROUTING ARROWS -->
  <!-- MW 1 to 2 -->
  <path d="M 220 225 H 280" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow)" fill="none" />
  
  <!-- MW 2 to Route -->
  <path d="M 470 200 C 500 200, 500 140, 520 140" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow)" fill="none" />
  
  <!-- Error routing (Skip to error handler if next(err) is called!) -->
  <path d="M 375 250 C 375 285, 480 300, 520 300" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)" fill="none" />
  <text x="430" y="275" class="arrow-lbl" text-anchor="middle">next(err)</text>
</svg>
