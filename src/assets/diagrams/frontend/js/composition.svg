<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080B11"/>
      <stop offset="100%" stop-color="#121824"/>
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradients for Nodes -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D174D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Connector Line Gradients -->
    <linearGradient id="line-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="line-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8B5CF6"/>
    </marker>
    <marker id="arrow-pink" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#EC4899"/>
    </marker>
    <marker id="arrow-gray" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Canvas Background -->
  <rect width="840" height="340" rx="16" fill="url(#bg-grad)" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Grid lines for engineering aesthetics -->
  <g stroke="#1E293B" stroke-width="0.5" opacity="0.3">
    <line x1="40" y1="0" x2="40" y2="340" />
    <line x1="140" y1="0" x2="140" y2="340" />
    <line x1="280" y1="0" x2="280" y2="340" />
    <line x1="420" y1="0" x2="420" y2="340" />
    <line x1="560" y1="0" x2="560" y2="340" />
    <line x1="700" y1="0" x2="700" y2="340" />
    <line x1="800" y1="0" x2="800" y2="340" />
    <line x1="0" y1="60" x2="840" y2="60" />
    <line x1="0" y1="170" x2="840" y2="170" />
    <line x1="0" y1="280" x2="840" y2="280" />
  </g>

  <!-- Title / Concept Name -->
  <text x="30" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="1">
    FUNCTIONAL COMPOSITION PIPELINE
  </text>
  <text x="30" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">
    f(g(h(x))) ➔ Outer function executes last, inner function executes first
  </text>

  <!-- Flow Direction Labels -->
  <!-- Left-to-Right: PIPE -->
  <g transform="translate(180, 290)">
    <line x1="0" y1="0" x2="480" y2="0" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-blue)" opacity="0.7"/>
    <text x="240" y="-8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle" letter-spacing="1.5">
      PIPE DIRECTION ➔ (LEFT-TO-RIGHT)
    </text>
  </g>

  <!-- Right-to-Left: COMPOSE -->
  <g transform="translate(180, 80)">
    <line x1="480" y1="0" x2="0" y2="0" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-pink)" opacity="0.7"/>
    <text x="240" y="-8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle" letter-spacing="1.5">
      ◀ COMPOSE EXECUTION ◀ (RIGHT-TO-LEFT)
    </text>
  </g>

  <!-- ================= PIPELINE STATIONS ================= -->

  <!-- Input Station (x) -->
  <g transform="translate(40, 130)">
    <!-- Container -->
    <rect width="100" height="80" rx="10" fill="#1E293B" fill-opacity="0.6" stroke="#475569" stroke-width="1.5" />
    <!-- Node Label -->
    <text x="50" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">
      INPUT
    </text>
    <!-- Actual Value -->
    <rect x="15" y="42" width="70" height="24" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1" />
    <text x="50" y="58" font-family="Fira Code, monospace" font-size="12" font-weight="bold" fill="#38BDF8" text-anchor="middle">
      x
    </text>
  </g>

  <!-- First Function: h(x) -->
  <g transform="translate(200, 130)">
    <!-- Glow behind node -->
    <rect width="140" height="80" rx="10" fill="url(#blue-grad)" filter="url(#glow)" opacity="0.15" />
    <!-- Main Node -->
    <rect width="140" height="80" rx="10" fill="url(#blue-grad)" stroke="#3B82F6" stroke-width="1.5" />
    <!-- Title -->
    <text x="70" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      h(x)
    </text>
    <!-- Description or Example -->
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">
      Stage 1: Inner
    </text>
    <!-- Sample operation -->
    <text x="70" y="62" font-family="Fira Code, monospace" font-size="9" fill="#E0F2FE" text-anchor="middle">
      lowercase(str)
    </text>
  </g>

  <!-- Second Function: g(x) -->
  <g transform="translate(400, 130)">
    <!-- Glow behind node -->
    <rect width="140" height="80" rx="10" fill="url(#purple-grad)" filter="url(#glow)" opacity="0.15" />
    <!-- Main Node -->
    <rect width="140" height="80" rx="10" fill="url(#purple-grad)" stroke="#8B5CF6" stroke-width="1.5" />
    <!-- Title -->
    <text x="70" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      g(val)
    </text>
    <!-- Description or Example -->
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C084FC" text-anchor="middle">
      Stage 2: Middle
    </text>
    <!-- Sample operation -->
    <text x="70" y="62" font-family="Fira Code, monospace" font-size="9" fill="#F3E8FF" text-anchor="middle">
      hyphenate(str)
    </text>
  </g>

  <!-- Third Function: f(x) -->
  <g transform="translate(600, 130)">
    <!-- Glow behind node -->
    <rect width="140" height="80" rx="10" fill="url(#pink-grad)" filter="url(#glow)" opacity="0.15" />
    <!-- Main Node -->
    <rect width="140" height="80" rx="10" fill="url(#pink-grad)" stroke="#EC4899" stroke-width="1.5" />
    <!-- Title -->
    <text x="70" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      f(val)
    </text>
    <!-- Description or Example -->
    <text x="70" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#F472B6" text-anchor="middle">
      Stage 3: Outer
    </text>
    <!-- Sample operation -->
    <text x="70" y="62" font-family="Fira Code, monospace" font-size="9" fill="#FCE7F3" text-anchor="middle">
      uppercase(str)
    </text>
  </g>

  <!-- Final Output Station -->
  <g transform="translate(770, 130)">
    <!-- Connector line to output -->
    <!-- Container -->
    <circle cx="20" cy="40" r="16" fill="#1E293B" stroke="#475569" stroke-width="1.5" />
    <text x="20" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#F1F5F9" text-anchor="middle">
      OUT
    </text>
  </g>

  <!-- ================= CONNECTORS / PIPES ================= -->

  <!-- Input to h(x) -->
  <line x1="140" y1="170" x2="192" y2="170" stroke="#64748B" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Value label above connector -->
  <text x="165" y="160" font-family="Fira Code, monospace" font-size="10" fill="#94A3B8" text-anchor="middle">x</text>

  <!-- h(x) to g(val) -->
  <line x1="340" y1="170" x2="392" y2="170" stroke="url(#line-grad-1)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <!-- Value label above connector -->
  <text x="367" y="160" font-family="Fira Code, monospace" font-size="10" fill="#60A5FA" text-anchor="middle">h(x)</text>

  <!-- g(val) to f(val) -->
  <line x1="540" y1="170" x2="592" y2="170" stroke="url(#line-grad-2)" stroke-width="2" marker-end="url(#arrow-pink)"/>
  <!-- Value label above connector -->
  <text x="567" y="160" font-family="Fira Code, monospace" font-size="10" fill="#C084FC" text-anchor="middle">g(h(x))</text>

  <!-- f(val) to OUT -->
  <line x1="740" y1="170" x2="752" y2="170" stroke="#EC4899" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <!-- Value label above connector -->
  <text x="755" y="150" font-family="Fira Code, monospace" font-size="10" fill="#F472B6" text-anchor="middle">f(g(h(x)))</text>

  <!-- ================= MATHEMATICAL NESTING CALLOUT ================= -->
  <!-- Showing how they wrap each other -->
  <g transform="translate(240, 225)">
    <rect x="-10" y="0" width="370" height="24" rx="12" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
    <text x="175" y="16" font-family="Fira Code, monospace" font-size="11" fill="#E2E8F0" text-anchor="middle">
      compose(f, g, h)(x) <tspan fill="#64748B">➔</tspan> <tspan fill="#EC4899">f(</tspan><tspan fill="#8B5CF6">g(</tspan><tspan fill="#3B82F6">h(</tspan>x<tspan fill="#3B82F6">)</tspan><tspan fill="#8B5CF6">)</tspan><tspan fill="#EC4899">)</tspan>
    </text>
  </g>
</svg>
