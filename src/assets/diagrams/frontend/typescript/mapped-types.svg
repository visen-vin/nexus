<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020815" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#040612" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #22d3ee; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #22d3ee; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #e0f2fe; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript Mapped Types Architecture</text>
  <text x="30" y="63" class="subtitle">Creating new types based on existing ones using loop-like key iterations, modifier adjustments, and key remapping.</text>

  <!-- LEFT BOX: The Base Source Type -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="100" width="220" height="310" rx="12" fill="url(#glassState)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="130" class="header-text">1. Base Source Type</text>
    <text x="50" y="150" class="desc">A standard source structure:</text>

    <!-- Source Type code -->
    <rect x="45" y="180" width="190" height="110" rx="8" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
    <text x="60" y="205" class="code-text" fill="#a5b4fc">interface User {</text>
    <text x="60" y="225" class="code-text" fill="#a5b4fc">  id: string;</text>
    <text x="60" y="245" class="code-text" fill="#a5b4fc">  name?: string;</text>
    <text x="60" y="265" class="code-text" fill="#a5b4fc">}</text>

    <text x="50" y="315" class="meta">Contains optional field "?"</text>
    <text x="50" y="330" class="meta">and mutable fields.</text>
  </g>

  <!-- Mapped Transformation Tunnel -->
  <path d="M 260 230 L 330 230" fill="none" stroke="#4b5563" stroke-width="2" />
  <polygon points="330,230 322,225 322,235" fill="#4b5563" />
  <text x="295" y="218" class="flow-label">Iteration</text>

  <!-- CENTER BOX: The Mapped transformation -->
  <g filter="url(#boxShadow)">
    <rect x="340" y="100" width="230" height="310" rx="12" fill="url(#glassState)" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="360" y="130" class="header-text" fill="#fbbf24">2. Mapped Transformation</text>
    <text x="360" y="150" class="desc">Iterates over key unions.</text>

    <!-- Mapped type signature -->
    <rect x="355" y="175" width="200" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="365" y="200" class="code-text" fill="#fcd34d">{</text>
    <text x="365" y="220" class="code-text" fill="#fcd34d">  [K in keyof T]-?:</text>
    <text x="365" y="240" class="code-text" fill="#22d3ee">    T[K];</text>
    <text x="365" y="260" class="code-text" fill="#fcd34d">}</text>

    <!-- Explainer labels -->
    <text x="360" y="315" class="meta" fill="#fbbf24">K in keyof T: "For each key K"</text>
    <text x="360" y="332" class="meta" fill="#fbbf24">-?: "Strip optional modifier"</text>
    <text x="360" y="349" class="meta" fill="#22d3ee">T[K]: "Retain value type"</text>
  </g>

  <!-- Arrow to output -->
  <path d="M 580 230 L 650 230" fill="none" stroke="#4b5563" stroke-width="2" />
  <polygon points="650,230 642,225 642,235" fill="#4b5563" />
  <text x="615" y="218" class="flow-label" fill="#10b981">Generates</text>

  <!-- RIGHT BOX: The Resulting Type -->
  <g filter="url(#boxShadow)">
    <rect x="660" y="100" width="110" height="310" rx="12" fill="url(#glassState)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="675" y="130" class="header-text" fill="#34d399">3. Output</text>

    <!-- Output preview -->
    <rect x="670" y="175" width="90" height="120" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
    <text x="680" y="200" class="code-text" fill="#34d399">User {</text>
    <text x="680" y="222" class="code-text" fill="#34d399">  id: string;</text>
    <text x="680" y="244" class="code-text" fill="#34d399">  name: string;</text>
    <text x="680" y="266" class="code-text" fill="#34d399">}</text>

    <text x="675" y="315" class="meta" fill="#34d399">All properties</text>
    <text x="675" y="330" class="meta" fill="#34d399">are strictly</text>
    <text x="675" y="345" class="meta" fill="#34d399">required!</text>
  </g>
</svg>
