<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node colors -->
    <linearGradient id="parentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="drilledGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <linearGradient id="targetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowComposition" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .header-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #F8FAFC; }
    .node-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .node-code { font-family: 'Fira Code', monospace; font-size: 8px; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">PROP DRILLING VS COMPONENT COMPOSITION</text>
    <text class="subtitle" x="0" y="18">DECOUPLING INTERMEDIATE LAYERS USING SLOTS AND CHILDREN PROP INJECTION</text>
  </g>

  <!-- LEFT: Prop Drilling (Bad) -->
  <g transform="translate(40, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#EF4444">1. Prop Drilling (Coupled)</text>
    
    <!-- Parent -->
    <g transform="translate(30, 60)">
      <rect width="130" height="40" rx="4" fill="#1E293B" stroke="#0EA5E9" stroke-width="1.5" />
      <text class="node-label" x="12" y="24">App { user }</text>
    </g>

    <!-- Layout -->
    <g transform="translate(220, 60)">
      <rect width="130" height="40" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" />
      <text class="node-label" x="12" y="24">Layout { user }</text>
    </g>

    <!-- Sidebar -->
    <g transform="translate(220, 130)">
      <rect width="130" height="40" rx="4" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" />
      <text class="node-label" x="12" y="24">Sidebar { user }</text>
    </g>

    <!-- Profile -->
    <g transform="translate(220, 200)">
      <rect width="130" height="40" rx="4" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
      <text class="node-label" x="12" y="24">Profile { user }</text>
    </g>

    <!-- Connectors -->
    <path d="M160,80 L212,80" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <path d="M285,100 L285,122" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <path d="M285,170 L285,192" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
  </g>

  <!-- RIGHT: Component Composition (Good) -->
  <g transform="translate(480, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#10B981">2. Component Composition (Decoupled)</text>
    
    <!-- Parent App -->
    <g transform="translate(30, 60)" filter="url(#glowComposition)">
      <rect width="140" height="80" rx="6" fill="#1E293B" stroke="#0EA5E9" stroke-width="2" />
      <rect width="140" height="4" fill="url(#parentGrad)" />
      <text class="node-label" x="10" y="25">App { user }</text>
      <text class="node-code" x="10" y="48">&lt;Layout&gt;</text>
      <text class="node-code" x="15" y="62">  &lt;Profile u={u}/&gt;</text>
      <text class="node-code" x="10" y="74">&lt;/Layout&gt;</text>
    </g>

    <!-- Layout & Sidebar Decoupled -->
    <g transform="translate(210, 60)">
      <rect width="140" height="50" rx="4" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
      <text class="node-label" x="12" y="22">Layout { children }</text>
      <text class="node-sub" x="12" y="38">No "user" prop needed</text>
    </g>

    <!-- Profile -->
    <g transform="translate(210, 170)" filter="url(#glowComposition)">
      <rect width="140" height="50" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="2" />
      <rect width="140" height="4" fill="url(#targetGrad)" />
      <text class="node-label" x="12" y="22">Profile { u }</text>
      <text class="node-sub" x="12" y="38">Direct Injection</text>
    </g>

    <!-- Connectors -->
    <path d="M170,100 C190,100 190,185 202,185" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)" />
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Insight: By composing components using children slots, intermediate layout blocks do not need to know about or transmit props that they do not use, making refactoring and layout testing completely painless.</text>
</svg>
