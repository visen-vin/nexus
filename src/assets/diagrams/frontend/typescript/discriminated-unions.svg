<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020917" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#030612" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="emeraldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #c084fc; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #c084fc; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #e9d5ff; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript Discriminated Unions</text>
  <text x="30" y="63" class="subtitle">Enforcing absolute runtime type-safety using tagged shapes combined with static exhaustiveness checking.</text>

  <!-- COLUMN 1: TAGGED UNION DEFINITION -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="100" width="340" height="310" rx="12" fill="url(#glassState)" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="130" class="header-text">1. The Tagged Shapes</text>
    <text x="50" y="150" class="desc">A shared literal key (the discriminant) exists in all types.</text>

    <!-- Union members -->
    <rect x="50" y="175" width="300" height="60" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
    <text x="65" y="198" class="code-text" fill="#a5b4fc">interface Circle { type: 'circle'; radius: number; }</text>
    <text x="65" y="216" class="meta" fill="#c7d2fe">Tag: type = 'circle'</text>

    <rect x="50" y="245" width="300" height="60" rx="6" fill="#1e1b4b" stroke="#312e81" stroke-width="1" />
    <text x="65" y="268" class="code-text" fill="#a5b4fc">interface Square { type: 'square'; side: number; }</text>
    <text x="65" y="286" class="meta" fill="#c7d2fe">Tag: type = 'square'</text>

    <!-- Combined Union -->
    <rect x="50" y="325" width="300" height="60" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <text x="65" y="348" class="code-text" fill="#c084fc">type Shape = Circle | Square;</text>
    <text x="65" y="366" class="meta">The union binds the structures together.</text>
  </g>

  <!-- COLUMN 2: STATIC SWITCH & EXHAUSTIVE NARROWING -->
  <g filter="url(#boxShadow)">
    <rect x="410" y="100" width="360" height="310" rx="12" fill="url(#glassState)" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="430" y="130" class="header-text" fill="#fbbf24">2. Exhaustive Narrowing &amp; default check</text>

    <!-- Code flow -->
    <rect x="430" y="160" width="320" height="150" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="445" y="185" class="code-text" fill="#fcd34d">switch (shape.type) {</text>
    <text x="445" y="205" class="code-text" fill="#34d399">  case 'circle': return PI * shape.radius ** 2;</text>
    <text x="445" y="225" class="code-text" fill="#34d399">  case 'square': return shape.side ** 2;</text>
    <text x="445" y="245" class="code-text" fill="#fb7185">  default:</text>
    <text x="445" y="265" class="code-text" fill="#fb7185">    const _check: never = shape;</text>
    <text x="445" y="285" class="code-text" fill="#fcd34d">}</text>

    <!-- The never check callout -->
    <rect x="430" y="325" width="320" height="70" rx="6" fill="#4c0519" stroke="#fb7185" stroke-width="1" />
    <text x="445" y="348" class="desc" font-weight="700" fill="#fda4af">Exhaustiveness Check Safety Guarantee</text>
    <text x="445" y="366" class="meta" fill="#fecdd3">If you add 'Rectangle' but forget a case, the compiler throws</text>
    <text x="445" y="380" class="meta" fill="#fecdd3">an error instantly at the default 'never' line!</text>
  </g>
</svg>
