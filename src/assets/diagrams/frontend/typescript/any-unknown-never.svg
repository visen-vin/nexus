<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Glassmorphic Panel Gradients -->
    <linearGradient id="anyGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.03" />
    </linearGradient>

    <linearGradient id="unknownGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.03" />
    </linearGradient>

    <linearGradient id="neverGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.03" />
    </linearGradient>

    <linearGradient id="middleGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#475569" stop-opacity="0.02" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="emeraldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#38bdf8" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .type-header { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 700; }
    .section-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; line-height: 1.4; }
    .meta { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #94a3b8; }
    .badge { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 9px; font-weight: 700; }
    .arrow-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 700; }
  </style>

  <!-- Background -->
  <rect width="800" height="480" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="480" rx="16" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid Background Lines -->
  <g opacity="0.03">
    <path d="M0 60 H800 M0 120 H800 M0 180 H800 M0 240 H800 M0 300 H800 M0 360 H800 M0 420 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V480 M200 0 V480 M300 0 V480 M400 0 V480 M500 0 V480 M600 0 V480 M700 0 V480" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="40" class="title">TypeScript Type System: Top vs. Bottom Types</text>
  <text x="30" y="58" class="subtitle">Exploring type safety, structural checking boundaries, and assignment permissions of any, unknown, and never.</text>

  <!-- TOP TYPES LABEL -->
  <text x="30" y="95" class="section-title">1. Top Types (Lvalue / Supertypes of All)</text>

  <!-- any BOX -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="110" width="340" height="135" rx="12" fill="url(#anyGlass)" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.25" />
    <text x="50" y="135" class="type-header" fill="url(#amberAccent)">any</text>
    <rect x="85" y="123" width="95" height="16" rx="4" fill="#78350f" opacity="0.6"/>
    <text x="90" y="134" class="badge" fill="#fef3c7">UNSAFE ESCAPE HATCH</text>
    
    <text x="50" y="162" class="desc">Bypasses all static type checking. Disables compiler safety.</text>
    <text x="50" y="180" class="desc">• Anything can be assigned to <tspan fill="#f59e0b" font-weight="700">any</tspan></text>
    <text x="50" y="195" class="desc">• <tspan fill="#f59e0b" font-weight="700">any</tspan> can be assigned to anything (propagates unsafe types)</text>
    
    <rect x="50" y="208" width="300" height="24" rx="4" fill="#1e1b4b" opacity="0.4" />
    <text x="58" y="223" class="meta" fill="#fbbf24">let x: any = 5; x.nonExistentMethod(); // ✓ OK</text>
  </g>

  <!-- unknown BOX -->
  <g filter="url(#boxShadow)">
    <rect x="430" y="110" width="340" height="135" rx="12" fill="url(#unknownGlass)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="450" y="135" class="type-header" fill="url(#cyanAccent)">unknown</text>
    <rect x="525" y="123" width="95" height="16" rx="4" fill="#083344" opacity="0.6"/>
    <text x="530" y="134" class="badge" fill="#e0f2fe">SAFE SUPERTYPE</text>
    
    <text x="450" y="162" class="desc">Type-safe alternative to any. Demands validation before use.</text>
    <text x="450" y="180" class="desc">• Anything can be assigned to <tspan fill="#06b6d4" font-weight="700">unknown</tspan></text>
    <text x="450" y="195" class="desc">• <tspan fill="#06b6d4" font-weight="700">unknown</tspan> cannot be used/assigned without narrowing</text>
    
    <rect x="450" y="208" width="300" height="24" rx="4" fill="#0f172a" opacity="0.4" />
    <text x="458" y="223" class="meta" fill="#22d3ee">let x: unknown = 5; x.someMethod(); // ❌ ERROR</text>
  </g>

  <!-- MIDDLE TYPES: Concrete Types -->
  <g filter="url(#boxShadow)">
    <rect x="230" y="285" width="340" height="50" rx="8" fill="url(#middleGlass)" stroke="#475569" stroke-width="1" />
    <text x="400" y="305" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="12px" font-weight="700" fill="#cbd5e1" text-anchor="middle">CONCRETE TYPES</text>
    <text x="400" y="322" font-family="'Fira Code', 'Courier New', monospace" font-size="10px" fill="#94a3b8" text-anchor="middle">string | number | boolean | Object | CustomType</text>
  </g>

  <!-- BOTTOM TYPE LABEL -->
  <text x="30" y="372" class="section-title">2. Bottom Type (Subtype of All)</text>

  <!-- never BOX -->
  <g filter="url(#boxShadow)">
    <rect x="230" y="385" width="340" height="80" rx="12" fill="url(#neverGlass)" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="250" y="410" class="type-header" fill="url(#roseAccent)">never</text>
    <rect x="300" y="398" width="105" height="16" rx="4" fill="#500724" opacity="0.6"/>
    <text x="305" y="409" class="badge" fill="#fce7f3">IMPOSSIBLE VOID / BOTTOM</text>
    
    <text x="250" y="432" class="desc">Represents the empty set. Used for exhaustiveness and dead code.</text>
    <text x="250" y="450" class="desc">• Can be assigned to anything | Nothing can be assigned to it</text>
  </g>

  <!-- FLOW ARROWS & PERMISSIONS -->

  <!-- Left: any assignment paths -->
  <!-- any to middle (allowed) -->
  <path d="M 120 245 L 120 310 L 220 310" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-amber)" />
  <rect x="100" y="258" width="90" height="16" rx="3" fill="#0f172a" stroke="#fbbf24" stroke-width="0.5" />
  <text x="145" y="270" class="arrow-text" fill="#fbbf24" text-anchor="middle">Unchecked Bypass</text>

  <!-- middle to any (allowed) -->
  <path d="M 230 295 L 80 295 L 80 248" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <text x="145" y="290" class="arrow-text" fill="#10b981" text-anchor="middle">Implicit Upcast</text>

  <!-- Right: unknown assignment paths -->
  <!-- middle to unknown (allowed) -->
  <path d="M 570 295 L 720 295 L 720 248" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <text x="655" y="290" class="arrow-text" fill="#10b981" text-anchor="middle">Implicit Upcast</text>

  <!-- unknown to middle (forbidden without assertion) -->
  <path d="M 680 245 L 680 310 L 580 310" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)" />
  <rect x="610" y="258" width="90" height="16" rx="3" fill="#0f172a" stroke="#f43f5e" stroke-width="0.5" />
  <text x="655" y="270" class="arrow-text" fill="#ef4444" text-anchor="middle">Blocked (Requires Check)</text>

  <!-- Bottom: never paths -->
  <!-- never to middle (allowed) -->
  <path d="M 270 380 L 270 345" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrow-blue)" />
  <text x="260" y="365" class="arrow-text" fill="#38bdf8" text-anchor="end">Subtype of all</text>

  <!-- middle to never (blocked) -->
  <path d="M 500 345 L 500 380" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)" />
  <text x="510" y="365" class="arrow-text" fill="#ef4444" text-anchor="start">Empty Set (Blocked)</text>

</svg>
