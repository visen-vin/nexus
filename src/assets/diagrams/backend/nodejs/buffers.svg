<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="heapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="ramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
    .arrow-lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; fill: #fbbf24; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">Buffer Memory Allocation Architecture</text>
  <text x="30" y="65" class="subtitle">Contrast the managed V8 JavaScript Heap with raw system RAM allocated externally via C++ memory structures</text>

  <!-- LEFT CARD: V8 JAVASCRIPT HEAP -->
  <g filter="url(#boxShadow)" transform="translate(40, 110)">
    <rect width="320" height="280" rx="12" fill="url(#heapGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#3b82f6" />
    <text x="20" y="30" class="header" fill="#3b82f6">V8 JavaScript Heap</text>
    <text x="20" y="48" class="desc">Managed Garbage-Collected Memory</text>

    <!-- JS Object Wrapper -->
    <g transform="translate(15, 75)">
      <rect width="290" height="180" rx="8" fill="#09132e" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.1" />
      <text x="145" y="25" class="header" fill="#60a5fa" font-size="13" text-anchor="middle">JavaScript Buffer Object</text>
      
      <!-- Inside V8 fields -->
      <rect x="15" y="45" width="260" height="30" rx="4" fill="#172554" />
      <text x="25" y="64" class="lbl">Buffer wrapper instance (JS reference)</text>
      
      <rect x="15" y="85" width="260" height="30" rx="4" fill="#172554" />
      <text x="25" y="104" class="lbl">ArrayBuffer metadata (.length, .type)</text>

      <rect x="15" y="125" width="260" height="40" rx="4" fill="#1e1b4b" stroke="#f59e0b" stroke-width="1" />
      <text x="145" y="142" class="lbl" fill="#fef08a" text-anchor="middle">Memory Pointer (C++ Address)</text>
      <text x="145" y="155" class="desc" fill="#fef08a" text-anchor="middle">Points to raw system memory</text>
    </g>
  </g>

  <!-- RIGHT CARD: SYSTEM RAM / C++ HEAP -->
  <g filter="url(#boxShadow)" transform="translate(440, 110)">
    <rect width="320" height="280" rx="12" fill="url(#ramGrad)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="320" height="6" rx="3" fill="#10b981" />
    <text x="20" y="30" class="header" fill="#10b981">External System Memory</text>
    <text x="20" y="48" class="desc">Allocated outside the V8 V8 Heap</text>

    <!-- Raw binary blocks -->
    <g transform="translate(15, 75)">
      <rect width="290" height="180" rx="8" fill="#022c22" stroke="#10b981" stroke-width="1" stroke-opacity="0.1" />
      <text x="145" y="25" class="header" fill="#34d399" font-size="13" text-anchor="middle">Raw Binary Data (C++ Array)</text>
      
      <!-- Bytes representation -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="45" height="40" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5" />
        <text x="22" y="24" class="lbl" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">0x48</text>
        
        <rect x="55" y="0" width="45" height="40" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5" />
        <text x="77" y="24" class="lbl" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">0x65</text>
        
        <rect x="110" y="0" width="45" height="40" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5" />
        <text x="132" y="24" class="lbl" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">0x6c</text>
        
        <rect x="165" y="0" width="45" height="40" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5" />
        <text x="187" y="24" class="lbl" fill="#34d399" font-size="10" font-weight="bold" text-anchor="middle">0x6c</text>

        <rect x="220" y="0" width="30" height="40" rx="4" fill="#022c22" stroke="#059669" stroke-width="1.5" stroke-dasharray="2" />
        <text x="235" y="24" class="lbl" fill="#34d399" font-size="10" text-anchor="middle">...</text>
      </g>
      
      <rect x="20" y="110" width="250" height="50" rx="4" fill="#064e3b" />
      <text x="145" y="128" class="lbl" font-size="10" text-anchor="middle">Direct System OS Operations</text>
      <text x="145" y="144" class="desc" fill="#a7f3d0" text-anchor="middle">(Fast File Write, Socket Send, Stream Pipe)</text>
    </g>
  </g>

  <!-- MEMORY POINTER ROUTING -->
  <path d="M 290 255 C 370 255, 370 205, 455 205" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)" fill="none" />
  <circle cx="290" cy="255" r="4" fill="#fbbf24" />
  <text x="365" y="235" class="arrow-lbl" text-anchor="middle">references</text>
</svg>
