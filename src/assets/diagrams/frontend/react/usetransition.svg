<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 550" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070F" />
      <stop offset="50%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <!-- Priority Gradients -->
    <linearGradient id="urgentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2E93" />
      <stop offset="100%" stop-color="#FF8A00" />
    </linearGradient>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
    <linearGradient id="schedulerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glassmorphic Card Backgrounds -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Glowing filters -->
    <filter id="glowUrgent" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowTransition" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowScheduler" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Patterns -->
    <pattern id="diagonalHatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#EF4444" stroke-width="2" opacity="0.4" />
    </pattern>

    <!-- Markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38BDF8" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 18px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .lane-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #E2E8F0; }
    .lane-sub { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 10px; fill: #94A3B8; }
    .node-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .code-text { font-family: 'Fira Code', monospace; font-size: 10px; fill: #38BDF8; }
    .mono-bold { font-family: 'Fira Code', monospace; font-weight: bold; font-size: 11px; }
    .legend-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .time-label { font-family: 'Fira Code', monospace; font-size: 10px; fill: #64748B; text-anchor: middle; }
    .annotation-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 11px; fill: #CBD5E1; }
  </style>

  <!-- Container -->
  <rect width="950" height="550" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2.5" />

  <!-- Coordinates Grid (subtle background element) -->
  <g opacity="0.02">
    <line x1="50" y1="0" x2="50" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="550" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="950" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="950" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="950" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="950" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">REACT FIBER CONCURRENT SCHEDULER</text>
    <text class="subtitle" x="0" y="18">INTERRUPTIBLE RENDERING ARCHITECTURE &amp; PRIORITY LANES (useTransition)</text>
  </g>

  <!-- ================= SECTION 1: PRIORITY LANES ================= -->
  <g transform="translate(40, 95)">
    <!-- Section Border -->
    <rect width="870" height="150" rx="12" fill="url(#cardGrad)" stroke="#1E293B" stroke-width="1.5" />
    
    <!-- Title Section 1 -->
    <text class="lane-label" x="20" y="25" fill="#38BDF8">Fiber Priority Lanes</text>
    <text class="lane-sub" x="20" y="38">React maps updates to 32 distinct Lane Bits (32-bit bitmask) for scheduling</text>

    <!-- Lane 1: URGENT LANE -->
    <g transform="translate(20, 55)">
      <!-- Label -->
      <text class="lane-label" x="0" y="20">Urgent Lanes</text>
      <text class="lane-sub" x="0" y="32">Sync, User Input, Clicks</text>
      
      <!-- Track -->
      <rect x="220" y="8" width="600" height="12" rx="6" fill="#1E1E2F" stroke="#334155" stroke-width="1" />
      <line x1="220" y1="14" x2="820" y2="14" stroke="url(#urgentGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glowUrgent)" />
      
      <!-- Discrete Tasks (High Priority Keypress Events) -->
      <circle cx="340" cy="14" r="9" fill="#FF2E93" stroke="#FFFFFF" stroke-width="1.5" filter="url(#glowUrgent)" />
      <text class="code-text" x="333" y="32" fill="#FF8A00" font-weight="bold">Input</text>
      
      <circle cx="560" cy="14" r="9" fill="#FF2E93" stroke="#FFFFFF" stroke-width="1.5" filter="url(#glowUrgent)" />
      <text class="code-text" x="553" y="32" fill="#FF8A00" font-weight="bold">Input</text>
    </g>

    <!-- Lane 2: TRANSITION LANE -->
    <g transform="translate(20, 100)">
      <!-- Label -->
      <text class="lane-label" x="0" y="20">Transition Lanes</text>
      <text class="lane-sub" x="0" y="32">Deferred Search / List Rendering</text>
      
      <!-- Track -->
      <rect x="220" y="8" width="600" height="12" rx="6" fill="#1E1E2F" stroke="#334155" stroke-width="1" />
      <!-- Segmented chunks showing interruptible nature -->
      <line x1="220" y1="14" x2="330" y2="14" stroke="url(#transitionGrad)" stroke-width="4" stroke-dasharray="10, 5" stroke-linecap="round" filter="url(#glowTransition)" />
      <line x1="345" y1="14" x2="550" y2="14" stroke="#EF4444" stroke-width="4" stroke-dasharray="3, 3" stroke-linecap="round" /> <!-- Interrupted block! -->
      <line x1="565" y1="14" x2="820" y2="14" stroke="url(#transitionGrad)" stroke-width="4" stroke-dasharray="10, 5" stroke-linecap="round" filter="url(#glowTransition)" />

      <!-- Heavy Task Chunk Representation -->
      <rect x="250" y="4" width="60" height="20" rx="4" fill="#0E172C" stroke="#00F0FF" stroke-width="1.5" />
      <text class="mono-bold" x="257" y="17" fill="#00F0FF" font-size="9">Fiber A</text>

      <rect x="420" y="4" width="60" height="20" rx="4" fill="#1E101A" stroke="#EF4444" stroke-width="1.5" />
      <text class="mono-bold" x="427" y="17" fill="#EF4444" font-size="9">Fiber B</text>
      
      <rect x="670" y="4" width="60" height="20" rx="4" fill="#0E172C" stroke="#00F0FF" stroke-width="1.5" />
      <text class="mono-bold" x="677" y="17" fill="#00F0FF" font-size="9">Fiber C</text>

      <!-- Lightning bolt for Interruption -->
      <path d="M 340 18 L 335 30 L 342 30 L 338 42" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linejoin="round" />
    </g>
  </g>

  <!-- ================= SECTION 2: THE SCHEDULER & CONCURRENCY ORCHESTRATOR ================= -->
  
  <!-- Scheduler Core Node -->
  <g transform="translate(385, 260)">
    <!-- Connection lines to lanes -->
    <path d="M -5, -45 C -5, -15 -145, -15 -145, 25" fill="none" stroke="#64748B" stroke-dasharray="2,2" stroke-width="1.5" />
    <path d="M 185, -45 C 185, -15 25, -15 25, 25" fill="none" stroke="#64748B" stroke-dasharray="2,2" stroke-width="1.5" />

    <!-- Scheduler Box -->
    <rect x="-10" y="0" width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#10B981" stroke-width="2.5" filter="url(#glowScheduler)" />
    <rect x="-10" y="0" width="200" height="6" rx="3" fill="url(#schedulerGrad)" />
    
    <text class="node-text" x="90" y="26" text-anchor="middle" font-size="13" letter-spacing="1">Fiber Scheduler</text>
    <text class="code-text" x="90" y="43" text-anchor="middle" fill="#10B981">shouldYield() == true</text>
    <text class="lane-sub" x="90" y="55" text-anchor="middle">Yields to Main Thread every 5ms</text>
  </g>

  <!-- Flow Arrows showing Scheduler action -->
  <path d="M 380, 150 L 380, 275" fill="none" stroke="#FF2E93" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />
  <text class="mono-bold" x="325" y="210" fill="#FF2E93" font-size="10">High Priority Input</text>

  <path d="M 590, 195 L 560, 275" fill="none" stroke="#00F0FF" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />
  <text class="mono-bold" x="590" y="240" fill="#00F0FF" font-size="10">Transition Work</text>

  <!-- ================= SECTION 3: THE MAIN THREAD TIMELINE ================= -->
  <g transform="translate(40, 350)">
    <!-- Title Section 3 -->
    <text class="lane-label" x="20" y="20" fill="#10B981">Main Thread Timeline (Interruptible Render)</text>
    <text class="lane-sub" x="20" y="32">Traditional React blocks the main thread. Concurrent React yields control to maintain responsiveness.</text>

    <!-- Timeline Arrow -->
    <line x1="20" y1="75" x2="840" y2="75" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Time ticks -->
    <line x1="120" y1="70" x2="120" y2="80" stroke="#64748B" stroke-width="1.5" />
    <text class="time-label" x="120" y="93">0ms</text>

    <line x1="260" y1="70" x2="260" y2="80" stroke="#64748B" stroke-width="1.5" />
    <text class="time-label" x="260" y="93">50ms</text>

    <line x1="390" y1="70" x2="390" y2="80" stroke="#64748B" stroke-width="1.5" />
    <text class="time-label" x="390" y="93">100ms</text>

    <line x1="570" y1="70" x2="570" y2="80" stroke="#64748B" stroke-width="1.5" />
    <text class="time-label" x="570" y="93">150ms</text>
    
    <line x1="780" y1="70" x2="780" y2="80" stroke="#64748B" stroke-width="1.5" />
    <text class="time-label" x="780" y="93">200ms</text>
    
    <!-- TIMELINE BLOCKS -->

    <!-- BLOCK 1: Sync input processing -->
    <rect x="40" y="45" width="80" height="22" rx="4" fill="#FF2E93" fill-opacity="0.25" stroke="#FF2E93" stroke-width="1.5" filter="url(#glowUrgent)" />
    <text class="node-text" x="80" y="59" text-anchor="middle" font-size="10">Sync Render</text>
    <path d="M 80, 30 L 80, 42" fill="none" stroke="#FF2E93" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <text class="lane-sub" x="40" y="24" fill="#FF2E93" font-weight="bold">KeyPress 'A'</text>

    <!-- BLOCK 2: Transition render start -->
    <rect x="130" y="45" width="110" height="22" rx="4" fill="#00F0FF" fill-opacity="0.15" stroke="#00F0FF" stroke-width="1.5" filter="url(#glowTransition)" />
    <text class="node-text" x="185" y="59" text-anchor="middle" font-size="10">Transition (Part 1)</text>
    <text class="lane-sub" x="130" y="24" fill="#00F0FF">Start Search Query</text>

    <!-- BLOCK 3: Interrupted / Yield State -->
    <rect x="250" y="45" width="60" height="22" rx="4" fill="url(#diagonalHatch)" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="2,2" />
    <text class="node-text" x="280" y="59" text-anchor="middle" font-size="9" fill="#EF4444">PAUSED</text>

    <!-- Interruption trigger line -->
    <path d="M 330, -5 M 330, 20 L 330, 40" fill="none" stroke="#EF4444" stroke-dasharray="2,2" stroke-width="1.5" />
    <path d="M 330, -10 M 340, 14 C 330, 22 280, 15 280, 42" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <text class="lane-sub" x="320" y="-12" fill="#EF4444" font-weight="bold">KeyPress 'B' (Urgent!)</text>

    <!-- BLOCK 4: Sync input processing for keypress B -->
    <rect x="320" y="45" width="90" height="22" rx="4" fill="#FF2E93" fill-opacity="0.25" stroke="#FF2E93" stroke-width="1.5" filter="url(#glowUrgent)" />
    <text class="node-text" x="365" y="59" text-anchor="middle" font-size="10">Sync Render 'B'</text>

    <!-- BLOCK 5: Main Thread yields and performs browser paint -->
    <rect x="420" y="45" width="70" height="22" rx="4" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="1.5" />
    <text class="node-text" x="455" y="59" text-anchor="middle" font-size="10" fill="#34D399">DOM Paint</text>
    <text class="lane-sub" x="425" y="24" fill="#10B981">UI Responsive</text>

    <!-- BLOCK 6: Resume Transition rendering -->
    <rect x="500" y="45" width="130" height="22" rx="4" fill="#00F0FF" fill-opacity="0.15" stroke="#00F0FF" stroke-width="1.5" filter="url(#glowTransition)" />
    <text class="node-text" x="565" y="59" text-anchor="middle" font-size="10">Transition (Part 2)</text>
    <text class="lane-sub" x="500" y="24" fill="#00F0FF">Resume Rendering</text>

    <!-- BLOCK 7: Complete and Commit Transition -->
    <rect x="640" y="45" width="90" height="22" rx="4" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="1.5" />
    <text class="node-text" x="685" y="59" text-anchor="middle" font-size="10" fill="#34D399">Commit List</text>
    <text class="lane-sub" x="640" y="24" fill="#38BDF8">Search Results Visible</text>
  </g>

  <!-- ================= SECTION 4: LEGEND ================= -->
  <g transform="translate(40, 480)">
    <rect width="870" height="45" rx="8" fill="#0F172A" stroke="#1E293B" stroke-width="1.2" />
    
    <g transform="translate(20, 14)">
      <!-- Urgent Indicator -->
      <circle cx="10" cy="8" r="6" fill="#FF2E93" filter="url(#glowUrgent)" />
      <text class="legend-text" x="22" y="12">Urgent Lane / Sync Render (Blocked Main Thread, immediate commit)</text>

      <!-- Transition Indicator -->
      <circle cx="440" cy="8" r="6" fill="#00F0FF" filter="url(#glowTransition)" />
      <text class="legend-text" x="452" y="12">Transition Lane (Interruptible, spreads render work across frames)</text>

      <!-- Scheduler / Interruption Indicator -->
      <path d="M 800 2 L 795 14 L 802 14 L 798 26" fill="none" stroke="#EF4444" stroke-width="2" stroke-linejoin="round" />
      <text class="legend-text" x="812" y="12">Interruption (Context Switch)</text>
    </g>
  </g>
</svg>
