<svg width="100%" height="100%" viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes scan-line { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(120px); opacity: 0; } }
    .pointer-line { animation: scan-line 3s infinite linear; }
  </style>
  <rect width="400" height="480" rx="24" fill="#0d0d0f"/>
  <g transform="translate(30, 60)">
    <rect width="340" height="150" rx="16" fill="#1A1A1D" stroke="#333"/>
    <rect x="30" y="45" width="280" height="2" fill="var(--domain-accent)" class="pointer-line" />
    <g transform="translate(40, 60)">
      <text y="0" fill="#888" font-family="monospace" font-size="12">getName();</text>
      <text y="25" fill="#f9ab00" font-family="monospace" font-size="12">var x = 7;</text>
    </g>
  </g>
  <g transform="translate(30, 270)">
    <rect width="340" height="160" rx="16" fill="#1A1A1D" stroke="var(--domain-accent)" stroke-opacity="0.2"/>
    <text x="170" y="80" text-anchor="middle" fill="#f1f1f1" font-family="monospace" font-size="12">x: undefined</text>
  </g>
</svg>
