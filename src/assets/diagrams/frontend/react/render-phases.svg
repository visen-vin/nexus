<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node colors -->
    <linearGradient id="triggerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="commitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="paintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowRoot" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0EA5E9" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .header-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #F8FAFC; }
    .node-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .node-code { font-family: 'Fira Code', monospace; font-size: 8.5px; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">REACT RENDER AND COMMIT CYCLE PIPELINE</text>
    <text class="subtitle" x="0" y="18">THE PIPELINE FROM DATA STATE TRIGGER TO PHYSICAL DOM PAINTING</text>
  </g>

  <!-- Stage 1: Trigger (Orange) -->
  <g transform="translate(30, 150)">
    <rect width="180" height="200" rx="8" fill="#111827" stroke="#F59E0B" stroke-width="2" />
    <rect width="180" height="5" fill="url(#triggerGrad)" />
    <text class="node-label" x="15" y="25">Stage 1: Trigger</text>
    <text class="node-sub" x="15" y="45">Event / Setup Initiated</text>
    
    <g transform="translate(15, 65)">
      <rect width="150" height="40" rx="4" fill="#1E293B" stroke="#374151" stroke-width="1" />
      <text class="node-code" x="10" y="24">1. Initial Mount</text>
    </g>
    <g transform="translate(15, 115)">
      <rect width="150" height="40" rx="4" fill="#1E293B" stroke="#374151" stroke-width="1" />
      <text class="node-code" x="10" y="24">2. State Update (setX)</text>
    </g>
    <text class="node-desc" x="15" y="180" font-size="8">React is notified of change</text>
  </g>

  <!-- Connection: Trigger -> Render -->
  <path d="M210,240 L242,240" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)" />

  <!-- Stage 2: Render Phase (Blue) -->
  <g transform="translate(250, 130)" filter="url(#glowRoot)">
    <rect width="200" height="240" rx="8" fill="#111827" stroke="#0EA5E9" stroke-width="2.5" />
    <rect width="200" height="5" fill="url(#renderGrad)" />
    <text class="node-label" x="15" y="25">Stage 2: Render Phase</text>
    <text class="node-sub" x="15" y="45">Asynchronous / Concurrent</text>
    
    <!-- Rule card -->
    <g transform="translate(15, 65)">
      <rect width="170" height="150" rx="4" fill="#1E293B" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.3" />
      <text class="node-code" x="10" y="25" fill="#38BDF8">Rules: MUST BE PURE</text>
      <text class="node-code" x="10" y="50">- Invokes Component Funcs</text>
      <text class="node-code" x="10" y="75">- Performs VDOM Diffing</text>
      <text class="node-code" x="10" y="100">- NO DOM mutations allowed</text>
      <text class="node-code" x="10" y="125">- Can pause / abort safely</text>
    </g>
  </g>

  <!-- Connection: Render -> Commit -->
  <path d="M450,240 L482,240" fill="none" stroke="#0EA5E9" stroke-width="2" marker-end="url(#arrowBlue)" />

  <!-- Stage 3: Commit Phase (Purple) -->
  <g transform="translate(490, 130)">
    <rect width="200" height="240" rx="8" fill="#111827" stroke="#A855F7" stroke-width="2" />
    <rect width="200" height="5" fill="url(#commitGrad)" />
    <text class="node-label" x="15" y="25">Stage 3: Commit Phase</text>
    <text class="node-sub" x="15" y="45">Synchronous / Blocking</text>
    
    <!-- Rule card -->
    <g transform="translate(15, 65)">
      <rect width="170" height="150" rx="4" fill="#1E293B" stroke="#A855F7" stroke-width="1" stroke-opacity="0.3" />
      <text class="node-code" x="10" y="25" fill="#C084FC">Actions: APPLY CHANGES</text>
      <text class="node-code" x="10" y="50">- Modifies Physical DOM</text>
      <text class="node-code" x="10" y="75">- Updates Refs</text>
      <text class="node-code" x="10" y="100">- Runs layout effects</text>
      <text class="node-code" x="10" y="125">- Cannot be interrupted</text>
    </g>
  </g>

  <!-- Connection: Commit -> Paint -->
  <path d="M690,240 L722,240" fill="none" stroke="#A855F7" stroke-width="2" marker-end="url(#arrowPurple)" />

  <!-- Stage 4: Browser Paint (Green) -->
  <g transform="translate(730, 150)">
    <rect width="140" height="200" rx="8" fill="#111827" stroke="#10B981" stroke-width="2" />
    <rect width="140" height="5" fill="url(#paintGrad)" />
    <text class="node-label" x="15" y="25">4. Paint</text>
    <text class="node-sub" x="15" y="45">Browser paint</text>
    <text class="node-code" x="15" y="85">Browser updates</text>
    <text class="node-code" x="15" y="110">pixels on the</text>
    <text class="node-code" x="15" y="135">viewport screen.</text>
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Insight: The Render Phase is purely mathematical computation that is safely interruptible in Concurrent React. The Commit Phase is synchronous because inconsistent visual states are unacceptable to the user.</text>
</svg>
