<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040d21" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Glassmorphism Cards -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>

    <!-- HSL Gradients for Columns -->
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(200, 95%, 55%)" />
      <stop offset="100%" stop-color="hsl(215, 95%, 45%)" />
    </linearGradient>

    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(270, 95%, 65%)" />
      <stop offset="100%" stop-color="hsl(285, 90%, 50%)" />
    </linearGradient>

    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(40, 95%, 60%)" />
      <stop offset="100%" stop-color="hsl(20, 90%, 50%)" />
    </linearGradient>

    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(150, 80%, 50%)" />
      <stop offset="100%" stop-color="hsl(165, 80%, 40%)" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#38bdf8" />
    </marker>
    
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#c084fc" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 22px; font-weight: 800; fill: #f8fafc; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #94a3b8; font-weight: 500; }
    .card-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #f1f5f9; }
    .card-subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #64748b; }
    .pipeline-step { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #f1f5f9; }
    .code-text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 10.5px; fill: #cbd5e1; }
    .code-keyword { fill: #f43f5e; font-weight: bold; }
    .code-type { fill: #38bdf8; }
    .code-string { fill: #34d399; }
    .code-comment { fill: #64748b; font-style: italic; }
    .badge { font-family: 'Inter', system-ui, sans-serif; font-size: 9px; font-weight: 700; fill: #ffffff; }
    .flow-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #38bdf8; }
  </style>

  <!-- Background -->
  <rect width="800" height="480" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="480" rx="16" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05">
    <path d="M0 40 H800 M0 80 H800 M0 120 H800 M0 160 H800 M0 200 H800 M0 240 H800 M0 280 H800 M0 320 H800 M0 360 H800 M0 400 H800 M0 440 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M40 0 V480 M80 0 V480 M120 0 V480 M160 0 V480 M200 0 V480 M240 0 V480 M280 0 V480 M320 0 V480 M360 0 V480 M400 0 V480 M440 0 V480 M480 0 V480 M520 0 V480 M560 0 V480 M600 0 V480 M640 0 V480 M680 0 V480 M720 0 V480 M760 0 V480" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <g transform="translate(30, 45)">
    <text class="title" x="0" y="0">TypeScript Compilation &amp; Type Erasure Pipeline</text>
    <text class="subtitle" x="0" y="20">Visualizing the tsc compiler pipeline converting static type constructs to plain runtime JS and type declarations.</text>
  </g>

  <!-- ========================================== -->
  <!-- LEFT COLUMN: TypeScript Input (.ts)        -->
  <!-- ========================================== -->
  <g filter="url(#shadow)" transform="translate(30, 95)">
    <!-- Main Card Body -->
    <rect width="210" height="340" rx="12" fill="url(#glassCard)" stroke="#334155" stroke-width="1.5" />
    <rect width="210" height="40" rx="12" fill="#0f172a" opacity="0.8" />
    <rect width="210" height="340" rx="12" fill="none" stroke="url(#blueGlow)" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- Title Area -->
    <circle cx="20" cy="20" r="5" fill="#f43f5e" />
    <circle cx="34" cy="20" r="5" fill="#eab308" />
    <circle cx="48" cy="20" r="5" fill="#22c55e" />
    <text class="card-title" x="65" y="24">index.ts</text>
    <text class="card-subtitle" x="145" y="24">[TS Input]</text>

    <!-- Code Editor Box -->
    <rect x="12" y="55" width="186" height="268" rx="8" fill="#020617" stroke="#1e293b" stroke-width="1" />
    
    <!-- TypeScript Code Snippet -->
    <g transform="translate(22, 75)">
      <!-- interface User { -->
      <text class="code-text" x="0" y="0"><tspan class="code-keyword">interface</tspan> User {</text>
      <text class="code-text" x="12" y="16">id: <tspan class="code-type">number</tspan>;</text>
      <text class="code-text" x="12" y="32">name: <tspan class="code-type">string</tspan>;</text>
      <text class="code-text" x="0" y="48">}</text>

      <!-- class Developer implements User { -->
      <text class="code-text" x="0" y="74"><tspan class="code-keyword">class</tspan> Dev <tspan class="code-keyword">implements</tspan> <tspan class="code-type">User</tspan> {</text>
      <text class="code-text" x="12" y="90">id: <tspan class="code-type">number</tspan>;</text>
      <text class="code-text" x="12" y="106">name: <tspan class="code-type">string</tspan>;</text>
      
      <text class="code-text" x="12" y="126"><tspan class="code-keyword">constructor</tspan>(n: <tspan class="code-type">string</tspan>) {</text>
      <text class="code-text" x="24" y="142"><tspan class="code-keyword">this</tspan>.id = Math.random();</text>
      <text class="code-text" x="24" y="158"><tspan class="code-keyword">this</tspan>.name = n;</text>
      <text class="code-text" x="12" y="174">}</text>

      <text class="code-text" x="12" y="194">@logCall</text>
      <text class="code-text" x="12" y="210">greet(): <tspan class="code-type">string</tspan> {</text>
      <text class="code-text" x="24" y="226"><tspan class="code-keyword">return</tspan> <tspan class="code-string">`Hi, ${this.name}`</tspan>;</text>
      <text class="code-text" x="12" y="242">}</text>
      <text class="code-text" x="0" y="258">}</text>
    </g>
  </g>

  <!-- Connecting Arrow 1: Input to Pipeline -->
  <path d="M 240 265 L 268 265" fill="none" stroke="url(#blueGlow)" stroke-width="2" marker-end="url(#arrow)" filter="url(#glow)" />
  <text class="flow-text" x="254" y="253" text-anchor="middle">Feed</text>

  <!-- ========================================== -->
  <!-- MIDDLE COLUMN: tsc Compiler Engine         -->
  <!-- ========================================== -->
  <g filter="url(#shadow)" transform="translate(280, 95)">
    <!-- Main Card Body -->
    <rect width="230" height="340" rx="12" fill="url(#glassCard)" stroke="#334155" stroke-width="1.5" />
    <rect width="230" height="40" rx="12" fill="#0f172a" opacity="0.8" />
    <rect width="230" height="340" rx="12" fill="none" stroke="url(#purpleGlow)" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- Title Area -->
    <text class="card-title" x="15" y="25">TypeScript Compiler (tsc)</text>
    <rect x="172" y="12" width="45" height="16" rx="4" fill="#6b21a8" />
    <text class="badge" x="181" y="24">PIPELINE</text>

    <!-- Stage 1: Parsing -->
    <g transform="translate(15, 60)">
      <rect width="200" height="65" rx="8" fill="#1e1b4b" stroke="#581c87" stroke-width="1" />
      <text class="pipeline-step" x="12" y="22" fill="#c084fc">1. Parsing &amp; AST Generation</text>
      <text class="code-text" x="12" y="38" fill="#a78bfa">Creates Abstract Syntax Tree (AST)</text>
      <text class="code-text" x="12" y="52" fill="#a78bfa">Lexical analysis &amp; syntax validation</text>
      <!-- AST Icon mini -->
      <path d="M 175 15 L 165 30 H 185 Z M 165 30 L 155 45 H 175 Z M 185 30 L 175 45 H 195 Z" stroke="#c084fc" stroke-width="1" fill="none" />
    </g>

    <!-- Down Arrow 1 -->
    <path d="M 115 125 V 139" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)" />

    <!-- Stage 2: Type Checking -->
    <g transform="translate(15, 145)">
      <rect width="200" height="75" rx="8" fill="#031e30" stroke="#0369a1" stroke-width="1" />
      <text class="pipeline-step" x="12" y="22" fill="#38bdf8">2. Type Checking (Checker)</text>
      <text class="code-text" x="12" y="38" fill="#7dd3fc">Binder links symbols into SymbolTable.</text>
      <text class="code-text" x="12" y="52" fill="#7dd3fc">Checker maps types &amp; runs structural</text>
      <text class="code-text" x="12" y="66" fill="#7dd3fc">compatibility checks. Reports diagnostics.</text>
      <!-- Checker Shield mini -->
      <path d="M 180 15 L 180 40 C 170 38 165 30 165 30 Z" stroke="#38bdf8" stroke-width="1" fill="none" />
      <path d="M 180 15 L 180 40 C 190 38 195 30 195 30 Z" stroke="#38bdf8" stroke-width="1" fill="none" />
    </g>

    <!-- Down Arrow 2 -->
    <path d="M 115 220 V 234" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)" />

    <!-- Stage 3: Emitting -->
    <g transform="translate(15, 240)">
      <rect width="200" height="85" rx="8" fill="#022c22" stroke="#0f766e" stroke-width="1" />
      <text class="pipeline-step" x="12" y="22" fill="#34d399">3. Emitter (Code Generation)</text>
      <text class="code-text" x="12" y="38" fill="#6ee7b7">DOWNLEVELS: Decorator downlevel,</text>
      <text class="code-text" x="12" y="52" fill="#6ee7b7">class transformations, ES target tuning.</text>
      <text class="code-text" x="12" y="66" fill="#fb7185" font-weight="bold">ERASES: Trashes all types &amp; interfaces!</text>
      <text class="code-text" x="12" y="78" fill="#6ee7b7">Builds outputs: .js &amp; .d.ts files</text>
    </g>
  </g>

  <!-- Connecting Arrows: Pipeline to Outputs -->
  <!-- Upper: Emitter -> JS -->
  <path d="M 510 205 Q 525 185 538 178" fill="none" stroke="url(#amberGlow)" stroke-width="2" marker-end="url(#arrow)" filter="url(#glow)" />
  <!-- Lower: Emitter -> Decl -->
  <path d="M 510 325 Q 525 345 538 350" fill="none" stroke="url(#greenGlow)" stroke-width="2" marker-end="url(#arrow)" filter="url(#glow)" />

  <text class="flow-text" x="525" y="160" text-anchor="middle" fill="#f59e0b">Emit JS</text>
  <text class="flow-text" x="525" y="380" text-anchor="middle" fill="#10b981">Emit Types</text>

  <!-- ========================================== -->
  <!-- RIGHT COLUMN UPPER: Plain JavaScript (.js) -->
  <!-- ========================================== -->
  <g filter="url(#shadow)" transform="translate(550, 95)">
    <!-- Main Card Body -->
    <rect width="220" height="160" rx="12" fill="url(#glassCard)" stroke="#334155" stroke-width="1.5" />
    <rect width="220" height="35" rx="12" fill="#0f172a" opacity="0.8" />
    <rect width="220" height="160" rx="12" fill="none" stroke="url(#amberGlow)" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- Title Area -->
    <circle cx="16" cy="18" r="4" fill="#f59e0b" />
    <text class="card-title" x="28" y="22" fill="#fbbf24">index.js</text>
    <rect x="155" y="10" width="53" height="15" rx="3" fill="#78350f" />
    <text class="badge" x="160" y="21" fill="#fbbf24">NO TYPES</text>

    <!-- Code Editor Box -->
    <rect x="10" y="45" width="200" height="103" rx="8" fill="#020617" stroke="#1e293b" stroke-width="1" />
    
    <!-- Javascript Code Snippet -->
    <g transform="translate(18, 62)">
      <!-- Code showing completely erased interface and class without types -->
      <text class="code-text" x="0" y="0"><tspan class="code-comment">// Types &amp; interfaces completely erased!</tspan></text>
      <text class="code-text" x="0" y="15"><tspan class="code-keyword">class</tspan> Dev {</text>
      <text class="code-text" x="10" y="30">constructor(n) {</text>
      <text class="code-text" x="20" y="45"><tspan class="code-keyword">this</tspan>.id = Math.random();</text>
      <text class="code-text" x="20" y="60"><tspan class="code-keyword">this</tspan>.name = n;</text>
      <text class="code-text" x="10" y="75">}</text>
      <text class="code-text" x="10" y="90"><tspan class="code-comment">// Note: Decorator downlevel transpiled here</tspan></text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- RIGHT COLUMN LOWER: Declaration Files      -->
  <!-- ========================================== -->
  <g filter="url(#shadow)" transform="translate(550, 275)">
    <!-- Main Card Body -->
    <rect width="220" height="160" rx="12" fill="url(#glassCard)" stroke="#334155" stroke-width="1.5" />
    <rect width="220" height="35" rx="12" fill="#0f172a" opacity="0.8" />
    <rect width="220" height="160" rx="12" fill="none" stroke="url(#greenGlow)" stroke-width="1.5" stroke-opacity="0.6" />
    
    <!-- Title Area -->
    <circle cx="16" cy="18" r="4" fill="#10b981" />
    <text class="card-title" x="28" y="22" fill="#34d399">index.d.ts</text>
    <rect x="150" y="10" width="60" height="15" rx="3" fill="#064e3b" />
    <text class="badge" x="156" y="21" fill="#34d399">TYPES ONLY</text>

    <!-- Code Editor Box -->
    <rect x="10" y="45" width="200" height="103" rx="8" fill="#020617" stroke="#1e293b" stroke-width="1" />
    
    <!-- Declaration Snippet -->
    <g transform="translate(18, 62)">
      <text class="code-text" x="0" y="0"><tspan class="code-keyword">interface</tspan> User {</text>
      <text class="code-text" x="10" y="15">id: <tspan class="code-type">number</tspan>;</text>
      <text class="code-text" x="10" y="30">name: <tspan class="code-type">string</tspan>;</text>
      <text class="code-text" x="0" y="45">}</text>
      <text class="code-text" x="0" y="60"><tspan class="code-keyword">declare class</tspan> Dev <tspan class="code-keyword">implements</tspan> <tspan class="code-type">User</tspan> {</text>
      <text class="code-text" x="10" y="75">id: <tspan class="code-type">number</tspan>;</text>
      <text class="code-text" x="10" y="90">name: <tspan class="code-type">string</tspan>; constructor(n: <tspan class="code-type">string</tspan>);</text>
    </g>
  </g>
</svg>
