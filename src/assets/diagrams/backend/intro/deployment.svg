<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="900" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Deployment: From Local to Live</text>

  <!-- Step 1: Local Code -->
  <rect x="20" y="60" width="140" height="100" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="90" y="90" text-anchor="middle" fill="#818cf8" font-size="22">💻</text>
  <text x="90" y="112" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="700">Local Code</text>
  <text x="90" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">Your machine</text>
  <text x="90" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">localhost:3000</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="da1" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="da2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="da3" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="da4" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#0ea5e9"/>
    </marker>
  </defs>
  <line x1="160" y1="110" x2="198" y2="110" stroke="#6366f1" stroke-width="2.5" marker-end="url(#da1)"/>
  <text x="179" y="104" text-anchor="middle" fill="#818cf8" font-size="10">git push</text>

  <!-- Step 2: GitHub -->
  <rect x="200" y="60" width="140" height="100" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="270" y="90" text-anchor="middle" fill="#fbbf24" font-size="22">🐙</text>
  <text x="270" y="112" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">GitHub</text>
  <text x="270" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">Your code repo</text>
  <text x="270" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">github.com/you/app</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="110" x2="378" y2="110" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#da2)"/>
  <text x="359" y="104" text-anchor="middle" fill="#fbbf24" font-size="10">webhook</text>

  <!-- Step 3: Cloud Provider -->
  <rect x="380" y="50" width="200" height="120" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2.5"/>
  <rect x="380" y="50" width="200" height="36" rx="12" fill="#10b981"/>
  <rect x="380" y="73" width="200" height="13" fill="#10b981"/>
  <text x="480" y="74" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Cloud Provider</text>
  <text x="480" y="100" text-anchor="middle" fill="#6ee7b7" font-size="12">Railway / Render</text>
  <text x="480" y="118" text-anchor="middle" fill="#94a3b8" font-size="10">Pulls code from GitHub</text>
  <text x="480" y="135" text-anchor="middle" fill="#94a3b8" font-size="10">Runs: npm start</text>
  <text x="480" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">Assigns a public URL</text>

  <!-- Arrow 3 -->
  <line x1="580" y1="110" x2="618" y2="110" stroke="#10b981" stroke-width="2.5" marker-end="url(#da3)"/>
  <text x="599" y="104" text-anchor="middle" fill="#6ee7b7" font-size="10">deploy</text>

  <!-- Step 4: Live URL -->
  <rect x="620" y="60" width="140" height="100" rx="12" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <text x="690" y="90" text-anchor="middle" fill="#38bdf8" font-size="22">🌐</text>
  <text x="690" y="112" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">Live URL</text>
  <text x="690" y="130" text-anchor="middle" fill="#94a3b8" font-size="10">myapp.railway.app</text>
  <text x="690" y="148" text-anchor="middle" fill="#6ee7b7" font-size="10">Public! Anyone can visit</text>

  <!-- Step 5: Users -->
  <rect x="790" y="60" width="90" height="100" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
  <text x="835" y="93" text-anchor="middle" fill="#a5b4fc" font-size="22">👥</text>
  <text x="835" y="115" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="700">Users</text>
  <text x="835" y="135" text-anchor="middle" fill="#94a3b8" font-size="10">Visit your</text>
  <text x="835" y="150" text-anchor="middle" fill="#94a3b8" font-size="10">live app</text>

  <line x1="760" y1="110" x2="788" y2="110" stroke="#818cf8" stroke-width="2" marker-end="url(#da4)"/>

  <!-- Environment Variables Panel -->
  <rect x="20" y="195" width="560" height="145" rx="12" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="20" y="195" width="560" height="36" rx="12" fill="#1a1a05"/>
  <rect x="20" y="218" width="560" height="13" fill="#1a1a05"/>
  <text x="300" y="220" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">⚙️ Environment Variables — Set in Cloud Dashboard</text>

  <rect x="35" y="243" width="260" height="85" rx="8" fill="#0f172a"/>
  <text x="165" y="263" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Cloud Dashboard UI</text>
  <text x="55" y="283" fill="#6ee7b7" font-size="11">DATABASE_URL = postgresql://...</text>
  <text x="55" y="300" fill="#6ee7b7" font-size="11">NODE_ENV = production</text>
  <text x="55" y="317" fill="#6ee7b7" font-size="11">PORT = 3000</text>

  <line x1="297" y1="285" x2="318" y2="285" stroke="#fbbf24" stroke-width="2" marker-end="url(#da2)"/>
  <text x="308" y="278" text-anchor="middle" fill="#fbbf24" font-size="9">inject</text>

  <rect x="320" y="243" width="245" height="85" rx="8" fill="#0f172a"/>
  <text x="442" y="263" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">In Your App Code</text>
  <text x="335" y="283" fill="#a5f3fc" font-size="11">process.env.DATABASE_URL</text>
  <text x="335" y="300" fill="#a5f3fc" font-size="11">process.env.NODE_ENV</text>
  <text x="335" y="317" fill="#a5f3fc" font-size="11">process.env.PORT</text>

  <!-- Key points panel -->
  <rect x="590" y="195" width="290" height="145" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
  <text x="735" y="220" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Deployment Checklist</text>
  <text x="605" y="245" fill="#6ee7b7" font-size="11">✅  package.json "start" script set</text>
  <text x="605" y="265" fill="#6ee7b7" font-size="11">✅  PORT uses process.env.PORT</text>
  <text x="605" y="285" fill="#6ee7b7" font-size="11">✅  Env vars set in cloud dashboard</text>
  <text x="605" y="305" fill="#6ee7b7" font-size="11">✅  DB provisioned (Railway gives free)</text>
  <text x="605" y="325" fill="#6ee7b7" font-size="11">✅  Health check endpoint /health</text>

  <!-- Flow summary bottom -->
  <rect x="20" y="360" width="860" height="115" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="450" y="385" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="700">Dev vs Production</text>

  <rect x="35" y="395" width="395" height="68" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1"/>
  <text x="233" y="415" text-anchor="middle" fill="#818cf8" font-size="12" font-weight="600">🏠 Development (local)</text>
  <text x="233" y="433" text-anchor="middle" fill="#94a3b8" font-size="11">NODE_ENV=development</text>
  <text x="233" y="451" text-anchor="middle" fill="#94a3b8" font-size="11">Detailed error messages shown</text>
  <text x="233" y="465" text-anchor="middle" fill="#94a3b8" font-size="10">nodemon auto-restarts on file change</text>

  <rect x="460" y="395" width="400" height="68" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="415" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">🌐 Production (deployed)</text>
  <text x="660" y="433" text-anchor="middle" fill="#94a3b8" font-size="11">NODE_ENV=production</text>
  <text x="660" y="451" text-anchor="middle" fill="#94a3b8" font-size="11">Errors hidden from users (security)</text>
  <text x="660" y="465" text-anchor="middle" fill="#94a3b8" font-size="10">npm start (not nodemon)</text>
</svg>
