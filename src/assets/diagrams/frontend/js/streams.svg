<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node/Stream Gradients -->
    <linearGradient id="sourceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="readableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="transformGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    <linearGradient id="writableGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="sinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="chunkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#2563EB" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#7C3AED" />
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#0D9488" />
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#EF4444" />
    </marker>
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,1 L8,4 L0,7 z" fill="#475569" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #FFFFFF; }
    .node-state { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #94A3B8; font-weight: 600; }
    .node-desc { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 10px; fill: #E2E8F0; opacity: 0.85; }
    .label-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; font-weight: 600; }
    .label-bg { rx: 4px; }
    .chunk-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 9px; font-weight: bold; fill: #FFFFFF; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #64748B; }
    .bp-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; font-weight: bold; fill: #EF4444; }
  </style>

  <!-- Outer container with rounded corners -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="150" y1="0" x2="150" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="350" y1="0" x2="350" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="550" y1="0" x2="550" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="750" y1="0" x2="750" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="200" x2="900" y2="200" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="300" x2="900" y2="300" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title Section -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">STREAMS API &amp; BACKPRESSURE ENGINE</text>
    <text class="subtitle" x="0" y="18">PIPELINING CHUNKS THROUGH READABLE, TRANSFORM, AND WRITABLE STREAMS</text>
  </g>

  <!-- 1. UNDERLYING SOURCE -->
  <g transform="translate(40, 160)">
    <rect width="110" height="180" rx="10" fill="#0D1527" stroke="#334155" stroke-width="2" />
    <rect width="110" height="8" rx="0" fill="url(#sourceGrad)" clip-path="inset(0 0 172 0)" />
    <text class="node-text" x="12" y="30">SOURCE</text>
    <text class="node-state" x="12" y="48">File / API / Socket</text>
    
    <!-- Visual Data Blocks Inside Source -->
    <rect x="25" y="70" width="60" height="20" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1" />
    <rect x="25" y="98" width="60" height="20" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1" />
    <rect x="25" y="126" width="60" height="20" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1" opacity="0.6" />
    <text class="chunk-text" x="38" y="83" fill="#94A3B8">Data</text>
    <text class="chunk-text" x="38" y="111" fill="#94A3B8">Data</text>
  </g>

  <!-- Flow Arrow: Source to ReadableStream -->
  <path d="M150,250 L180,250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrowMuted)" />
  <text class="flow-label" x="151" y="240" font-size="8">PULL</text>

  <!-- 2. READABLE STREAM -->
  <g transform="translate(190, 130)" filter="url(#glowBlue)">
    <rect width="180" height="240" rx="12" fill="#091E3A" stroke="#0284C7" stroke-width="2" />
    <text class="node-text" x="15" y="28">ReadableStream</text>
    <text class="node-state" x="15" y="44">state: "readable"</text>
    
    <!-- Internal Queue -->
    <rect x="15" y="65" width="150" height="95" rx="6" fill="#051224" stroke="#0F2B48" stroke-width="1.5" />
    <text class="node-state" x="25" y="82" fill="#0284C7">Internal Queue (HWM)</text>
    
    <!-- Queue Chunks -->
    <g transform="translate(25, 95)" filter="url(#glowOrange)">
      <rect width="40" height="24" rx="4" fill="url(#chunkGrad)" stroke="#F59E0B" stroke-width="1" />
      <text class="chunk-text" x="6" y="15">Chunk C</text>
    </g>
    <g transform="translate(75, 95)">
      <rect width="40" height="24" rx="4" fill="url(#chunkGrad)" stroke="#F59E0B" stroke-width="1" opacity="0.8" />
      <text class="chunk-text" x="6" y="15">Chunk B</text>
    </g>
    <g transform="translate(118, 95)">
      <rect width="40" height="24" rx="4" fill="url(#chunkGrad)" stroke="#F59E0B" stroke-width="1" opacity="0.6" />
      <text class="chunk-text" x="6" y="15">Chunk A</text>
    </g>

    <text class="node-desc" x="20" y="145">High Water Mark: 16KB</text>

    <!-- Reader Block inside -->
    <rect x="15" y="175" width="150" height="50" rx="6" fill="#082F49" stroke="#0284C7" stroke-width="1" />
    <text class="node-text" x="25" y="195" font-size="11">DefaultReader</text>
    <text class="node-state" x="25" y="210">reader.read()</text>
  </g>

  <!-- pipeThrough() Transition Arrow -->
  <path d="M370,250 L420,250" fill="none" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrowPurple)" />
  <g transform="translate(372, 212)">
    <rect class="label-bg" width="66" height="20" fill="#2E1065" stroke="#7C3AED" stroke-width="1" />
    <text class="label-text" x="6" y="13" fill="#C084FC">.pipeThrough()</text>
  </g>

  <!-- 3. TRANSFORM STREAM -->
  <g transform="translate(430, 130)" filter="url(#glowPurple)">
    <rect width="180" height="240" rx="12" fill="#25103F" stroke="#7C3AED" stroke-width="2" />
    <text class="node-text" x="15" y="28">TransformStream</text>
    <text class="node-state" x="15" y="44">Decompress / Decrypt</text>

    <!-- Writable Side -->
    <rect x="15" y="65" width="70" height="155" rx="6" fill="#18082B" stroke="#6D28D9" stroke-width="1" />
    <text class="node-text" x="25" y="85" font-size="10" fill="#C084FC">Writable</text>
    <text class="node-state" x="25" y="100">Side</text>

    <!-- Transforming Gear/Activity Decor -->
    <g transform="translate(25, 125)">
      <circle cx="25" cy="25" r="16" fill="none" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4,4" />
      <text class="chunk-text" x="14" y="28" fill="#C084FC">fn()</text>
    </g>

    <!-- Readable Side -->
    <rect x="95" y="65" width="70" height="155" rx="6" fill="#18082B" stroke="#6D28D9" stroke-width="1" />
    <text class="node-text" x="103" y="85" font-size="10" fill="#C084FC">Readable</text>
    <text class="node-state" x="103" y="100">Side</text>

    <!-- Outgoing Transformed Chunk Visual -->
    <g transform="translate(110, 130)" filter="url(#glowOrange)">
      <rect width="40" height="20" rx="4" fill="url(#chunkGrad)" stroke="#F59E0B" stroke-width="1" />
      <text class="chunk-text" x="4" y="13" font-size="8">T-Chunk</text>
    </g>
  </g>

  <!-- pipeTo() Transition Arrow -->
  <path d="M610,250 L660,250" fill="none" stroke="#0D9488" stroke-width="3" marker-end="url(#arrowTeal)" />
  <g transform="translate(615, 212)">
    <rect class="label-bg" width="42" height="20" fill="#042F2E" stroke="#0D9488" stroke-width="1" />
    <text class="label-text" x="5" y="13" fill="#2DD4BF">.pipeTo()</text>
  </g>

  <!-- 4. WRITABLE STREAM -->
  <g transform="translate(670, 130)" filter="url(#glowTeal)">
    <rect width="180" height="240" rx="12" fill="#022C22" stroke="#0D9488" stroke-width="2" />
    <text class="node-text" x="15" y="28">WritableStream</text>
    <text class="node-state" x="15" y="44">state: "writable"</text>

    <!-- Writer Block -->
    <rect x="15" y="65" width="150" height="50" rx="6" fill="#042F2E" stroke="#0D9488" stroke-width="1" />
    <text class="node-text" x="25" y="85" font-size="11">DefaultWriter</text>
    <text class="node-state" x="25" y="100">writer.write(chunk)</text>

    <!-- Internal Buffer -->
    <rect x="15" y="130" width="150" height="95" rx="6" fill="#011B15" stroke="#0F4E40" stroke-width="1.5" />
    <text class="node-state" x="25" y="148" fill="#0D9488">Internal Buffer</text>
    
    <!-- Full buffer boxes representing congestion -->
    <g transform="translate(25, 160)">
      <rect width="36" height="22" rx="3" fill="#EF4444" stroke="#F87171" stroke-width="1" />
      <text class="chunk-text" x="5" y="14" font-size="8">FULL</text>
    </g>
    <g transform="translate(67, 160)">
      <rect width="36" height="22" rx="3" fill="#EF4444" stroke="#F87171" stroke-width="1" />
      <text class="chunk-text" x="5" y="14" font-size="8">FULL</text>
    </g>
    <g transform="translate(109, 160)">
      <rect width="40" height="22" rx="3" fill="url(#chunkGrad)" stroke="#F59E0B" stroke-width="1" opacity="0.9" />
      <text class="chunk-text" x="4" y="14" font-size="8">T-Chunk</text>
    </g>
    
    <text class="node-desc" x="22" y="210">High Water Mark Reached!</text>
  </g>

  <!-- Flow Arrow: WritableStream to Sink -->
  <path d="M850,250 L875,250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrowMuted)" />
  <text class="flow-label" x="848" y="240" font-size="8">WRITE</text>

  <!-- 5. UNDERLYING SINK -->
  <g transform="translate(880, 160)">
    <rect width="110" height="180" rx="10" fill="#0D1527" stroke="#334155" stroke-width="2" />
    <rect width="110" height="8" rx="0" fill="url(#sinkGrad)" clip-path="inset(0 0 172 0)" />
    <text class="node-text" x="12" y="30">SINK</text>
    <text class="node-state" x="12" y="48">Disk / Player</text>
    
    <!-- Visual Data Blocks Inside Sink -->
    <rect x="25" y="70" width="60" height="20" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1" />
    <rect x="25" y="98" width="60" height="20" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1" />
    <text class="chunk-text" x="38" y="83" fill="#94A3B8">Saved</text>
    <text class="chunk-text" x="38" y="111" fill="#94A3B8">Saved</text>
  </g>

  <!-- 6. BACKPRESSURE SIGNAL PATH (REVERSE DIRECTION) -->
  <!-- Signal line from Writable Stream back to Transform -->
  <path d="M670,320 L618,320" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrowRed)" />
  <!-- Signal line from Transform back to Readable -->
  <path d="M430,320 L378,320" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6,4" marker-end="url(#arrowRed)" />
  
  <g transform="translate(380, 395)">
    <rect x="0" y="0" width="280" height="26" rx="6" fill="#450A0A" stroke="#EF4444" stroke-width="1" />
    <text class="bp-text" x="10" y="17">⚡ BACKPRESSURE ACTIVE: Buffer Full. Pause pulls!</text>
  </g>

  <!-- Footnote / Legend -->
  <text x="40" y="465" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: Backpressure is handled automatically by the streams pipeline during .pipeTo() and .pipeThrough() chaining.</text>
</svg>
