<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020815" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#040612" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.03" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="roseAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="emeraldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Shadows & Glows -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .section-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #a78bfa; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #e0f2fe; }
    .code-keyword { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #fb7185; font-weight: 700; }
    .code-type { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #22d3ee; font-weight: 700; }
    .code-infer { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #fcd34d; font-weight: bold; }
    .flow-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: bold; fill: #9ca3af; }
    .node-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Background Grid lines for visual depth -->
  <g opacity="0.03">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript Conditional Types &amp; infer Keyword</text>
  <text x="30" y="63" class="subtitle">Creating dynamic branching type systems and performing inline parameter extraction from complex types.</text>

  <!-- LEFT PANEL: T extends U ? X : Y -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="100" width="350" height="310" rx="12" fill="url(#glassState)" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.25" />
    <text x="50" y="130" class="section-title" fill="#a78bfa">1. Conditional Type Check (T extends U ? X : Y)</text>
    <text x="50" y="148" class="desc">Ternary logic applied to types based on assignability.</text>

    <!-- Flowchart Representation -->
    <!-- Input Type Node -->
    <rect x="135" y="170" width="140" height="36" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" />
    <text x="205" y="192" class="node-text" fill="#a5b4fc">T extends U</text>

    <!-- Branch Arrows -->
    <!-- True Path (Left) -->
    <path d="M170 206 L120 248" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3" />
    <polygon points="120,248 128,242 124,249 130,247" fill="#10b981" />
    <text x="130" y="222" class="flow-text" fill="#34d399">Yes</text>

    <!-- False Path (Right) -->
    <path d="M240 206 L290 248" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3" />
    <polygon points="290,248 280,247 286,249 282,242" fill="#ef4444" />
    <text x="280" y="222" class="flow-text" fill="#f87171">No</text>

    <!-- Branch Result Nodes -->
    <!-- X (True) -->
    <rect x="65" y="250" width="100" height="36" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5" />
    <text x="115" y="272" class="node-text" fill="#a7f3d0">Type X</text>

    <!-- Y (False) -->
    <rect x="245" y="250" width="100" height="36" rx="8" fill="#4c0519" stroke="#f43f5e" stroke-width="1.5" />
    <text x="295" y="272" class="node-text" fill="#fecdd3">Type Y</text>

    <!-- Code Block -->
    <rect x="50" y="305" width="310" height="85" rx="8" fill="#030712" stroke="#1f2937" stroke-width="1" />
    <text x="65" y="325" class="code-text">
      <tspan fill="#60a5fa">type</tspan> IsString&lt;<tspan fill="#f472b6">T</tspan>&gt; = <tspan fill="#f472b6">T</tspan> <tspan fill="#fb7185">extends</tspan> <tspan fill="#34d399">string</tspan> ? <tspan fill="#34d399">true</tspan> : <tspan fill="#f43f5e">false</tspan>;
    </text>
    <text x="65" y="348" class="code-text" fill="#6b7280">// Results:</text>
    <text x="65" y="365" class="code-text">
      <tspan fill="#60a5fa">type</tspan> R1 = IsString&lt;<tspan fill="#fbbf24">&quot;hi&quot;</tspan>&gt;; <tspan fill="#6b7280">// true</tspan>
    </text>
    <text x="65" y="380" class="code-text">
      <tspan fill="#60a5fa">type</tspan> R2 = IsString&lt;<tspan fill="#f59e0b">42</tspan>&gt;;   <tspan fill="#6b7280">// false</tspan>
    </text>
  </g>

  <!-- RIGHT PANEL: infer Keyword -->
  <g filter="url(#boxShadow)">
    <rect x="400" y="100" width="370" height="310" rx="12" fill="url(#glassState)" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.25" />
    <text x="420" y="130" class="section-title" fill="#22d3ee">2. Type Parameter Extraction (infer)</text>
    <text x="420" y="148" class="desc">Declares an inline variable to extract nested subtypes.</text>

    <!-- Extraction Pipeline -->
    <!-- Input Box -->
    <rect x="420" y="170" width="330" height="75" rx="8" fill="#082f49" stroke="#0284c7" stroke-width="1.2" />
    <text x="435" y="192" class="code-text">
      <tspan fill="#60a5fa">type</tspan> Unwrap&lt;<tspan fill="#f472b6">T</tspan>&gt; = <tspan fill="#f472b6">T</tspan> <tspan fill="#fb7185">extends</tspan> Promise&lt;<tspan fill="#f59e0b" font-weight="bold">infer R</tspan>&gt;
    </text>
    <text x="560" y="210" class="code-text">
      ? <tspan fill="#f59e0b">R</tspan> : <tspan fill="#fb7185">never</tspan>;
    </text>
    <rect x="633" y="180" width="55" height="18" rx="4" fill="#78350f" stroke="#f59e0b" stroke-width="1" opacity="0.8" filter="url(#glow)" />
    <text x="638" y="193" class="code-infer" fill="#fcd34d">infer R</text>

    <!-- Connecting path/arrow from extraction to resolution -->
    <path d="M585 245 C 585 265, 520 260, 520 280" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,2" />
    <polygon points="520,280 516,272 520,277 524,272" fill="#f59e0b" />
    <text x="588" y="262" class="flow-text" fill="#fcd34d" font-size="9px">Captures inner 'User' type</text>

    <!-- Resolution/Usage Box -->
    <rect x="420" y="285" width="330" height="105" rx="8" fill="#2e1065" stroke="#6b21a8" stroke-width="1.2" />
    <text x="435" y="308" class="code-text" fill="#d8b4fe">Usage Evaluation:</text>
    
    <!-- Step 1 -->
    <text x="435" y="330" class="code-text">
      Unwrap&lt;Promise&lt;<tspan fill="#34d399">User</tspan>&gt;&gt;
    </text>
    <!-- Step 2 -->
    <text x="450" y="352" class="code-text" fill="#a78bfa">
      ➔ Promise&lt;<tspan fill="#34d399">User</tspan>&gt; matches Promise&lt;<tspan fill="#f59e0b">infer R</tspan>&gt;
    </text>
    <!-- Step 3 -->
    <text x="450" y="374" class="code-text" fill="#a78bfa">
      ➔ <tspan fill="#f59e0b">R</tspan> is bound to <tspan fill="#34d399">User</tspan> and returned!
    </text>
  </g>
</svg>
