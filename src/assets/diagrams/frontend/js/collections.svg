<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1322" />
      <stop offset="100%" stop-color="#151C33" />
    </linearGradient>

    <!-- Card Background Gradients -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#151D30" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0E1321" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow/Drop Shadows -->
    <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-weak" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Card Border Gradients -->
    <linearGradient id="border-strong" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="border-weak" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.1" />
    </linearGradient>

    <!-- Object Gradients -->
    <linearGradient id="objGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#10B981" />
    </marker>
    <marker id="blue-arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)" rx="16" />
  
  <!-- Outer Glows/Decorations for Premium feel -->
  <circle cx="200" cy="100" r="150" fill="#3B82F6" opacity="0.05" filter="url(#glow-strong)" />
  <circle cx="760" cy="400" r="150" fill="#EF4444" opacity="0.03" filter="url(#glow-weak)" />

  <!-- Title & Header -->
  <text x="480" y="45" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#F8FAFC" text-anchor="middle" letter-spacing="1">
    JAVASCRIPT ADVANCED COLLECTIONS
  </text>
  <text x="480" y="68" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8" text-anchor="middle">
    Garbage Collection &amp; Reference Comparison: Strong vs. Weak
  </text>

  <!-- ================= LEFT COLUMN: STRONG COLLECTIONS ================= -->
  <g transform="translate(40, 95)">
    <!-- Container Card -->
    <rect width="420" height="400" fill="url(#cardBg)" stroke="url(#border-strong)" stroke-width="1.5" rx="12" />
    
    <!-- Title / Badge -->
    <rect x="20" y="20" width="100" height="26" rx="13" fill="#1E293B" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.6" />
    <text x="70" y="37" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#60A5FA" text-anchor="middle" letter-spacing="0.5">
      MAP &amp; SET
    </text>
    <text x="135" y="37" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC">
      Strong References
    </text>
    <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#94A3B8">
      Keys and values are strongly held. If outside references are
    </text>
    <text x="20" y="88" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#94A3B8">
      cleared, they remain in memory because the Map holds them.
    </text>

    <!-- Outer variable representation -->
    <g transform="translate(30, 160)">
      <rect width="130" height="60" rx="8" fill="url(#objGrad)" stroke="#64748B" stroke-width="1.5" />
      <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">let user = ...</text>
      <text x="15" y="45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#EF4444">null <tspan font-size="10" font-weight="400" fill="#64748B">(cleared)</tspan></text>
      <!-- Red cross over the outside reference arrow -->
      <circle cx="115" cy="30" r="8" fill="#EF4444" />
      <path d="M112,27 L118,33 M118,27 L112,33" stroke="#F8FAFC" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Broken connector pointing to the object -->
    <path d="M160,190 L210,190" stroke="#EF4444" stroke-width="2" stroke-dasharray="4 4" />
    
    <!-- The Key Object -->
    <g transform="translate(230, 155)">
      <rect width="140" height="70" rx="8" fill="url(#objGrad)" stroke="#10B981" stroke-width="2" filter="url(#glow-strong)" />
      <text x="70" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#10B981" text-anchor="middle">KEY OBJECT</text>
      <text x="70" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#E2E8F0" text-anchor="middle">{ name: 'Alice' }</text>
      <text x="70" y="58" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#10B981" text-anchor="middle">STILL IN MEMORY</text>
    </g>

    <!-- The Map structure -->
    <g transform="translate(30, 270)">
      <rect width="360" height="100" rx="8" fill="#0F172A" stroke="#3B82F6" stroke-width="1.5" />
      <!-- Label -->
      <rect x="15" y="-10" width="90" height="20" rx="4" fill="#3B82F6" />
      <text x="60" y="4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#0F172A" text-anchor="middle">MAP INSTANCE</text>
      
      <!-- Key -> Value Row -->
      <g transform="translate(20, 25)">
        <rect width="120" height="50" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1" />
        <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#60A5FA">KEY (REF)</text>
        <text x="15" y="38" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">Object &lt;Alice&gt;</text>
        
        <!-- Strong Pointer upwards to Key Object -->
        <path d="M 120,25 Q 160,-20 230,-45" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow)" />
      </g>
      
      <!-- Arrow pointer from Key to Value inside Map -->
      <path d="M 170,50 L 210,50" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#blue-arrow)" />

      <!-- Value Box -->
      <g transform="translate(220, 25)">
        <rect width="120" height="50" rx="6" fill="#1E293B" stroke="#3B82F6" stroke-width="1" />
        <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#60A5FA">VALUE</text>
        <text x="15" y="38" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F8FAFC">10 (visits)</text>
      </g>
    </g>
  </g>

  <!-- ================= RIGHT COLUMN: WEAK COLLECTIONS ================= -->
  <g transform="translate(500, 95)">
    <!-- Container Card -->
    <rect width="420" height="400" fill="url(#cardBg)" stroke="url(#border-weak)" stroke-width="1.5" rx="12" />
    
    <!-- Title / Badge -->
    <rect x="20" y="20" width="120" height="26" rx="13" fill="#1E293B" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.6" />
    <text x="80" y="37" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" text-anchor="middle" letter-spacing="0.5">
      WEAKMAP &amp; SET
    </text>
    <text x="155" y="37" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC">
      Weak References
    </text>
    <text x="20" y="70" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#94A3B8">
      Holds references weakly. If the outside reference is cleared,
    </text>
    <text x="20" y="88" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#94A3B8">
      Garbage Collection (GC) sweeps the key and value away.
    </text>

    <!-- Outer variable representation -->
    <g transform="translate(30, 160)">
      <rect width="130" height="60" rx="8" fill="url(#objGrad)" stroke="#64748B" stroke-width="1.5" />
      <text x="15" y="25" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">let user = ...</text>
      <text x="15" y="45" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#EF4444">null <tspan font-size="10" font-weight="400" fill="#64748B">(cleared)</tspan></text>
      <circle cx="115" cy="30" r="8" fill="#EF4444" />
      <path d="M112,27 L118,33 M118,27 L112,33" stroke="#F8FAFC" stroke-width="1.5" stroke-linecap="round" />
    </g>

    <!-- Broken connector pointing to the object -->
    <path d="M160,190 L210,190" stroke="#EF4444" stroke-width="2" stroke-dasharray="4 4" />
    
    <!-- The Key Object (Garbage Collected / Ghost style) -->
    <g transform="translate(230, 155)">
      <rect width="140" height="70" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.4" />
      <!-- GC Sweep Overlay Effect -->
      <path d="M210,140 L280,240" stroke="#EF4444" stroke-width="2" opacity="0.3" />
      <text x="70" y="25" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#EF4444" text-anchor="middle" opacity="0.5">KEY OBJECT</text>
      <text x="70" y="42" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#94A3B8" text-anchor="middle" opacity="0.3">{ name: 'Alice' }</text>
      <text x="70" y="58" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#EF4444" text-anchor="middle">GARBAGE COLLECTED</text>
    </g>

    <!-- Garbage Collector icon / label -->
    <g transform="translate(320, 115)">
      <circle cx="20" cy="20" r="18" fill="#EF4444" opacity="0.2" />
      <path d="M14,14 L26,26 M26,14 L14,26" stroke="#EF4444" stroke-width="2" />
      <text x="-45" y="24" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#EF4444">GC SWEEP</text>
    </g>

    <!-- The WeakMap structure -->
    <g transform="translate(30, 270)">
      <rect width="360" height="100" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8" />
      <!-- Label -->
      <rect x="15" y="-10" width="120" height="20" rx="4" fill="#F59E0B" />
      <text x="75" y="4" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="800" fill="#0F172A" text-anchor="middle">WEAKMAP INSTANCE</text>
      
      <!-- Key -> Value Row (Faded / Dead) -->
      <g transform="translate(20, 25)" opacity="0.4">
        <rect width="120" height="50" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2" />
        <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#F59E0B">WEAK KEY</text>
        <text x="15" y="38" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Eligible for GC</text>
        
        <!-- Weak/Faded Pointer upwards to Key Object -->
        <path d="M 120,25 Q 160,-20 230,-45" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="3 3" />
      </g>
      
      <!-- Arrow pointer from Key to Value inside Map -->
      <path d="M 170,50 L 210,50" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.4" />

      <!-- Value Box (Faded / Dead) -->
      <g transform="translate(220, 25)" opacity="0.4">
        <rect width="120" height="50" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 2" />
        <text x="15" y="20" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#F59E0B">VALUE</text>
        <text x="15" y="38" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">10 (swept away)</text>
      </g>
    </g>
  </g>
</svg>
