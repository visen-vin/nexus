<svg width="100%" height="100%" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="500" rx="24" fill="#0d0d0f"/>
  
  <!-- Global Scope -->
  <g transform="translate(40, 60)">
    <rect width="320" height="380" rx="16" fill="#1A1A1D" stroke="#333" stroke-dasharray="4 4"/>
    <text x="160" y="30" text-anchor="middle" fill="#555" font-family="monospace" font-size="10" font-weight="bold">GLOBAL SCOPE</text>
    
    <!-- Outer Scope -->
    <g transform="translate(30, 60)">
      <rect width="260" height="260" rx="12" fill="#1E1E22" stroke="#444"/>
      <text x="130" y="25" text-anchor="middle" fill="#666" font-family="monospace" font-size="9" font-weight="bold">OUTER() SCOPE</text>
      
      <!-- Inner Scope -->
      <g transform="translate(30, 60)">
        <rect width="200" height="140" rx="8" fill="#252529" stroke="var(--domain-accent)" stroke-width="2"/>
        <text x="100" y="25" text-anchor="middle" fill="var(--domain-accent)" font-family="monospace" font-size="9" font-weight="bold">INNER() SCOPE</text>
        
        <path d="M100 80 V 200" stroke="var(--domain-accent)" stroke-width="1" stroke-dasharray="2 2" />
        <circle cx="100" cy="80" r="3" fill="var(--domain-accent)"/>
        <text x="110" y="85" fill="#f1f1f1" font-family="monospace" font-size="10">Seeking "x"...</text>
      </g>
    </g>
  </g>
  
  <text x="200" y="470" text-anchor="middle" fill="#444" font-family="monospace" font-size="10" font-weight="bold">LEXICAL SCOPE CHAIN</text>
</svg>
