<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Block Gradients -->
    <linearGradient id="jsxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="compilerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="elementGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="fiberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowJsx" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowElement" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowMuted" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4B5563" />
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#A855F7" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .node-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-desc { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .node-code { font-family: 'Fira Code', monospace; font-size: 9px; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="250" y1="0" x2="250" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="650" y1="0" x2="650" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="250" x2="900" y2="250" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">JSX &amp; ELEMENTS RUNTIME LIFECYCLE</text>
    <text class="subtitle" x="0" y="18">THE PIPELINE FROM STATIC MARKUP TO VIRTUAL DOM REPRESENTATIONS</text>
  </g>

  <!-- 1. JSX Source Code (Blue) -->
  <g transform="translate(40, 160)" filter="url(#glowJsx)">
    <rect width="180" height="150" rx="8" fill="#1E293B" stroke="#0EA5E9" stroke-width="2" />
    <rect width="180" height="5" fill="url(#jsxGrad)" />
    <text class="node-title" x="15" y="25">1. JSX Syntax (Source)</text>
    <text class="node-code" x="15" y="60">&lt;div className="box"&gt;</text>
    <text class="node-code" x="25" y="80">Hello Nexus</text>
    <text class="node-code" x="15" y="100">&lt;/div&gt;</text>
    <text class="node-desc" x="15" y="135">Syntactic Sugar only</text>
  </g>

  <!-- Connection: Compiler Arrow -->
  <path d="M230,235 L262,235" fill="none" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowOrange)" />

  <!-- 2. Compiler (Babel/SWC) (Orange) -->
  <g transform="translate(270, 160)">
    <rect width="160" height="150" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2" />
    <rect width="160" height="5" fill="url(#compilerGrad)" />
    <text class="node-title" x="15" y="25">2. Transpilation</text>
    <text class="node-desc" x="15" y="55">Babel / SWC Compiler</text>
    <text class="node-code" x="15" y="85">_jsx("div", {</text>
    <text class="node-code" x="25" y="105">className: "box",</text>
    <text class="node-code" x="25" y="125">children: "Hello"</text>
    <text class="node-code" x="15" y="145">})</text>
  </g>

  <!-- Connection: Compilation Arrow -->
  <path d="M440,235 L472,235" fill="none" stroke="#A855F7" stroke-width="2.5" marker-end="url(#arrowPurple)" />

  <!-- 3. React Element Object (Purple) -->
  <g transform="translate(480, 120)" filter="url(#glowElement)">
    <rect width="210" height="230" rx="8" fill="#1E293B" stroke="#A855F7" stroke-width="2" />
    <rect width="210" height="5" fill="url(#elementGrad)" />
    <text class="node-title" x="15" y="25">3. React Element Object</text>
    <text class="node-desc" x="15" y="45">Plain JS Object descriptor</text>
    <text class="node-code" x="15" y="75">{</text>
    <text class="node-code" x="25" y="95">$$typeof: Symbol(element),</text>
    <text class="node-code" x="25" y="115">type: "div",</text>
    <text class="node-code" x="25" y="135">props: {</text>
    <text class="node-code" x="35" y="155">className: "box",</text>
    <text class="node-code" x="35" y="175">children: "Hello"</text>
    <text class="node-code" x="25" y="195">}</text>
    <text class="node-code" x="15" y="215">}</text>
  </g>

  <!-- Connection: Muted Arrow -->
  <path d="M700,235 L732,235" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowMuted)" stroke-dasharray="4,4" />

  <!-- 4. Host DOM Node (Pink) -->
  <g transform="translate(740, 160)">
    <rect width="120" height="150" rx="8" fill="#1E293B" stroke="#EC4899" stroke-width="2" />
    <rect width="120" height="5" fill="url(#fiberGrad)" />
    <text class="node-title" x="12" y="25">4. Real DOM</text>
    <text class="node-desc" x="12" y="50">HTMLDivElement</text>
    <text class="node-code" x="12" y="85">&lt;div class="box"&gt;</text>
    <text class="node-code" x="22" y="105">Hello Nexus</text>
    <text class="node-code" x="12" y="125">&lt;/div&gt;</text>
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Note: React Elements are lightweight, immutable, virtual representations of target browser DOM nodes. They are cheap to create compared to physical DOM nodes.</text>
</svg>
