<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#f1f5f9">Building a REST API</text>
  <text x="450" y="58" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">CRUD operations mapped to HTTP methods</text>

  <!-- REST = CRUD mapping header -->
  <rect x="30" y="75" width="840" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="115" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">HTTP Method</text>
  <text x="290" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">CRUD</text>
  <text x="430" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Route</text>
  <text x="580" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">What It Does</text>
  <text x="770" y="95" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Status Code</text>

  <!-- Row 1: GET all -->
  <rect x="30" y="110" width="840" height="52" rx="0" fill="#0d2137" stroke="#1e40af" stroke-width="1"/>
  <rect x="30" y="110" width="170" height="52" fill="#1e3a5f"/>
  <text x="115" y="141" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#60a5fa">GET</text>
  <text x="290" y="141" text-anchor="middle" font-family="monospace" font-size="13" fill="#93c5fd">Read</text>
  <text x="430" y="134" text-anchor="middle" font-family="monospace" font-size="12" fill="#dbeafe">GET /users</text>
  <text x="430" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">fetch all</text>
  <text x="580" y="141" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Fetch list of all users</text>
  <rect x="730" y="122" width="110" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="785" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#60a5fa">200 OK</text>

  <!-- Row 2: GET one -->
  <rect x="30" y="162" width="840" height="52" rx="0" fill="#0d2137" stroke="#1e40af" stroke-width="1"/>
  <rect x="30" y="162" width="170" height="52" fill="#1e3a5f"/>
  <text x="115" y="193" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#60a5fa">GET</text>
  <text x="290" y="193" text-anchor="middle" font-family="monospace" font-size="13" fill="#93c5fd">Read</text>
  <text x="430" y="186" text-anchor="middle" font-family="monospace" font-size="12" fill="#dbeafe">GET /users/:id</text>
  <text x="430" y="204" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">fetch one</text>
  <text x="580" y="193" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Fetch a single user by ID</text>
  <rect x="730" y="174" width="110" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="785" y="192" text-anchor="middle" font-family="monospace" font-size="12" fill="#60a5fa">200 OK</text>

  <!-- Row 3: POST -->
  <rect x="30" y="214" width="840" height="52" rx="0" fill="#052e16" stroke="#16a34a" stroke-width="1"/>
  <rect x="30" y="214" width="170" height="52" fill="#14532d"/>
  <text x="115" y="245" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#4ade80">POST</text>
  <text x="290" y="245" text-anchor="middle" font-family="monospace" font-size="13" fill="#86efac">Create</text>
  <text x="430" y="238" text-anchor="middle" font-family="monospace" font-size="12" fill="#dcfce7">POST /users</text>
  <text x="430" y="256" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">with body: JSON</text>
  <text x="580" y="245" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Create a new user</text>
  <rect x="730" y="226" width="110" height="28" rx="4" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="785" y="244" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80">201 Created</text>

  <!-- Row 4: PUT -->
  <rect x="30" y="266" width="840" height="52" rx="0" fill="#1c1402" stroke="#ca8a04" stroke-width="1"/>
  <rect x="30" y="266" width="170" height="52" fill="#422006"/>
  <text x="115" y="297" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#fbbf24">PUT</text>
  <text x="290" y="297" text-anchor="middle" font-family="monospace" font-size="13" fill="#fde68a">Update</text>
  <text x="430" y="290" text-anchor="middle" font-family="monospace" font-size="12" fill="#fef9c3">PUT /users/:id</text>
  <text x="430" y="308" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">with body: JSON</text>
  <text x="580" y="297" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Replace/update a user</text>
  <rect x="730" y="278" width="110" height="28" rx="4" fill="#422006" stroke="#eab308" stroke-width="1"/>
  <text x="785" y="296" text-anchor="middle" font-family="monospace" font-size="12" fill="#fbbf24">200 OK</text>

  <!-- Row 5: DELETE -->
  <rect x="30" y="318" width="840" height="52" rx="0" fill="#1f0404" stroke="#b91c1c" stroke-width="1"/>
  <rect x="30" y="318" width="170" height="52" fill="#450a0a"/>
  <text x="115" y="349" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#f87171">DELETE</text>
  <text x="290" y="349" text-anchor="middle" font-family="monospace" font-size="13" fill="#fca5a5">Delete</text>
  <text x="430" y="342" text-anchor="middle" font-family="monospace" font-size="12" fill="#fee2e2">DELETE /users/:id</text>
  <text x="430" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">no body needed</text>
  <text x="580" y="349" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Remove a user</text>
  <rect x="730" y="330" width="110" height="28" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="785" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#f87171">200 OK</text>

  <!-- Divider lines -->
  <line x1="200" y1="110" x2="200" y2="370" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="110" x2="360" y2="370" stroke="#334155" stroke-width="1"/>
  <line x1="500" y1="110" x2="500" y2="370" stroke="#334155" stroke-width="1"/>
  <line x1="720" y1="110" x2="720" y2="370" stroke="#334155" stroke-width="1"/>

  <!-- Bottom: Example Request-Response Flow -->
  <rect x="30" y="385" width="840" height="85" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="408" font-family="monospace" font-size="11" font-weight="bold" fill="#f1f5f9">Example: POST /users</text>

  <rect x="50" y="416" width="240" height="44" rx="4" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="60" y="432" font-family="monospace" font-size="10" fill="#94a3b8">Request Body (JSON):</text>
  <text x="60" y="448" font-family="monospace" font-size="10" fill="#4ade80">{"name": "Alice", "email": "a@x.com"}</text>

  <line x1="294" y1="438" x2="330" y2="438" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="312" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">send</text>

  <rect x="332" y="416" width="180" height="44" rx="4" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
  <text x="342" y="432" font-family="monospace" font-size="10" fill="#94a3b8">Server validates &amp; saves</text>
  <text x="342" y="448" font-family="monospace" font-size="10" fill="#fb923c">app.post('/users', handler)</text>

  <line x1="514" y1="438" x2="550" y2="438" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="532" y="430" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">respond</text>

  <rect x="552" y="416" width="290" height="44" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="562" y="432" font-family="monospace" font-size="10" fill="#94a3b8">Response (status 201):</text>
  <text x="562" y="448" font-family="monospace" font-size="10" fill="#60a5fa">{"id": 1, "name": "Alice", "email": "a@x.com"}</text>
</svg>
