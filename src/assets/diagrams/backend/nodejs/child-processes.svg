<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d1a" />
      <stop offset="100%" stop-color="#020308" />
    </linearGradient>
    <linearGradient id="spawnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0.03" />
    </linearGradient>
    <linearGradient id="forkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#064e3b" stop-opacity="0.03" />
    </linearGradient>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; fill: #f8fafc; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 13px; fill: #94a3b8; }
    .header { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; }
    .lbl { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; fill: #cbd5e1; }
    .desc { font-family: 'Inter', sans-serif; font-size: 10px; fill: #64748b; }
    .arrow-lbl { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: bold; fill: #fbbf24; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g opacity="0.02">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title -->
  <text x="30" y="45" class="title">Child Process Spawning Methods</text>
  <text x="30" y="65" class="subtitle">Comparing system data pipelines, buffered limits, and custom inter-process communication channels</text>

  <!-- SPAWN METHOD (LEFT) -->
  <g filter="url(#boxShadow)" transform="translate(30, 110)">
    <rect width="230" height="270" rx="12" fill="url(#spawnGrad)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#3b82f6" />
    <text x="20" y="30" class="header" fill="#3b82f6">child_process.spawn()</text>
    <text x="20" y="48" class="desc">Asynchronous Chunked Streams</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#09132e" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#60a5fa">Features:</text>
    <text x="25" y="115" class="desc" fill="#93c5fd">Sequential chunk stdout stream</text>
    <text x="25" y="130" class="desc" fill="#93c5fd">No memory limit (O(1) space)</text>
    <text x="25" y="145" class="desc" fill="#93c5fd">Runs directly without shell</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#0f172a" />
    <text x="35" y="190" fill="#60a5fa" font-family="monospace" font-size="10">spawn("find", ["."])</text>
    <text x="35" y="205" fill="#64748b" font-size="9">(Best for large streams)</text>
  </g>

  <!-- EXEC METHOD (MIDDLE) -->
  <g filter="url(#boxShadow)" transform="translate(285, 110)">
    <rect width="230" height="270" rx="12" fill="url(#execGrad)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#ef4444" />
    <text x="20" y="30" class="header" fill="#ef4444">child_process.exec()</text>
    <text x="20" y="48" class="desc">Buffered Callback Output</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#1f0a0d" stroke="#ef4444" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#fca5a5">Features:</text>
    <text x="25" y="115" class="desc" fill="#fca5a5">Buffers stdout completely</text>
    <text x="25" y="130" class="desc" fill="#fca5a5">Default buffer limit: 200KB</text>
    <text x="25" y="145" class="desc" fill="#fca5a5">Spawns a shell (ls, cat)</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#180205" />
    <text x="35" y="190" fill="#fca5a5" font-family="monospace" font-size="10">exec("ls -lh", cb)</text>
    <text x="35" y="205" fill="#64748b" font-size="9">(Best for tiny shell tools)</text>
  </g>

  <!-- FORK METHOD (RIGHT) -->
  <g filter="url(#boxShadow)" transform="translate(540, 110)">
    <rect width="230" height="270" rx="12" fill="url(#forkGrad)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    <rect width="230" height="6" rx="3" fill="#10b981" />
    <text x="20" y="30" class="header" fill="#10b981">child_process.fork()</text>
    <text x="20" y="48" class="desc">Dedicated IPC Communication</text>
    
    <rect x="15" y="70" width="200" height="170" rx="8" fill="#022c22" stroke="#10b981" stroke-width="1" stroke-opacity="0.1" />
    <text x="25" y="95" class="lbl" font-weight="bold" fill="#a7f3d0">Features:</text>
    <text x="25" y="115" class="desc" fill="#a7f3d0">Node-to-Node specific child</text>
    <text x="25" y="130" class="desc" fill="#a7f3d0">Spawns a new V8 instance</text>
    <text x="25" y="145" class="desc" fill="#a7f3d0">Injects an active IPC channel</text>
    
    <rect x="25" y="170" width="180" height="50" rx="4" fill="#02120a" stroke="#059669" stroke-width="1" />
    <text x="35" y="190" fill="#34d399" font-family="monospace" font-size="10">fork("worker.js")</text>
    <text x="35" y="205" fill="#64748b" font-size="9">(Active IPC send/receive)</text>
  </g>
</svg>
