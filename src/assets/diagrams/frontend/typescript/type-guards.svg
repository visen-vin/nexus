<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040916" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#050811" />
    </linearGradient>

    <!-- Glassmorphic States Gradient -->
    <linearGradient id="glassState" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>

    <!-- Highlights -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="emeraldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #f3f4f6; letter-spacing: 0.5px; }
    .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #9ca3af; font-weight: 500; }
    .state-title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #22d3ee; }
    .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #d1d5db; }
    .meta { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #94a3b8; }
    .flow-label { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #fbbf24; text-anchor: middle; }
    .header-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #22d3ee; }
    .code-text { font-family: 'Fira Code', 'Courier New', monospace; font-size: 10px; fill: #a5f3fc; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <g opacity="0.04">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800" stroke="#ffffff" stroke-width="1" />
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- TITLE -->
  <text x="30" y="45" class="title">TypeScript Type Narrowing &amp; Guards</text>
  <text x="30" y="63" class="subtitle">Dissecting the flow of wide union types passing through guards, returning narrowed type scopes.</text>

  <!-- STEP 1: WIDE UNION INPUT -->
  <g filter="url(#boxShadow)">
    <rect x="30" y="120" width="200" height="240" rx="10" fill="url(#glassState)" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="50" y="150" class="header-text">1. Union Type (Wide)</text>
    <text x="50" y="172" class="desc">A variable typed as a wide union:</text>
    
    <rect x="45" y="200" width="170" height="135" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="60" y="225" class="code-text">type User =</text>
    <text x="60" y="245" class="code-text">  | Admin</text>
    <text x="60" y="265" class="code-text">  | Customer</text>
    <text x="60" y="285" class="code-text">  | Guest;</text>
    <text x="60" y="315" class="meta" fill="#fbbf24">Props are restricted to intersection</text>
  </g>

  <!-- Narrowing Tunnel (Arrow) -->
  <path d="M 230 240 L 320 240" fill="none" stroke="#4b5563" stroke-width="2" />
  <polygon points="320,240 312,235 312,245" fill="#4b5563" />
  <text x="275" y="228" class="flow-label">Evaluation</text>

  <!-- STEP 2: NARROWING GUARDS (TUNNEL) -->
  <g filter="url(#boxShadow)">
    <rect x="330" y="100" width="240" height="280" rx="12" fill="url(#glassState)" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="350" y="130" class="header-text" fill="#fbbf24">2. Type Guard Evaluators</text>
    
    <!-- Guard A: typeof / instanceof -->
    <rect x="345" y="155" width="210" height="50" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="1" />
    <text x="355" y="175" class="code-text" fill="#fef3c7">typeof val === 'string'</text>
    <text x="355" y="193" class="meta" fill="#fcd34d">Native Javascript operators</text>

    <!-- Guard B: in operator -->
    <rect x="345" y="215" width="210" height="50" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="1" />
    <text x="355" y="235" class="code-text" fill="#fef3c7">'role' in user</text>
    <text x="355" y="253" class="meta" fill="#fcd34d">Structural property check</text>

    <!-- Guard C: user-defined -->
    <rect x="345" y="275" width="210" height="85" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="1" />
    <text x="355" y="295" class="code-text" fill="#fef3c7">isAdmin(u): u is Admin</text>
    <text x="355" y="315" class="meta" fill="#fcd34d">Custom type predicate</text>
    <text x="355" y="332" class="meta" fill="#fcd34d">Returns runtime boolean</text>
  </g>

  <!-- Arrow to Success -->
  <path d="M 570 240 L 630 240" fill="none" stroke="#4b5563" stroke-width="2" />
  <polygon points="630,240 622,235 622,245" fill="#4b5563" />
  <text x="600" y="228" class="flow-label" fill="#10b981">Narrowed</text>

  <!-- STEP 3: SPECIFIC TARGET BOUNDARIES -->
  <g filter="url(#boxShadow)">
    <rect x="640" y="120" width="130" height="240" rx="10" fill="url(#glassState)" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.3" />
    <text x="650" y="150" class="header-text" fill="#34d399">3. Safe Scope</text>

    <!-- User scope -->
    <rect x="650" y="175" width="110" height="95" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1" />
    <text x="660" y="200" class="state-title" fill="#34d399">Admin Type</text>
    <text x="660" y="222" class="meta" fill="#a7f3d0">Full access to:</text>
    <text x="660" y="240" class="code-text" fill="#34d399">.adminKey</text>
    <text x="660" y="255" class="code-text" fill="#34d399">.banUser()</text>

    <text x="650" y="295" class="meta">No compiler bypass or casting required!</text>
  </g>
</svg>
