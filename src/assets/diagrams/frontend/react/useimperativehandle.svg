<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" width="100%" height="100%" style="background-color: #0b0f19; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Definitions for gradients & patterns -->
  <defs>
    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>

    <!-- Linear Gradients for Nodes -->
    <linearGradient id="parentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <linearGradient id="childGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <linearGradient id="domGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="glowBlue" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Line Marker (Arrow) -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Apply background grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Diagram Title / Header -->
  <text x="30" y="45" font-size="20" font-weight="800" fill="#f8fafc" letter-spacing="0.5">useImperativeHandle Architecture</text>
  <text x="30" y="65" font-size="12" font-weight="500" fill="#64748b">Controlled API Exposure Across Component Boundaries</text>

  <!-- ==================== PARENT COMPONENT ZONE ==================== -->
  <g transform="translate(40, 110)" filter="url(#shadow)">
    <!-- Zone Boundary Box -->
    <rect width="280" height="340" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5" />
    <text x="15" y="25" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">PARENT ZONE</text>

    <!-- Parent Card -->
    <rect x="20" y="45" width="240" height="95" rx="8" fill="url(#parentGrad)" filter="url(#glowBlue)" />
    <text x="35" y="75" font-size="14" font-weight="800" fill="#ffffff">ParentComponent</text>
    <text x="35" y="95" font-size="11" font-weight="500" fill="#bfdbfe">Holds ref: React.useRef&lt;ModalRef&gt;</text>
    <text x="35" y="115" font-size="11" font-weight="600" fill="#ffffff">Calls: ref.current?.open()</text>

    <!-- The Ref Object itself visualization -->
    <rect x="20" y="180" width="240" height="120" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2" />
    <text x="35" y="205" font-size="12" font-weight="700" fill="#3b82f6">Ref Object</text>
    
    <!-- ref.current -->
    <rect x="35" y="220" width="210" height="65" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="45" y="238" font-size="11" font-weight="700" fill="#94a3b8">current: CustomHandle {</text>
    <text x="55" y="253" font-size="11" font-weight="600" fill="#10b981">  open: () => void,</text>
    <text x="55" y="268" font-size="11" font-weight="600" fill="#10b981">  close: () => void</text>
    <text x="45" y="278" font-size="11" font-weight="700" fill="#94a3b8">}</text>

    <!-- Connect top parent card invocation to the Ref Object -->
    <path d="M 140 140 L 140 180" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  </g>

  <!-- ==================== COMPONENT BOUNDARY (FORWARD REF) ==================== -->
  <g transform="translate(350, 110)">
    <!-- Boundary line -->
    <line x1="0" y1="0" x2="0" y2="340" stroke="#334155" stroke-width="2" stroke-dasharray="6 6" />
    <rect x="-65" y="150" width="130" height="28" rx="14" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <text x="0" y="168" font-size="10" font-weight="700" fill="#cbd5e1" text-anchor="middle">React.forwardRef</text>
  </g>

  <!-- ==================== CHILD COMPONENT ZONE ==================== -->
  <g transform="translate(380, 110)" filter="url(#shadow)">
    <!-- Zone Boundary Box -->
    <rect width="430" height="340" rx="12" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5" />
    <text x="15" y="25" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">CHILD ZONE (EXPOSER)</text>

    <!-- Child Card -->
    <rect x="20" y="45" width="390" height="110" rx="8" fill="url(#childGrad)" filter="url(#glowGreen)" />
    <text x="35" y="75" font-size="14" font-weight="800" fill="#ffffff">ChildComponent (Modal)</text>
    <text x="35" y="95" font-size="11" font-weight="500" fill="#a7f3d0">useImperativeHandle(ref, () => ({ open, close }))</text>
    <text x="35" y="115" font-size="10" font-weight="500" fill="#ffffff" opacity="0.9">Filters & shields raw DOM node, exposing ONLY high-level controls.</text>
    <text x="35" y="135" font-size="10" font-weight="600" fill="#fef08a">Security & Encapsulation Boundary</text>

    <!-- Encapsulated/Shielded DOM Node Visualization -->
    <g transform="translate(180, 185)">
      <rect width="210" height="120" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 4" />
      <text x="15" y="25" font-size="11" font-weight="700" fill="#ef4444">SHIELDED (Raw DOM Elements)</text>
      
      <!-- Inside HTML elements -->
      <rect x="15" y="38" width="180" height="30" rx="4" fill="url(#domGrad)" />
      <text x="25" y="57" font-size="11" font-weight="700" fill="#ffffff">&lt;div class="modal-wrapper"&gt;</text>

      <rect x="15" y="76" width="180" height="30" rx="4" fill="url(#domGrad)" />
      <text x="25" y="95" font-size="11" font-weight="700" fill="#ffffff">&lt;input ref={inputRef} /&gt;</text>
    </g>

    <!-- Exposed Internal APIs -->
    <g transform="translate(20, 185)">
      <rect width="140" height="120" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2" />
      <text x="15" y="25" font-size="11" font-weight="700" fill="#10b981">Exposed Logic</text>

      <rect x="15" y="40" width="110" height="28" rx="4" fill="#059669" />
      <text x="25" y="57" font-size="10" font-weight="700" fill="#ffffff">open() { ... }</text>

      <rect x="15" y="76" width="110" height="28" rx="4" fill="#059669" />
      <text x="25" y="93" font-size="10" font-weight="700" fill="#ffffff">close() { ... }</text>
    </g>
  </g>

  <!-- ==================== FLOW & CONNECTIONS ==================== -->
  
  <!-- 1. Ref prop passing from parent to child (through forwardRef) -->
  <path d="M 280 200 L 490 200 C 510 200, 520 160, 500 155" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)" />
  <text x="350" y="215" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">Pass ref prop</text>

  <!-- 2. useImperativeHandle assigning exposed functions into Ref object's current -->
  <path d="M 400 245 C 340 245, 340 350, 260 350 L 260 310" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="2 2" marker-end="url(#arrow-green)" />
  <text x="320" y="325" font-size="9" font-weight="700" fill="#10b981" text-anchor="middle">Hydrates ref.current</text>

  <!-- 3. Local actions in Child manipulating raw DOM securely -->
  <path d="M 160 238 L 180 238" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" />
  <path d="M 160 274 L 180 274" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)" />

  <!-- Shielding Icon/Indicator -->
  <g transform="translate(345, 320)" filter="url(#shadow)">
    <circle cx="15" cy="15" r="15" fill="#ef4444" />
    <path d="M 9 12 L 15 6 L 21 12 M 9 18 L 15 12 L 21 18" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="360" y="362" font-size="9" font-weight="800" fill="#ef4444" text-anchor="middle">DOM SHIELDED</text>
  <text x="360" y="373" font-size="8" font-weight="500" fill="#94a3b8" text-anchor="middle">Parent cannot access raw div/input</text>

</svg>
