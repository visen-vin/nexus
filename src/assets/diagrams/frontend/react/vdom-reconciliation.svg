<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080C14" />
      <stop offset="50%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#05080F" />
    </linearGradient>

    <!-- Node colors -->
    <linearGradient id="vNodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="diffGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="recreateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>
    <linearGradient id="updateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glowRoot" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#EF4444" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 16px; fill: #F8FAFC; letter-spacing: 2px; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 11px; fill: #64748B; letter-spacing: 1px; }
    .header-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 13px; fill: #F8FAFC; }
    .node-label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; }
    .node-sub { font-family: 'Fira Code', monospace; font-size: 9px; fill: #94A3B8; }
    .formula { font-family: 'Fira Code', monospace; font-size: 13px; font-weight: bold; fill: #E2E8F0; }
  </style>

  <!-- Container -->
  <rect width="900" height="500" rx="16" fill="url(#bgGradient)" stroke="#1E293B" stroke-width="2" />

  <!-- Grid decoration lines -->
  <g opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="450" y1="0" x2="450" y2="500" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="6,6" />
    <line x1="850" y1="0" x2="850" y2="500" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="100" x2="900" y2="100" stroke="#FFFFFF" stroke-width="1" />
    <line x1="0" y1="400" x2="900" y2="400" stroke="#FFFFFF" stroke-width="1" />
  </g>

  <!-- Title -->
  <g transform="translate(40, 45)">
    <text class="title" x="0" y="0">VIRTUAL DOM RECONCILIATION HEURISTICS</text>
    <text class="subtitle" x="0" y="18">O(N) ALGORITHM: COMPARING CHANGES AT THE SAME TREE LEVELS</text>
  </g>

  <!-- LEFT: Case 1 - Different Node Types (Tear Down & Rebuild) -->
  <g transform="translate(40, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#EF4444">Case 1: Different Element Types</text>
    
    <!-- Old Node -->
    <g transform="translate(40, 70)">
      <rect width="100" height="50" rx="6" fill="#1E293B" stroke="#0EA5E9" stroke-width="1.5" />
      <text class="node-label" x="12" y="22">&lt;div&gt;</text>
      <text class="node-sub" x="12" y="38">Old Element</text>
    </g>

    <!-- New Node -->
    <g transform="translate(230, 70)" filter="url(#glowRoot)">
      <rect width="100" height="50" rx="6" fill="#1E293B" stroke="#EF4444" stroke-width="2" />
      <rect width="100" height="4" fill="url(#recreateGrad)" />
      <text class="node-label" x="12" y="22">&lt;section&gt;</text>
      <text class="node-sub" x="12" y="38">New Element</text>
    </g>

    <!-- Connection Arrow -->
    <path d="M155,95 L215,95" fill="none" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)" />

    <!-- Explanation Box -->
    <g transform="translate(40, 150)">
      <rect width="290" height="85" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1" />
      <text class="node-sub" x="15" y="22" fill="#EF4444">Action: UNMOUNT &amp; RECREATE</text>
      <text class="node-sub" x="15" y="45">1. React completely destroys the old &lt;div&gt;.</text>
      <text class="node-sub" x="15" y="65">2. Components beneath are fully unmounted.</text>
    </g>
  </g>

  <!-- RIGHT: Case 2 - Same Node Types (DOM Node Resued) -->
  <g transform="translate(480, 110)">
    <rect width="380" height="260" rx="12" fill="#111827" stroke="#374151" stroke-width="1.5" />
    <text class="header-text" x="20" y="30" fill="#10B981">Case 2: Same Element Types</text>
    
    <!-- Old Node -->
    <g transform="translate(40, 70)">
      <rect width="110" height="50" rx="6" fill="#1E293B" stroke="#0EA5E9" stroke-width="1.5" />
      <text class="node-label" x="12" y="20">&lt;div class="A"&gt;</text>
      <text class="node-sub" x="12" y="38">Old Element</text>
    </g>

    <!-- New Node -->
    <g transform="translate(230, 70)" filter="url(#glowRoot)">
      <rect width="110" height="50" rx="6" fill="#1E293B" stroke="#10B981" stroke-width="2" />
      <rect width="110" height="4" fill="url(#updateGrad)" />
      <text class="node-label" x="12" y="20">&lt;div class="B"&gt;</text>
      <text class="node-sub" x="12" y="38">New Element</text>
    </g>

    <!-- Connection Arrow -->
    <path d="M165,95 L215,95" fill="none" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)" />

    <!-- Explanation Box -->
    <g transform="translate(40, 150)">
      <rect width="290" height="85" rx="6" fill="#1F2937" stroke="#374151" stroke-width="1" />
      <text class="node-sub" x="15" y="22" fill="#10B981">Action: REUSE DOM NODE &amp; UPDATE ATTR</text>
      <text class="node-sub" x="15" y="45">1. React keeps the existing physical &lt;div&gt;.</text>
      <text class="node-sub" x="15" y="65">2. Only changes the "class" attribute from A to B.</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="40" y="445" font-family="'Inter', system-ui, sans-serif" font-size="11px" fill="#475569">Insight: The O(n) heuristic diffing algorithm assumes that nodes of different types produce different trees, and lists with keys can match items accurately across renders.</text>
</svg>
